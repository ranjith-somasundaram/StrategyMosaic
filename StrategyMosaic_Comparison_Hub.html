  .flag-row:last-child { border-bottom: none; padding-bottom: 0; }
  .flag-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0; margin-top: 6px; }
  .flag-row strong { color: var(--dark); font-weight: 600; }

  /* ── FOOTER ── */

  /* ── SITE FOOTER ── */
  .site-footer {
    background: var(--black); color: rgba(255,255,255,0.45);
    padding: 28px 64px; font-size: 12px;
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 60px;
  }
  .site-footer img { height: 22px; display: block; }

  @media print {
    .navbar { position: static; }
    .snap-card, .col-card, .hth-wrap, .when-card, .pricing-card, .flags-card, .differentiator-banner { break-inside: avoid; }
    .hth-table tbody tr:hover { background: transparent; }
  }

  /* ══════ ANIMATION SYSTEM ══════ */

  /* Progress bar */
  #progress-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, var(--orange), #ff9a5c);
    z-index: 9999; width: 0%; transition: width 0.1s linear;
    border-radius: 0 2px 2px 0;
  }

  /* Back to top */
  #back-to-top {
    position: fixed; bottom: 32px; right: 32px;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--orange); color: #fff; border: none;
    cursor: pointer; font-size: 18px; line-height: 1;
    box-shadow: 0 4px 16px rgba(250,102,15,0.35);
    opacity: 0; transform: translateY(12px) scale(0.85);
    transition: opacity 0.25s ease, transform 0.25s ease, box-shadow 0.2s;
    z-index: 999; display: flex; align-items: center; justify-content: center;
  }
  #back-to-top.visible { opacity: 1; transform: translateY(0) scale(1); }
  #back-to-top:hover { box-shadow: 0 6px 22px rgba(250,102,15,0.5); transform: translateY(-2px) scale(1.06); }
  #back-to-top svg { width: 18px; height: 18px; }

  /* Scroll-reveal base */
  .reveal {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                transform 0.55s cubic-bezier(0.22,1,0.36,1);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.08s; }
  .reveal-delay-2 { transition-delay: 0.16s; }
  .reveal-delay-3 { transition-delay: 0.24s; }
  .reveal-delay-4 { transition-delay: 0.32s; }

  /* Snapshot cards */
  .snap-card {
    cursor: default;
    transition: transform 0.22s ease, box-shadow 0.22s ease,
                border-color 0.22s ease;
    border-left: 3px solid transparent;
  }
  .snap-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.1);
    border-left-color: var(--orange);
  }
  .snap-card:hover .snap-value {
    transform: scale(1.04);
    color: var(--orange);
    transition: transform 0.2s ease, color 0.2s ease;
  }
  .snap-value { transition: transform 0.2s ease, color 0.2s ease; display: block; }

  /* Diff banner border draw animation */
  @keyframes borderDraw {
    from { clip-path: inset(0 0 100% 0); }
    to   { clip-path: inset(0 0 0% 0); }
  }
  .differentiator-banner {
    position: relative;
    overflow: hidden;
  }
  .differentiator-banner::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--orange);
    animation: borderDraw 0.7s cubic-bezier(0.22,1,0.36,1) 0.3s both;
  }

  /* Diff boxes stagger */
  .diff-box {
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  .diff-box:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }
  .diff-box.denodo-box { animation: fadeSlideUp 0.5s ease 0.5s both; }
  .diff-box.mosaic-box { animation: fadeSlideUp 0.5s ease 0.65s both; }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Table row hover accent bars */
  .hth-table tbody tr {
    transition: background 0.15s ease;
    position: relative;
  }
  .hth-table tbody tr td.td-d {
    transition: border-left-color 0.15s ease;
    border-left: 3px solid transparent;
  }
  .hth-table tbody tr td.td-m {
    transition: border-left-color 0.15s ease;
    border-left: 3px solid transparent;
  }
  .hth-table tbody tr:hover { background: #f7f7fb; }
  .hth-table tbody tr:hover td.td-d { border-left-color: var(--blue); }
  .hth-table tbody tr:hover td.td-m { border-left-color: var(--orange); }

  /* Adv badges — pulse once on load, hover scale */
  @keyframes badgePulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); box-shadow: 0 0 0 4px rgba(250,102,15,0.15); }
    100% { transform: scale(1); box-shadow: none; }
  }
  @keyframes badgePulseBlue {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); box-shadow: 0 0 0 4px rgba(24,72,200,0.15); }
    100% { transform: scale(1); box-shadow: none; }
  }
  .adv-m { animation: badgePulse 0.7s ease 1.2s both; cursor: default; }
  .adv-d { animation: badgePulseBlue 0.7s ease 1.2s both; cursor: default; }
  .adv-m:hover { transform: scale(1.08); transition: transform 0.15s ease; }
  .adv-d:hover { transform: scale(1.08); transition: transform 0.15s ease; }

  /* Pricing tier bar fill */
  .tier-fill-wrap {
    height: 3px; background: var(--border-soft);
    border-radius: 2px; margin-top: 6px; overflow: hidden;
  }
  .tier-fill-bar {
    height: 100%; border-radius: 2px;
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
  }
  .tier-fill-bar.filled { transform: scaleX(1); }
  .tier-fill-bar.blue-bar { background: var(--blue); }
  .tier-fill-bar.orange-bar { background: var(--orange); }

  /* Source tooltip expansion */
  .src-item {
    display: flex; gap: 10px; align-items: baseline;
    font-size: 15.6px; color: var(--grey-text);
    padding: 5px 0; border-bottom: 1px solid var(--border-soft);
    cursor: default; transition: background 0.15s;
    border-radius: 4px; padding-left: 6px; margin-left: -6px;
  }
  .src-item:last-child { border-bottom: none; }
  .src-item:hover { background: var(--orange-light); }
  .src-num {
    color: var(--orange); font-weight: 700; flex-shrink: 0;
    font-size: 11px; font-family: var(--font-mono); min-width: 22px;
  }
  .src-text { line-height: 1.5; }

  /* Point reveal stagger */
  .point {
    opacity: 0; transform: translateX(-8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .point.point-visible { opacity: 1; transform: translateX(0); }

  /* Hero entrance */
  .hero-eyebrow { animation: heroFade 0.5s ease 0.1s both; }
  .hero h1       { animation: heroFade 0.5s ease 0.2s both; }
  .hero-sub      { animation: heroFade 0.5s ease 0.3s both; }
  .hero-meta     { animation: heroFade 0.5s ease 0.4s both; }
  @keyframes heroFade {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Pill hover */
  .pill {
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: default;
  }
  .pill:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.1); }

  /* Col-card hover */
  .col-card {
    transition: box-shadow 0.2s ease;
  }
  .col-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.09); }

  /* ══════════════════════════════════════
     ENHANCEMENT v8 — 8 NEW FEATURES
  ══════════════════════════════════════ */

  /* ── 1. SECTION IDENTITY COLOURS ── */
  .section-zone[data-theme=&quot;orange&quot;] { border-left: 4px solid var(--orange); }
  .section-zone[data-theme=&quot;blue&quot;]   { border-left: 4px solid var(--blue); }
  .section-zone[data-theme=&quot;green&quot;]  { border-left: 4px solid var(--green); }
  .section-zone[data-theme=&quot;amber&quot;]  { border-left: 4px solid var(--amber); }
  .section-zone[data-theme=&quot;purple&quot;] { border-left: 4px solid var(--purple); }

  /* ── 2. SECTION COUNTER 01/02/03 ── */
  .sl-counter {
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.4s ease 0.05s, transform 0.4s ease 0.05s;
    flex-shrink: 0;
  }
  .section-label.visible .sl-counter { opacity: 1; transform: translateX(0); }

  /* ── 3. FACE-OFF ANIMATION (differentiator) ── */
  .diff-box.denodo-box {
    animation: none !important;
    opacity: 0;
    transform: translateX(-28px);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                transform 0.55s cubic-bezier(0.22,1,0.36,1);
  }
  .diff-box.mosaic-box {
    animation: none !important;
    opacity: 0;
    transform: translateX(28px);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1) 0.1s,
                transform 0.55s cubic-bezier(0.22,1,0.36,1) 0.1s;
  }
  .diff-box.denodo-box.face-in,
  .diff-box.mosaic-box.face-in {
    opacity: 1;
    transform: translateX(0);
  }
  /* Denodo box: blue left accent, Mosaic: orange */
  .diff-box.denodo-box { border-left: 3px solid var(--blue) !important; }
  .diff-box.mosaic-box { border-left: 3px solid var(--orange) !important; }

  /* ── 4. H2H TABLE — ROW SEQUENTIAL REVEAL ── */
  .hth-table tbody tr.hth-row {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s ease, transform 0.35s ease,
                background 0.15s ease;
  }
  .hth-table tbody tr.hth-row.row-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Winner cell glow */
  .hth-table tbody td.td-m.win {
    transition: background 0.2s ease, box-shadow 0.2s ease, border-left-color 0.15s ease;
  }
  .hth-table tbody tr:hover td.td-m.win {
    background: rgba(10,122,82,0.06);
    box-shadow: inset 0 0 0 1px rgba(10,122,82,0.18);
  }
  .hth-table tbody tr:hover td.td-d.win {
    background: rgba(24,72,200,0.06);
    box-shadow: inset 0 0 0 1px rgba(24,72,200,0.18);
  }

  /* ── H2H subtle winner tint (Denodo-leading rows only) ── */
  .hth-table tbody tr.denodo-win td.td-d {
    background: rgba(24,72,200,0.045);
    box-shadow: inset 3px 0 0 rgba(24,72,200,0.24);
  }
  .hth-table tbody tr.denodo-win:hover td.td-d {
    background: rgba(24,72,200,0.08);
    box-shadow: inset 3px 0 0 rgba(24,72,200,0.34);
  }

  /* ── H2H subtle winner tint (Mosaic-leading rows) ── */
  .hth-table tbody tr.mosaic-win td.td-m {
    background: rgba(250,102,15,0.05);
    box-shadow: inset 3px 0 0 rgba(250,102,15,0.28);
  }
  .hth-table tbody tr.mosaic-win:hover td.td-m {
    background: rgba(250,102,15,0.09);
    box-shadow: inset 3px 0 0 rgba(250,102,15,0.38);
  }

  /* ── 5. COUNT-UP VALUES ── */
  .snap-value[data-countup] { min-height: 1.2em; }

  /* ── 6. PRICING BAR BOUNCE EASING + TOOLTIP ── */
  .tier-fill-bar {
    height: 100%; border-radius: 2px;
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .tier-fill-bar.filled { transform: scaleX(1); }
  .tier-row { position: relative; }
  .tier-tooltip {
    position: absolute;
    right: 0; top: -34px;
    background: var(--dark);
    color: #fff;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transform: translateY(4px);
    transition: opacity 0.18s ease, transform 0.18s ease;
    z-index: 10;
    font-family: var(--font-mono);
  }
  .tier-tooltip::after {
    content: '';
    position: absolute;
    bottom: -5px; right: 16px;
    border: 5px solid transparent;
    border-top-color: var(--dark);
    border-bottom: none;
  }
  .tier-row:hover .tier-tooltip { opacity: 1; transform: translateY(0); }

  /* ── 7. STICKY DOT NAVIGATION ── */
  #dot-nav {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 200;
  }
  .dot-nav-item {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.25s ease, transform 0.25s ease, width 0.25s ease;
    position: relative;
  }
  .dot-nav-item:hover { transform: scale(1.4); background: var(--orange); }
  .dot-nav-item.active { background: var(--orange); transform: scale(1.2); }
  .dot-nav-item .dot-label {
    position: absolute;
    right: 16px; top: 50%;
    transform: translateY(-50%);
    background: var(--dark);
    color: #fff;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
    font-family: var(--font-mono);
  }
  .dot-nav-item:hover .dot-label { opacity: 1; }

  /* ── 8. FLAG ITEMS SLIDE REVEAL + AMBER GLOW ── */
  .flags-card {
    box-shadow: -4px 0 0 var(--amber), var(--shadow-sm) !important;
    border-left: 3px solid var(--amber) !important;
  }
  .flag-row {
    opacity: 0;
    transform: translateX(-14px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .flag-row.flag-visible { opacity: 1; transform: translateX(0); }

  /* ── HOW WE WIN SECTION ── */
  .win-intro {
    font-size: 15px;
    color: var(--grey-text);
    margin-bottom: 20px;
    line-height: 1.65;
    max-width: 820px;
  }
  .win-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .win-card {
    background: linear-gradient(180deg, #ffffff 0%, #fff8f2 100%);
    border: 1px solid var(--orange-border);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
    box-shadow: var(--shadow-sm);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.42s ease, transform 0.42s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .win-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--orange) 0%, #ff9a5c 100%);
  }
  .win-card.win-visible { opacity: 1; transform: translateY(0); }
  .win-card:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
  .win-num {
    font-size: 11px;
    color: var(--orange);
    font-family: var(--font-mono);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .win-card-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--black);
    margin-bottom: 14px;
  }
  .win-mini-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .win-mini {
    background: #fff;
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 14px 15px;
  }
  .win-mini-label {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    font-family: var(--font-mono);
    margin-bottom: 6px;
  }
  .win-mini-label.denodo { color: var(--blue); }
  .win-mini-label.mosaic { color: var(--orange); }
  .win-mini-text {
    font-size: 15.525px;
    line-height: 1.62;
    color: var(--dark);
  }
  .win-why {
    background: rgba(250,102,15,0.08);
    border: 1px solid var(--orange-border);
    border-radius: var(--radius);
    padding: 13px 15px;
  }
  .win-why-label {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    font-family: var(--font-mono);
    color: var(--orange);
    margin-bottom: 5px;
  }
  .win-why-text {
    font-size: 15.525px;
    line-height: 1.66;
    color: var(--dark);
  }

  /* ── OVERLAP SECTION: subtle card treatment ── */
  .overlap-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 14px;
  }
  .overlap-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.38s ease, transform 0.38s ease,
                box-shadow 0.2s ease;
  }
  .overlap-item.overlap-visible { opacity: 1; transform: translateY(0); }
  .overlap-item:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
  .overlap-eq {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--amber-light);
    color: var(--amber);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }

/* Premium readability polish */
.hero-sub { max-width: 760px; }
.win-intro { font-size: 15.5px; line-height: 1.72; }
.diff-sub { line-height: 1.68; }
@media (min-width: 1440px) {
  .main, .hero { max-width: 1260px; }
}
@media(min-width:1440px){ .arc-panel { max-width: 1400px; } }

/* Scroll reveal */

/* Responsive */
@media(max-width:1100px) {
  .arc-src-grid,.arc-cons-grid { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:900px) {
  .arc-panel { padding:24px 24px 40px; }
  .arc-split-row { grid-template-columns:1fr; }
  .arc-row-label span { writing-mode:horizontal-tb; transform:none; }
  .arc-sub-grid { grid-template-columns:1fr; }
  .arc-summary-grid { grid-template-columns:1fr; }
}
@media(max-width:640px) {
  .arc-src-grid,.arc-cons-grid { grid-template-columns:1fr; }
}

&lt;script&gt;
// ══════════════════════════════════════════════
// COMPLETE INTERACTION ENGINE v8
// ══════════════════════════════════════════════

const progressBar = document.getElementById('progress-bar');
const backTop     = document.getElementById('back-to-top');
const dotNav      = document.getElementById('dot-nav');
const dotItems    = dotNav ? Array.from(dotNav.querySelectorAll('.dot-nav-item')) : [];
const sectionZones = Array.from(document.querySelectorAll('.section-zone[data-section]'));

// ─── Progress bar + back to top ───
function updateScroll() {
  const sy = window.scrollY;
  const dh = document.documentElement.scrollHeight - window.innerHeight;
  progressBar.style.width = (dh &gt; 0 ? (sy/dh)*100 : 0) + '%';
  backTop.classList.toggle('visible', sy &gt; 400);

  // Active dot nav
  let activeIdx = 0;
  sectionZones.forEach((zone, i) =&gt; {
    const top = zone.getBoundingClientRect().top;
    if (top &lt;= window.innerHeight * 0.45) activeIdx = i;
  });
  dotItems.forEach((d, i) =&gt; d.classList.toggle('active', i === activeIdx));
}
window.addEventListener('scroll', updateScroll, { passive: true });
updateScroll();

backTop.addEventListener('click', () =&gt; window.scrollTo({ top: 0, behavior: 'smooth' }));

// ─── Dot nav click ───
dotItems.forEach(dot =&gt; {
  dot.addEventListener('click', () =&gt; {
    const idx = parseInt(dot.dataset.target);
    const zone = sectionZones[idx];
    if (zone) zone.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

// ─── General reveal observer ───
const revealObs = new IntersectionObserver((entries) =&gt; {
  entries.forEach(e =&gt; {
    if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
  });
}, { threshold: 0.07, rootMargin: '0px 0px -30px 0px' });
document.querySelectorAll('.reveal').forEach(el =&gt; revealObs.observe(el));

// ─── Staggered point reveals inside col-cards ───
const pointObs = new IntersectionObserver((entries) =&gt; {
  entries.forEach(e =&gt; {
    if (e.isIntersecting) {
      e.target.querySelectorAll('.point').forEach((pt, i) =&gt;
        setTimeout(() =&gt; pt.classList.add('point-visible'), i * 60)
      );
      pointObs.unobserve(e.target);
    }
  });
}, { threshold: 0.08 });
document.querySelectorAll('.col-card').forEach(el =&gt; pointObs.observe(el));

// ─── Face-off animation (differentiator boxes) ───
const diffGrid = document.getElementById('diff-grid');
if (diffGrid) {
  const faceObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        setTimeout(() =&gt; e.target.querySelectorAll('.diff-box').forEach(b =&gt; b.classList.add('face-in')), 100);
        faceObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  faceObs.observe(diffGrid);
}


// ─── How We Win cards stagger ───
const winGrid = document.getElementById('win-grid');
if (winGrid) {
  const winObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        e.target.querySelectorAll('.win-card').forEach((card, i) =&gt;
          setTimeout(() =&gt; card.classList.add('win-visible'), i * 90)
        );
        winObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  winObs.observe(winGrid);
}

// ─── H2H row sequential reveal ───
const hthWrap = document.querySelector('.hth-wrap');
if (hthWrap) {
  const hthObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        e.target.querySelectorAll('.hth-row').forEach((row, i) =&gt;
          setTimeout(() =&gt; row.classList.add('row-visible'), i * 55)
        );
        hthObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.05 });
  hthObs.observe(hthWrap);
}

// ─── Count-up animation ───
function animateCount(el) {
  const target   = parseFloat(el.dataset.countup);
  const suffix   = el.dataset.suffix || '';
  const decimals = parseInt(el.dataset.decimals || '0');
  const dur      = 1200;
  const start    = performance.now();
  function tick(now) {
    const progress = Math.min((now - start) / dur, 1);
    const ease     = 1 - Math.pow(1 - progress, 3);
    const val      = (target * ease).toFixed(decimals);
    el.textContent = val + suffix;
    if (progress &lt; 1) requestAnimationFrame(tick);
    else el.textContent = target.toFixed(decimals) + suffix;
  }
  requestAnimationFrame(tick);
}
const countObs = new IntersectionObserver((entries) =&gt; {
  entries.forEach(e =&gt; {
    if (e.isIntersecting &amp;&amp; e.target.dataset.countup) {
      animateCount(e.target);
      countObs.unobserve(e.target);
    }
  });
}, { threshold: 0.5 });
document.querySelectorAll('[data-countup]').forEach(el =&gt; countObs.observe(el));

// ─── Pricing bar fill with bounce easing ───
const fillObs = new IntersectionObserver((entries) =&gt; {
  entries.forEach(e =&gt; {
    if (e.isIntersecting) {
      e.target.querySelectorAll('.tier-fill-bar').forEach((bar, i) =&gt; {
        const w = bar.dataset.width || 50;
        setTimeout(() =&gt; { bar.style.width = w + '%'; bar.classList.add('filled'); }, i * 130);
      });
      fillObs.unobserve(e.target);
    }
  });
}, { threshold: 0.2 });
document.querySelectorAll('.pricing-card').forEach(el =&gt; fillObs.observe(el));

// ─── Overlap cards stagger ───
const overlapGrid = document.getElementById('overlap-grid');
if (overlapGrid) {
  const ovObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        e.target.querySelectorAll('.overlap-item').forEach((item, i) =&gt;
          setTimeout(() =&gt; item.classList.add('overlap-visible'), i * 80)
        );
        ovObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  ovObs.observe(overlapGrid);
}

// ─── Flag items slide reveal ───
const flagsCard = document.querySelector('.flags-card');
if (flagsCard) {
  const flagObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        e.target.querySelectorAll('.flag-row').forEach((row, i) =&gt;
          setTimeout(() =&gt; row.classList.add('flag-visible'), i * 90)
        );
        flagObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  flagObs.observe(flagsCard);
}

&lt;body&gt;

&lt;div class=&quot;dot-nav-item active&quot; data-target=&quot;0&quot;&gt;&lt;span class=&quot;dot-label&quot;&gt;AtScale at a glance&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;dot-nav-item&quot; data-target=&quot;1&quot;&gt;&lt;span class=&quot;dot-label&quot;&gt;Where they genuinely overlap&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;dot-nav-item&quot; data-target=&quot;2&quot;&gt;&lt;span class=&quot;dot-label&quot;&gt;How Strategy wins&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;dot-nav-item&quot; data-target=&quot;3&quot;&gt;&lt;span class=&quot;dot-label&quot;&gt;Head-to-head comparison&lt;/span&gt;&lt;/div&gt;
&lt;/nav&gt;
&lt;div class=&quot;main arc-cmp-content&quot; id=&quot;arc-cmp-content&quot;&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;0&quot; data-theme=&quot;blue&quot; style=&quot;border-top:none;&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;01&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;AtScale at a glance&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;snapshot&quot;&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Core identity&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Universal semantic layer&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;AtScale positions itself as a universal semantic layer platform for enterprise AI and analytics.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Modeling standard&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Open-source SML&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;Semantic Modeling Language is YAML-based, open source, and supported by active tooling including SDK, CLI, and converter direction, with portability and interoperability as core themes.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;AI posture&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;MCP + AI agents&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;Official messaging includes LLMs, AI applications, agent workflows, and semantic context for AI use cases.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Product scope&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Pure-play USL&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;Strong semantic layer with external BI reliance, plus a warehouse-optimization and aggregate-acceleration story; Snowflake customers can also deploy via a native marketplace app.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;section-zone&quot; data-section=&quot;1&quot; data-theme=&quot;amber&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;02&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Where they genuinely overlap&lt;/span&gt;&lt;/div&gt;
&lt;p style=&quot;font-size:18px;color:var(--grey-text);margin-bottom:18px;line-height:1.6;&quot;&gt;AtScale is not a lightweight competitor. There is real overlap in semantic-layer intent, BI interoperability, performance optimization, and AI-grounding language. Acknowledging that upfront makes the differentiation more credible.&lt;/p&gt;
&lt;div class=&quot;overlap-grid&quot;&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both position themselves as a &lt;strong&gt;semantic layer above raw data&lt;/strong&gt;, centralizing business logic instead of exposing users to raw tables.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both emphasize &lt;strong&gt;consistent metrics and business logic&lt;/strong&gt; reused across multiple consumer tools and workflows.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;AI and agent use cases&lt;/strong&gt;, with AtScale explicitly referencing LLMs, autonomous agents, and MCP-based semantic context.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;BI interoperability&lt;/strong&gt;. AtScale publicly supports Power BI, Tableau, Excel, Python notebooks, and analytical applications.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both position semantic logic as a way to improve &lt;strong&gt;governance, explainability, and trust&lt;/strong&gt; across human and AI consumers.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have a strong &lt;strong&gt;performance story&lt;/strong&gt;. AtScale emphasizes intelligent aggregates and optimized SQL over live cloud data, while Mosaic emphasizes hybrid execution and in-memory reuse.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both now carry stronger &lt;strong&gt;Snowflake credibility signals&lt;/strong&gt;. AtScale has notable Snowflake ecosystem alignment, while Mosaic can credibly engage the same warehouse-first enterprise conversation from a governed platform angle.&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;section-zone alt&quot; data-section=&quot;2&quot; data-theme=&quot;purple&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How Strategy wins&lt;/span&gt;&lt;/div&gt;
&lt;p class=&quot;win-intro&quot;&gt;AtScale is a credible semantic layer. The question is never &quot;do they have a semantic layer?&quot; — they do. The question is what happens &lt;em style=&quot;font-style:italic;color:var(--dark)&quot;&gt;after&lt;/em&gt; the semantic layer. That is where Mosaic wins.&lt;/p&gt;
&lt;div class=&quot;win-grid&quot;&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;01 / Delivery&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Last-mile included&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;AtScale stops at the semantic layer. It integrates well with Tableau, Power BI, and Excel — but those are separate products your customer still has to license, deploy, and manage independently.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Mosaic includes dashboards, scorecards, mobile, and embedded analytics as part of the governed platform. The semantic layer and the delivery surface are the same product.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;AtScale is a great semantic layer. Who consumes it? Through what tool? And who governs that tool?&quot; Every honest answer reveals a gap Mosaic closes. Semantic governance that stops before the dashboard is only half the job.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;02 / Economics&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Compute you don&#x27;t pay twice&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;AtScale uses intelligent aggregates and optimized SQL to reduce warehouse pressure. Note: AtScale announced In-Memory Aggregates (post-May 2025) — verify current capability before citing a purely warehouse-push model. Commercial scaling should be discussed carefully, because repeated consumption patterns can still matter operationally and commercially.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Mosaic&#x27;s in-memory semantic engine absorbs repeated workloads without re-triggering source compute. The same semantic result is reused across concurrent users, scheduled reports, and AI agent requests.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;What happens to your AtScale bill when 200 users open their Monday morning dashboard at 8am? And when your AI agents start querying every minute?&quot; Repeated access patterns expose the structural cost difference fast.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;03 / Governance&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;One policy, every surface&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;AtScale governs the semantic layer well — access control, masking, metric definitions, and query impersonation into the warehouse. The gap is not source-level enforcement; it is that governance is no longer natively enforced by the same product surface once results are consumed in Tableau, Power BI, or a third-party AI tool.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;In Mosaic, the governance policy that protects the semantic object also governs the dashboard, the embedded card, the mobile report, and the AI answer — because it is the same platform end to end.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;Show me how a row-level security policy in AtScale propagates into a Power BI report a business user modified last week.&quot; The seam between semantic layer and delivery layer is where enterprise governance consistently breaks down.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;04 / AI&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;AI that acts, not just answers&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;AtScale&#x27;s MCP server gives LLMs governed access to structured metrics. AI can query the semantic layer correctly — genuinely valuable. But the output lands in a chat window or a developer-built integration, disconnected from governed business workflows.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Mosaic connects governed AI answers directly into the analytics surfaces where decisions are made — dashboards, scorecards, alerts, embedded experiences — so AI becomes part of the business process, not a parallel tool.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;When AtScale&#x27;s MCP surfaces an insight, where does it go? Who sees it? Is it auditable?&quot; AtScale gets the answer right. Mosaic gets it to the right person, in the right context, inside the governed platform they already use every day.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot; style=&quot;grid-column: 1 / -1;&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;05 / Implementation &amp; Ownership&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Who builds it, owns it, and scales it?&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;AtScale requires structured semantic modeling using SML. Initial setup and ongoing evolution typically depend on data or analytics engineering teams, with strong modeling discipline required up front. That is a strength for semantic rigor, but it can also create a dependency on specialized ownership.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Mosaic can be positioned on faster onboarding and broader accessibility, reducing dependency on deep semantic modeling expertise while still maintaining governance. The semantic layer is easier to operationalize across business-facing consumption surfaces instead of staying concentrated inside a specialist modeling team.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;How long does it take to stand up your first governed model — and who has to be involved?&quot; If semantic ownership stays with a specialized engineering team, scale becomes a bottleneck. Mosaic shifts that balance closer to the business without giving up control.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;section-zone&quot; data-section=&quot;3&quot; data-theme=&quot;orange&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;04&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Head-to-head comparison&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;hth-wrap&quot;&gt;
&lt;table class=&quot;hth-table&quot;&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;Dimension&lt;/th&gt;
&lt;th class=&quot;col-d&quot;&gt;AtScale&lt;/th&gt;
&lt;th class=&quot;col-m&quot;&gt;Strategy Mosaic&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Product scope&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Pure-play universal semantic layer — no native dashboards, reports, or BI visualization&lt;/li&gt;
&lt;li&gt;Positioned as the layer between cloud data platforms and consuming tools; relies entirely on Tableau, Power BI, Excel, Looker, or custom apps for last-mile delivery&lt;/li&gt;
&lt;li&gt;Semantic layer + MCP is a complete story; the delivery stack is not part of the product&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Semantic layer + analytics engine + native BI (dashboards, scorecards, reports, mobile, embedded) in a single governed platform&lt;/li&gt;
&lt;li&gt;Supports external BI tools through open interfaces while also offering a native delivery surface — customers can consolidate instead of stack&lt;/li&gt;
&lt;li&gt;Semantic governance travels directly into the last-mile experience because it is the same product&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row denodo-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Semantic modeling language&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;SML (Semantic Modeling Language) is Apache open-sourced, YAML-based, and published on GitHub with a public spec and pre-built models&lt;/li&gt;
&lt;li&gt;Multidimensional coverage: metrics, dimensions, hierarchies, semi-additive measures, many-to-many relationships, and cell-based expressions — documented and verifiable&lt;/li&gt;
&lt;li&gt;Object-based and modular; models are defined in YAML and managed programmatically through Git-connected workflows&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Governed semantic objects are the lead message — certification, security, and enterprise reuse rather than an open standard language spec&lt;/li&gt;
&lt;li&gt;Differentiation is on governance richness and downstream controlled consumption, not openness or portability as primary value&lt;/li&gt;
&lt;li&gt;Position on semantic control, not semantic modeling vocabulary — AtScale wins the open/portable language argument directly&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row denodo-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Microsoft stack fit&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;One of AtScale&#x27;s clearest public strengths is its MDX and XMLA compatibility — Excel and Power BI behave as if connecting to SSAS, the standard enterprises already know&lt;/li&gt;
&lt;li&gt;Native DAX connectivity for Power BI enables Live Query against cloud warehouses (Snowflake, BigQuery, Redshift, Azure Synapse, Databricks) without data imports&lt;/li&gt;
&lt;li&gt;Supports SSAS-compatible XMLA/MDX workflows alongside native DAX live connectivity for Power BI&lt;/li&gt;
&lt;li&gt;This is one of AtScale&#x27;s clearest and most defensible public strengths — do not challenge it directly&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;DAX and XMLA support is credible and supports Power BI and Excel scenarios&lt;/li&gt;
&lt;li&gt;Competitive angle is not to fight AtScale on Microsoft compatibility — it is to reframe the conversation away from MDX/XMLA depth and toward governed delivery completeness&lt;/li&gt;
&lt;li&gt;When the customer is Microsoft-first and warehousing on Azure, AtScale is a strong fit; Mosaic wins on platform breadth beyond the Microsoft stack&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Execution &amp; performance&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Warehouse-push model: translates inbound BI and AI queries into optimized SQL executed against live cloud data — no data movement or duplication&lt;/li&gt;
&lt;li&gt;Intelligent aggregate generation (system-generated and user-defined) reduces repeated warehouse compute and delivers sub-second performance at scale&lt;/li&gt;
&lt;li&gt;Caching mechanisms improve concurrency for high-frequency workloads, but the architecture remains fundamentally warehouse-oriented&lt;/li&gt;
&lt;li&gt;Aggregate acceleration is genuine — this is not purely a pass-through query engine&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Hybrid execution: pushdown to warehouse plus an independent in-memory semantic engine for repeated query reuse&lt;/li&gt;
&lt;li&gt;Repeated BI workloads, concurrent dashboard loads, and AI agent queries can be served from in-memory results without re-triggering source compute each time&lt;/li&gt;
&lt;li&gt;Stronger story for cost control as concurrency scales — especially relevant when AI agent query volume is unpredictable and frequent&lt;/li&gt;
&lt;li&gt;The performance architecture is different, not merely incrementally faster; position on when the warehouse is not queried at all&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Governance model&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Role-based access control, row-level security, data masking, and governance controls within the semantic layer — well-documented and production-grade&lt;/li&gt;
&lt;li&gt;Governance is enforced at the AtScale layer; query impersonation passes user credentials through to the underlying data platform for consistent enforcement&lt;/li&gt;
&lt;li&gt;Governance stops at the semantic layer boundary — once data or results enter Tableau, Power BI, or a third-party AI tool, AtScale&#x27;s policies no longer apply&lt;/li&gt;
&lt;li&gt;Strong lineage and explainability narrative within the platform&#x27;s scope&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Governance policy defined at the semantic object level travels into every downstream consumption surface — dashboards, embedded analytics, mobile, and AI answers — because delivery is part of the same platform&lt;/li&gt;
&lt;li&gt;No governance seam between semantic layer and last-mile visualization; the same access rules, masking policies, and audit trail apply end to end&lt;/li&gt;
&lt;li&gt;Position on enterprise-wide governed consumption, not just governance vocabulary at the model layer&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;AI &amp; MCP&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;MCP Server is public and documented, interoperable with MCP-compatible AI tools including Claude, ChatGPT, and other compatible agent frameworks&lt;/li&gt;
&lt;li&gt;Semantic context exposed via MCP gives LLMs governed metric definitions, hierarchies, and relationships — eliminates hallucination on structured business queries&lt;/li&gt;
&lt;li&gt;Integrated with Databricks MCP Marketplace and Agent Bricks, and publicly integrated with Snowflake Cortex Analyst and Databricks AI/BI Genie&lt;/li&gt;
&lt;li&gt;Snowflake Ventures led AtScale&#x27;s largest announced equity round, which strengthens its credibility in Snowflake-centered enterprise conversations&lt;/li&gt;
&lt;li&gt;AI answers are accurate and governed — but they are returned to the agent or chat interface, not surfaced inside a governed business workflow or analytics platform&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;MCP is also part of the Mosaic story — the competitive angle is not MCP availability, it is what sits behind MCP&lt;/li&gt;
&lt;li&gt;Governed AI answers connect directly into the analytics surfaces where business decisions are made: dashboards, scorecards, alerts, embedded experiences&lt;/li&gt;
&lt;li&gt;AI becomes part of the governed business workflow, not a parallel tool requiring separate integration and governance overhead&lt;/li&gt;
&lt;li&gt;Position: AtScale gets the AI answer right; Mosaic gets it to the right person, in the right context, inside the governed platform they already use&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row denodo-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Open ecosystem &amp; portability&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;SML is Apache-licensed open source — free to use in any application, with a public GitHub repository and community contribution model&lt;/li&gt;
&lt;li&gt;Explicit interoperability with Tableau, Power BI, Excel, Looker, Hex, ThoughtSpot, Superset, Python notebooks, and Jupyter&lt;/li&gt;
&lt;li&gt;AtScale has publicly stated a semantic translator direction to help migrate existing semantic modeling approaches into SML; maturity varies by platform and should be validated per use case&lt;/li&gt;
&lt;li&gt;Strongly positioned as vendor-neutral: semantic models built in SML are portable across platforms by design&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Supports external BI tools through open interfaces — the openness story is credible but portability is not the lead competitive message&lt;/li&gt;
&lt;li&gt;Differentiation is on governance and delivery completeness, not open-standard portability; concede the openness point and redirect to platform value&lt;/li&gt;
&lt;li&gt;Customers prioritizing vendor neutrality and tool-agnostic semantic portability are more naturally aligned with AtScale; focus Mosaic on customers with platform consolidation pain&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Pricing model&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Consumption-based pricing centered on deployed semantic objects (DSOs); AtScale&#x27;s pricing page states it does not bill by users, queries, or data size&lt;/li&gt;
&lt;li&gt;Available on Google Cloud Marketplace and Snowflake Snowpark Container Services (SPCS); supports Kubernetes deployment on public cloud, private cloud, and hybrid&lt;/li&gt;
&lt;li&gt;Commercial scaling should be validated carefully in deal context, especially where BI concurrency and AI agent activity are expected to grow rapidly&lt;/li&gt;
&lt;li&gt;Developer Edition available for free download with access to SML and pre-built semantic model library&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Position Mosaic&#x27;s commercial model using approved internal materials — do not make unsupported pricing comparisons&lt;/li&gt;
&lt;li&gt;Competitive angle is platform economics: the total cost of Mosaic (semantic layer + BI + AI delivery) versus the stack cost of AtScale + a separate BI tool license + governance overhead across two products&lt;/li&gt;
&lt;li&gt;When AI agent volume is high and unpredictable, consumption-based per-query pricing becomes a commercial risk conversation — use it selectively, not as a default attack&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row denodo-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Platform coverage &amp; deployment fit&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Strong fit for warehouse-first environments across Snowflake, Databricks, BigQuery, Redshift, Synapse, Oracle, PostgreSQL, and Teradata&lt;/li&gt;
&lt;li&gt;Supports Kubernetes deployment across public cloud, private cloud, and hybrid environments; Snowflake customers can also deploy through a native marketplace app rather than Kubernetes&lt;/li&gt;
&lt;li&gt;Naturally aligned to customers standardizing on modern data platforms and preserving existing BI investments&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Broader platform story around heterogeneous enterprise connectivity plus native governed delivery&lt;/li&gt;
&lt;li&gt;Better fit when the customer wants to reduce tool sprawl rather than optimize a best-of-breed warehouse-first stack&lt;/li&gt;
&lt;li&gt;Position on consolidation and governed consumption, not just semantic augmentation&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Implementation model &amp; ownership&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Strong semantic rigor, but initial setup and ongoing evolution typically depend on data or analytics engineering teams&lt;/li&gt;
&lt;li&gt;Best suited when the customer is comfortable with structured semantic ownership and technical modeling discipline&lt;/li&gt;
&lt;li&gt;Scales well with disciplined engineering, but can create dependency on specialist ownership&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Position Mosaic on faster onboarding and broader accessibility without giving up governance&lt;/li&gt;
&lt;li&gt;Semantic capability can be operationalized closer to business-facing consumption surfaces instead of remaining concentrated inside a specialist modeling team&lt;/li&gt;
&lt;li&gt;Stronger fit when speed, accessibility, and cross-functional adoption matter as much as semantic rigor&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Where each wins&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Best fit: enterprises wanting a pure, best-of-breed semantic layer that integrates with an existing BI stack they are not replacing&lt;/li&gt;
&lt;li&gt;Especially strong in Microsoft-heavy estates (heavy Excel, Power BI, Azure Synapse) and modern warehouse-first environments (Snowflake, Databricks, BigQuery)&lt;/li&gt;
&lt;li&gt;Strong for analytics engineering teams who want code-first semantic modeling with Git-connected workflows and SML portability across tools&lt;/li&gt;
&lt;li&gt;Recent analyst visibility such as GigaOm&#x27;s Leader/Fast Mover recognition can surface in customer conversations as an added credibility signal&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Best fit: enterprises with tool sprawl pain — too many BI tools, semantic drift across dashboards, governance seams between layers, or repeated compute cost from concurrent workloads&lt;/li&gt;
&lt;li&gt;Strongest when the customer wants semantic governance plus native BI and AI delivery in one governed platform, reducing the number of products they procure and manage&lt;/li&gt;
&lt;li&gt;Position where the conversation is about platform consolidation, not best-of-breed BI tool augmentation&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;

&lt;div class=&quot;main arc-cmp-content&quot; id=&quot;arc-cmp-content&quot;&gt;

&lt;!-- ── S01 AT A GLANCE ── --&gt;
&lt;div class=&quot;section-zone&quot; data-section=&quot;0&quot; data-theme=&quot;blue&quot; style=&quot;border-top:none;&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;01&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Cube at a glance&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;snapshot&quot;&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Core identity&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Universal Semantic Layer&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;Cube is an open-source semantic layer and agentic analytics platform — developer-first, code-first, API-first. Cube Core is Apache 2.0 licensed and self-hostable.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;GigaOm 2025&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Leader + Outperformer&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;Positioned in the Innovation/Platform Play quadrant of the 2025 GigaOm Radar for Semantic Layers and Metrics Stores. Source: cube.dev blog, October 2025. Also recognised in the 2026 Gartner Market Guide for Agentic Analytics (March 2026).&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;AI posture&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Agentic Analytics (GA Oct 2025)&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;Cube Agentic Analytics reached GA in October 2025 following the June 2025 D3 launch. It adds AI Data Analyst, AI Data Engineer, workbooks, dashboards, and embedded analytics chat. Workbooks are available from Starter. Embedded analytics chat and MCP are available on Premium and Enterprise plans.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Product scope&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Developer-first platform&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;Broadest API coverage in category: REST, GraphQL, SQL, MDX, DAX. YAML/JS models, Git CI/CD, Cube Store pre-aggregations. 90,000 servers installed, 5 million users, 20% of Fortune 1000.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;!-- ── S02 OVERLAP ── --&gt;
&lt;div class=&quot;section-zone&quot; data-section=&quot;1&quot; data-theme=&quot;amber&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;02&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Where they genuinely overlap&lt;/span&gt;&lt;/div&gt;
&lt;p style=&quot;font-size:18px;color:var(--grey-text);margin-bottom:18px;line-height:1.6;&quot;&gt;Cube is a credible, well-engineered semantic layer with genuine enterprise traction — GigaOm Leader, Gartner recognised, 90K servers. The overlap in intent is real. Acknowledging it makes the differentiation more credible.&lt;/p&gt;
&lt;div class=&quot;overlap-grid&quot;&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both position themselves as a &lt;strong&gt;semantic layer above raw data&lt;/strong&gt;, centralising business logic and ensuring consistent metric definitions across tools.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;AI and agent use cases&lt;/strong&gt; — Cube via its Agentic Analytics platform (GA October 2025) and MCP on paid tiers; Mosaic via MCP (January 2026) and Auto AI Suite.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;major BI tools&lt;/strong&gt; — Tableau, Power BI, Looker, Superset, and others via JDBC/ODBC, MDX, and DAX interfaces.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both offer &lt;strong&gt;AI-assisted semantic model creation&lt;/strong&gt; — Cube&#x27;s AI Data Engineer automates YAML model generation; Mosaic Studio auto-creates certified objects from source schemas.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both provide &lt;strong&gt;caching and performance optimisation&lt;/strong&gt; — Cube via Cube Store pre-aggregations; Mosaic via its hybrid in-memory execution engine.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have strong &lt;strong&gt;DataOps credibility&lt;/strong&gt;. Cube&#x27;s Git CI/CD workflow is developer-native. Mosaic has 25+ years of production enterprise deployment track record.&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;!-- ── S03 HOW WE WIN ── --&gt;
&lt;div class=&quot;section-zone alt&quot; data-section=&quot;2&quot; data-theme=&quot;purple&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How Strategy wins&lt;/span&gt;&lt;/div&gt;
&lt;p class=&quot;win-intro&quot;&gt;Cube is a genuinely well-built semantic layer. The question is never &quot;do they have a semantic layer?&quot; — they do, and it&#x27;s strong. The question is what you need &lt;em style=&quot;font-style:italic;color:var(--dark)&quot;&gt;beyond&lt;/em&gt; the semantic layer. That is where Mosaic wins.&lt;/p&gt;
&lt;div class=&quot;win-grid&quot;&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;01 / Governance&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Certified objects vs code files&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label&quot; style=&quot;color:var(--cube, #FF6B35);&quot;&gt;Cube&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Metrics are defined in YAML/JavaScript code files. Security is enforced by the underlying warehouse. What happens inside a consuming BI tool or AI agent is outside Cube&#x27;s governance scope. Enterprise audit logging requires the Enterprise plan — at the infrastructure level, not at the semantic object level.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Metrics are certified first-class objects with lineage, certification status, and security policy built in. Mosaic Sentinel (January 2026) provides Risk Management, Audit &amp; Compliance (GDPR/HIPAA/SOX), and Usage Insights across every consumption surface — BI, embedded, mobile, and AI — in a single platform.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;Show me the audit trail for who accessed Revenue across every BI tool and AI agent in the last 30 days — and prove the governance policy was enforced end-to-end.&quot; Cube cannot produce this from a single platform. Mosaic Sentinel can. For banking, healthcare, and government, this is a procurement requirement, not a nice-to-have.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;02 / Execution at scale&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Independent engine vs warehouse-push&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label&quot; style=&quot;color:var(--cube, #FF6B35);&quot;&gt;Cube&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Cube Store pre-aggregations are excellent for predictable, pre-defined query patterns. They materially reduce warehouse compute for defined workloads. However, unpredictable AI agent traffic and high-concurrency dashboards that don&#x27;t match a pre-defined aggregate still generate full warehouse compute.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Mosaic&#x27;s independent in-memory semantic engine absorbs any repeated or concurrent workload — including unpredictable AI agent query patterns — without requiring pre-defined aggregates. 200 users opening the same dashboard simultaneously may result in a single warehouse query.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;What happens to your warehouse bill when 300 AI agents start querying your semantic layer simultaneously at unpredictable times?&quot; Cube Store covers defined patterns. Mosaic&#x27;s in-memory engine covers everything — without requiring the data engineering team to pre-define every possible aggregate.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;03 / Delivery&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;25+ year platform vs GA October 2025&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label&quot; style=&quot;color:var(--cube, #FF6B35);&quot;&gt;Cube&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Cube Agentic Analytics reached general availability in October 2025 — it is a strong and growing platform. External BI tools (Tableau, Power BI, Superset) remain the primary consumption path for most Cube deployments today. Embedded dashboards and analytics chat require the Premium or Enterprise plan.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Strategy Mosaic is a full enterprise BI platform with 25+ years of production deployments — dashboards, scorecards, mobile (iOS/Android), embedded analytics, and HyperIntelligence (zero-code analytics injection into any web app). The same governance policy enforced in the semantic layer applies in every delivery surface.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;Show me your production deployments at a regulated enterprise at the scale of our organisation.&quot; Cube&#x27;s traction is real — 90K servers, 5M users, 20% of Fortune 1000 — but its agentic analytics platform reached GA in October 2025. Mosaic&#x27;s enterprise delivery track record spans 25+ years at Fortune 500 companies globally.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;04 / Open source reality&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Acknowledge it, then redirect&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label&quot; style=&quot;color:var(--cube, #FF6B35);&quot;&gt;Cube&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Cube Core is genuinely open source — Apache 2.0, self-hostable, no commercial dependency. This is a real advantage for developer teams who want to evaluate freely and avoid vendor lock-in. However: the Semantic Layer API, MCP, DAX API, embedded analytics, SSO, and audit logging all require Cube Cloud paid plans. &quot;Free&quot; applies to Cube Core alone.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Mosaic is a commercial platform — no open-source tier. The positioning is completeness, not openness. A governed intelligence platform that includes semantic layer, hybrid execution engine, native BI delivery, AI grounding, and compliance modules in a single product. The total cost of a Cube deployment at enterprise scale includes Cube Cloud seats, compute costs, BI tool licenses, and governance tooling separately.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;What is the all-in cost of a full production Cube deployment for 500 users — semantic layer, BI delivery, MCP, audit logging, and SSO — versus a Mosaic deployment that includes all of that in a single platform?&quot; The open-source argument shrinks significantly when the full enterprise requirements are on the table.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;!-- ── S04 H2H TABLE ── --&gt;
&lt;div class=&quot;section-zone&quot; data-section=&quot;3&quot; data-theme=&quot;orange&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;04&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Head-to-head comparison&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;hth-wrap&quot;&gt;
&lt;table class=&quot;hth-table&quot;&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th&gt;Dimension&lt;/th&gt;
&lt;th class=&quot;col-d&quot;&gt;Cube&lt;/th&gt;
&lt;th class=&quot;col-m&quot;&gt;Strategy Mosaic&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Product scope&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Universal semantic layer with Cube Agentic Analytics, workbooks, dashboards, and embedded chat added in 2025&lt;/li&gt;
&lt;li&gt;Strong developer-first platform, but enterprise delivery capabilities still sit closer to an application framework and product stack the customer must assemble intentionally&lt;/li&gt;
&lt;li&gt;Best understood as semantic layer plus modern developer analytics tooling, not a long-established end-to-end governed BI platform&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Semantic layer + hybrid execution engine + mature enterprise BI platform in one governed stack&lt;/li&gt;
&lt;li&gt;Native dashboards, scorecards, mobile, embedded analytics, HyperIntelligence, and AI experiences are part of the same platform, not adjacent tooling&lt;/li&gt;
&lt;li&gt;The semantic layer and the delivery surface remain operationally and commercially unified&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row denodo-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Open source&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Cube Core is Apache 2.0 licensed, self-hostable, and attractive to engineering-led teams that want code ownership and deployment flexibility&lt;/li&gt;
&lt;li&gt;Open-source credibility is one of Cube&#x27;s clearest strengths and should be acknowledged directly&lt;/li&gt;
&lt;li&gt;Well aligned for customers that explicitly prioritize portability, developer control, and application-style embedding&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Commercial enterprise platform, not an open-source semantic-layer project&lt;/li&gt;
&lt;li&gt;The competitive position is not openness, it is governed enterprise completeness, operational maturity, and consolidation value&lt;/li&gt;
&lt;li&gt;If open-source portability is the primary buying criterion, Cube has the cleaner story&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row denodo-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;API breadth&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;REST, GraphQL, SQL, MDX, and DAX create one of the broadest developer-facing API stories in the category&lt;/li&gt;
&lt;li&gt;GraphQL is a particularly strong differentiator in application and embedded scenarios&lt;/li&gt;
&lt;li&gt;Very strong fit when the semantic layer is being treated as infrastructure for engineers and product teams&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Strong enterprise connectivity and open access story through SQL, REST, DAX/XMLA, Python, and broad tool interoperability&lt;/li&gt;
&lt;li&gt;Does not lead with GraphQL or developer-API breadth as the core value proposition&lt;/li&gt;
&lt;li&gt;Compete here by redirecting toward governed consumption and delivery completeness rather than API surface area&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Semantic model construct&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Metrics and dimensions are defined in YAML and JavaScript with Git-native workflows and strong developer ergonomics&lt;/li&gt;
&lt;li&gt;Semantic rigor is real, but the model is still expressed primarily as code artifacts managed by specialist teams&lt;/li&gt;
&lt;li&gt;Governance and business meaning can become dependent on engineering ownership patterns&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Governed metrics and dimensions are first-class certified semantic objects rather than code files&lt;/li&gt;
&lt;li&gt;Lineage, certification, security, and reuse are embedded into the object model itself&lt;/li&gt;
&lt;li&gt;Stronger position when the customer wants governed business ownership, not just code-managed semantic logic&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Execution &amp; performance&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Cube Store pre-aggregations improve performance significantly for defined patterns and repeated workloads&lt;/li&gt;
&lt;li&gt;Strong performance architecture, but optimization still depends on modeled aggregates and warehouse-oriented execution patterns&lt;/li&gt;
&lt;li&gt;Performance wins are real, though the architecture remains closer to engineered acceleration than independent governed analytic execution&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Hybrid execution combines pushdown with an independent in-memory semantic engine for repeated and concurrent workloads&lt;/li&gt;
&lt;li&gt;The same governed result can be reused across dashboards, reports, and AI interactions without always re-triggering source compute&lt;/li&gt;
&lt;li&gt;Stronger position when the customer cares about concurrency, stability, and warehouse cost control at enterprise scale&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Governance model&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Security is strongly tied to the underlying data platform and infrastructure configuration&lt;/li&gt;
&lt;li&gt;Enterprise controls such as SSO, audit logging, and production governance deepen materially in paid tiers&lt;/li&gt;
&lt;li&gt;Governance is credible, but not expressed as a native end-to-end business governance layer spanning every delivery surface in one mature enterprise product&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Governance is attached to semantic objects and enforced through every native consumption surface inside the platform&lt;/li&gt;
&lt;li&gt;Mosaic Sentinel extends the story with audit, risk, compliance, and usage visibility across BI and AI surfaces&lt;/li&gt;
&lt;li&gt;This is the cleaner fit for regulated environments that need provable end-to-end governed consumption&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row denodo-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;AI &amp; MCP&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Cube Agentic Analytics and MCP give it a modern, credible AI posture with strong appeal to engineering-led teams&lt;/li&gt;
&lt;li&gt;Very good story for AI-assisted model creation, agent interaction, and application-centered analytics experiences&lt;/li&gt;
&lt;li&gt;Cube is a serious AI-era competitor and should not be positioned as behind on this front&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;MCP is also part of the Mosaic story, but the competitive angle is what happens after the AI answer is generated&lt;/li&gt;
&lt;li&gt;Governed AI outputs connect directly into enterprise dashboards, scorecards, cards, mobile, and embedded workflows inside the same platform&lt;/li&gt;
&lt;li&gt;Win by positioning AI in governed business context, not by claiming Cube lacks AI capability&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Native BI delivery&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Cube now has dashboards, workbooks, and embedded chat, which meaningfully expands its surface area beyond pure semantic infrastructure&lt;/li&gt;
&lt;li&gt;Even so, it remains earlier-stage and more developer-product oriented than a mature enterprise BI platform with decades of operational depth&lt;/li&gt;
&lt;li&gt;The native delivery story is improving, but it is not the same as a long-proven enterprise decisioning platform&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Strategy Mosaic provides dashboards, dossiers, reports, mobile, embedded analytics, and HyperIntelligence in a mature enterprise platform&lt;/li&gt;
&lt;li&gt;The same semantic governance, security, and operational model carries into delivery without a seam between layers&lt;/li&gt;
&lt;li&gt;This is a major advantage when the buyer wants platform consolidation, standardization, and low operational fragmentation&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row denodo-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;When Cube wins&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;Developer-led organizations with strong Git, CI/CD, and code-first operating models&lt;/li&gt;
&lt;li&gt;Teams that already have BI tooling in place and do not want to replace it&lt;/li&gt;
&lt;li&gt;Customers who value open-source flexibility, GraphQL, embedded app patterns, and product-style analytics delivery&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Acknowledge Cube directly here instead of over-arguing against it&lt;/li&gt;
&lt;li&gt;If the customer is explicitly optimizing for developer control and open-source portability, Cube is a credible fit&lt;/li&gt;
&lt;li&gt;Trying to beat Cube on developer-first identity is usually the wrong motion&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;When Mosaic wins&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
&lt;li&gt;When the requirement is broader than a semantic layer and includes governed delivery, operational maturity, and compliance visibility&lt;/li&gt;
&lt;li&gt;When BI tool sprawl, metric inconsistency, and AI governance seams are already creating enterprise pain&lt;/li&gt;
&lt;li&gt;When the buyer wants one platform to govern the path from source to dashboard to AI answer&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
&lt;li&gt;Best fit for enterprises prioritizing consolidation, regulated governance, native delivery, and concurrency-aware execution&lt;/li&gt;
&lt;li&gt;Stronger when the decision is about enterprise platform standardization rather than developer-tool preference&lt;/li&gt;
&lt;li&gt;This is where Mosaic should lead confidently and directly&lt;/li&gt;
&lt;/ul&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;

    border-radius: 0 2px 2px 0;

  /* ── BACK TO TOP ── */
  #back-to-top {
    position: fixed; bottom: 32px; right: 32px;

  /* ── DOT NAVIGATION ── */
  #dot-nav {
    position: fixed; right: 20px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 10px;
    z-index: 200;

  .dot-nav-item {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); cursor: pointer;
    transition: background 0.25s ease, transform 0.25s ease;
    position: relative;

  .dot-nav-item:hover { transform: scale(1.4); background: var(--orange); }

    transition: opacity 0.15s ease; font-family: var(--font-mono);
  }
