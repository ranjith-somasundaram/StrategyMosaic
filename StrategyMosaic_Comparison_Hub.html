&lt;p style=&quot;font-size:17px;color:var(--grey-text);margin-bottom:20px;line-height:1.65;&quot;&gt;Power BI is the most widely adopted BI tool on the planet — 30 million users and 18 Gartner Leader years are facts. The competitive question is not &quot;is Power BI good?&quot; It clearly is. The question is: &lt;em style=&quot;color:var(--dark)&quot;&gt;what happens to your data governance, your AI reliability, and your enterprise completeness when your semantic layer, BI delivery, AI engine, governance, and compliance tools are all separate Microsoft products — and all require Azure to work together?&lt;/em&gt; Both have sustained Gartner recognition — different quadrant positions, different strength axes.&lt;/p&gt;
&lt;div class=&quot;overlap-grid&quot;&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have &lt;strong&gt;sustained Gartner MQ recognition&lt;/strong&gt;. Power BI is the 2025 Leader (18 consecutive years); Strategy Mosaic is the 2025 Visionary recognised for composable analytics, governance, and AI+BI integration. Different quadrant positions, different strength axes.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both deliver &lt;strong&gt;interactive dashboards&lt;/strong&gt; — Power BI via DAX-driven report visuals; Strategy Mosaic via governed dashboards on certified metric objects. Power BI&#x27;s drag-and-drop authoring has lower technical entry barrier for Microsoft-trained teams.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have an &lt;strong&gt;AI analytics story&lt;/strong&gt; — Power BI via Copilot (DAX generation, chat with data, report creation from prompts); Strategy Mosaic via Auto AI Suite (Auto Agents, Auto Dashboards, Auto Voice) grounded in certified Mosaic objects.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have &lt;strong&gt;MCP capability&lt;/strong&gt; — Power BI MCP Server (preview Nov 2025, developer-facing VS Code extension); Strategy Mosaic MCP (GA January 2026) connecting AI agents to certified Mosaic metric definitions from ChatGPT, Claude, Copilot, and Gemini.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;enterprise governance&lt;/strong&gt; — Power BI via Microsoft Purview (sensitivity labels, lineage, audit logs); Strategy Mosaic via Mosaic Sentinel (Risk Management, Audit &amp;amp; Compliance, Usage Insights — one platform, no separate license required).&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;embedded analytics&lt;/strong&gt; — Power BI Embedded via SDK and iframe integration; Strategy Mosaic embedded analytics + HyperIntelligence (zero-code injection into any web app — unique to Strategy Mosaic).&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-zone alt&quot; data-section=&quot;2&quot; data-theme=&quot;purple&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How Strategy Mosaic wins — 4 architectural differentiators&lt;/span&gt;&lt;/div&gt;
&lt;p class=&quot;win-intro&quot;&gt;Power BI is a strong BI delivery tool — and the honest starting point. Strategy Mosaic does not compete on Microsoft ecosystem integration. Strategy Mosaic competes on what sits underneath the reports: semantic independence, governance completeness, platform portability, and enterprise capabilities that do not require assembling multiple Microsoft products to unlock.&lt;/p&gt;
&lt;div class=&quot;win-grid&quot;&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;01 / Semantic independence&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Universal certified objects vs DAX-locked semantic model&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Power BI&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;DAX is a proprietary Microsoft language — semantic models are not portable to non-Microsoft tools without complete re-modeling.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Fabric Metrics Layer (2025) centralises metric definitions within Fabric workspaces — a real improvement, but still within the Microsoft boundary.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Copilot AI quality directly depends on model quality: poor naming, ambiguous measures, many-to-many relationships → incorrect DAX → wrong AI outputs. Documented production failure pattern.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No LLM shielding layer — AI can produce syntactically valid but logically incorrect results against a poorly structured model.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic certified first-class metric objects carry lineage, certification status, and security policy regardless of which tool queries them — not a DAX measure inside a workspace.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;LLM shielding prevents AI from generating outputs outside the certified semantic boundary — governs by platform design, not by model quality discipline.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;200+ connectors — not locked to Azure or OneLake. Works across cloud warehouses, on-prem, legacy, SaaS, and files without re-platforming.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;AI Sync for Linked Models (Feb 2026): auto-validates and re-enables AI experiences when semantic models update — no manual Copilot re-testing required.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;If Power BI Copilot returns a wrong Revenue number because an analyst created an ambiguous measure three months ago — how does your governance framework detect and prevent that?&quot; Strategy Mosaic&#x27;s certified objects enforce definitions by design. Power BI&#x27;s Copilot accuracy is a governance discipline problem, not a platform guarantee.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;02 / Governance completeness&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;One governed platform vs Fabric + Purview + compliance add-ons&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Power BI&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Microsoft Purview for governance requires M365 E5 or a separate Compliance add-on — a separate product at separate cost.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Full governance stack: Fabric capacity + Purview + Azure Entra ID + Power BI Admin + Azure Log Analytics for audit export. Multiple tools, multiple teams.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No cross-surface semantic object-level audit trail covering the same metric across dashboard, mobile, AI agent, and embedded simultaneously without manual assembly.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Governance ends at the Fabric workspace boundary — what analysts do inside workbooks is not enforced by the semantic layer.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic Sentinel (Jan 2026): Risk Management + Audit &amp;amp; Compliance (GDPR/HIPAA/SOX) + Usage Insights — one module, no separate product, no separate license.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Cross-surface semantic object-level audit: same certified metric, every surface (dashboard, mobile, AI agent, embedded) in one audit trail.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;LLM shielding enforces governance at the AI layer — AI cannot bypass semantic boundaries regardless of model quality.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;One vendor, one contract, one support relationship for governance + BI + AI + reporting.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;

&lt;div class=&quot;win-why-text&quot;&gt;&quot;Show me a single audit log covering every access to your Revenue metric — across your Power BI dashboard, mobile app, Copilot AI session, and embedded analytics — for the last 90 days.&quot; In Power BI, this requires assembling Fabric, Purview, and Azure Log Analytics logs. In Strategy Mosaic, Mosaic Sentinel delivers this natively in one module.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Non-Azure organisations (AWS-primary, GCP-primary, on-prem) get a reduced Power BI experience — Fabric&#x27;s integration benefits are Azure-exclusive.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Architectural lock-in: adopting Power BI + Fabric commits to a data philosophy where compute, storage, governance, and analytics are inseparable — Gartner MQ 2025 caution, InterWorks June 2025.&lt;/li&gt;

&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Runs on AWS, Azure, GCP, StackIT, and on-premises — full feature parity across all deployments, not an Azure-dependent architecture.&lt;/li&gt;

&lt;/div&gt;

&lt;script&gt;
var TABS = [&#x27;denodo&#x27;,&#x27;atscale&#x27;,&#x27;cube&#x27;,&#x27;thoughtspot&#x27;,&#x27;tableau&#x27;];

function showTab(name) {
  TABS.forEach(function(n) {
    var frame = document.getElementById(&#x27;frame-&#x27; + n);
    var tab   = document.getElementById(&#x27;tab-&#x27; + n);
    var on = (n === name);

&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;QIX associative engine: context-aware, global criteria applied to full dataset, incremental reasoning.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Full enterprise stack requires multiple Qlik products: NPrinting (reporting), Catalog (governance), Alerting — all separate licenses.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Gartner Peer Insights users explicitly note: &quot;Reporting = NPrinting, Governance = Qlik Catalog, Alerting = Qlik Alerting&quot; (separate licenses).&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Qlik Answers runs on Amazon Bedrock (Anthropic Claude models) — no BYOE within Qlik Answers itself. For custom LLM stacks, Qlik's official guidance is MCP integration. No offline or air-gapped deployment for Qlik Answers (cloud-only at GA, Feb 2026).&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;1&quot; data-theme=&quot;amber&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;02&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Where they genuinely overlap — acknowledge this&lt;/span&gt;&lt;/div&gt;
&lt;p style=&quot;font-size:17px;color:var(--grey-text);margin-bottom:20px;line-height:1.65;&quot;&gt;Qlik is a genuinely strong platform — its associative engine is unique, its data integration breadth post-Talend is real, and its agentic AI story is moving fast. The competitive question is not &quot;can Qlik do analytics?&quot; It clearly can. The question is: &lt;em style=&quot;color:var(--dark)&quot;&gt;when a regulated enterprise needs governed semantic objects, cross-surface AI audit trails, pixel-perfect reporting, voice analytics, and HyperIntelligence injection — all in one platform, one license, one vendor — what does the actual Qlik stack require?&lt;/em&gt; Both have sustained Gartner recognition — different quadrant positions, different strength axes.&lt;/p&gt;
&lt;div class=&quot;overlap-grid&quot;&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have &lt;strong&gt;sustained Gartner MQ recognition&lt;/strong&gt;. Qlik is a 2025 Leader; Strategy Mosaic is a 2025 Visionary recognised for composable analytics, governance, and AI+BI integration. Different quadrant positions, different strength axes.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have an &lt;strong&gt;agentic AI story&lt;/strong&gt; — Qlik via Qlik Answers (structured + unstructured, GA Feb 2026) + Discovery Agent + Qlik Predict; Strategy Mosaic via Auto AI Suite (Auto Agents, Auto Dashboards, Auto Voice) grounded in certified Mosaic objects.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have a &lt;strong&gt;MCP server&lt;/strong&gt; — Qlik MCP GA early 2026, exposing the associative engine and governed data products to third-party AI assistants; Strategy Mosaic MCP GA January 2026, connecting agents directly to certified Mosaic metric definitions.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both handle &lt;strong&gt;structured + unstructured data in AI&lt;/strong&gt; — Qlik Answers combines analytics engine outputs with document and knowledge base retrieval; Strategy Mosaic AI Agents (Jan 2026) answer questions across governed structured BI data and unstructured files in the same session.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;multi-cloud deployment&lt;/strong&gt; — Qlik Cloud on AWS Marketplace, Qlik Sense Enterprise on-prem; Strategy Mosaic on AWS, Azure, GCP, StackIT, and on-premises. Both are more cloud-agnostic than Power BI.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have &lt;strong&gt;predictive analytics&lt;/strong&gt; — Qlik Predict (formerly AutoML, renamed 2025) for ML model building and forecasting; Strategy Mosaic Key Driver Analysis (MRMR statistical methodology, Jan 2026) for explainable driver identification directly within the governed semantic layer.&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-zone alt&quot; data-section=&quot;2&quot; data-theme=&quot;purple&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How Strategy Mosaic wins — 4 architectural differentiators&lt;/span&gt;&lt;/div&gt;
&lt;p class=&quot;win-intro&quot;&gt;Qlik's associative engine is genuinely differentiated — acknowledge it. Strategy Mosaic does not compete on associative discovery. Strategy Mosaic competes on what governs the insights: certified semantic objects, unified governance intelligence, one-platform completeness, and enterprise AI capabilities that Qlik's assembled stack cannot match without multiple products.&lt;/p&gt;
&lt;div class=&quot;win-grid&quot;&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;01 / Semantic layer architecture&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Certified first-class objects vs associative engine model&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Qlik&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Qlik's QIX associative engine is genuinely unique — context-aware, global criteria applied to the full dataset, incremental reasoning. Strongest for free-form discovery across complex multi-table relationships without predefined joins. Acknowledge this as a real differentiator.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Data Products for Analytics (2026): curated, governed datasets monitored for quality — a real step toward governed semantic definitions.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;However: metric definitions live inside Qlik applications — not portable certified objects with independent lineage and cross-surface policy enforcement outside the Qlik environment.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic defines metrics, attributes, hierarchies, and security as certified first-class objects — not application-bound definitions. A &quot;Revenue&quot; object carries lineage, certification status, and access policy regardless of which surface queries it.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic Sentinel (Jan 2026): Risk Management + Audit &amp;amp; Compliance (GDPR/HIPAA/SOX) + Usage Insights across every surface simultaneously — one platform, no separate Qlik Catalog license needed.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;LLM shielding: AI cannot query outside certified objects or return results bypassing governance — by design, not by data product curation discipline.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;When a Qlik Answers session returns a Revenue figure — where does that metric definition live outside Qlik, and can you show me the audit trail proving the same governance policy applied to Revenue across the dashboard, mobile app, and AI session simultaneously?&quot; Qlik assembles Catalog + Data Products + Qlik Cloud audit. Mosaic Sentinel delivers this natively in one module without a separate catalog product.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;02 / Platform completeness&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;One governed platform vs Qlik's assembled multi-product stack&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Qlik&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Qlik Sense: strong dashboards and associative exploration — genuinely enterprise-grade.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Pixel-perfect reporting requires Qlik NPrinting — a separate product and separate license. Explicitly called out by enterprise customers in Gartner Peer Insights reviews: &quot;You have to buy different licences to get basic functions: Reporting = NPrinting, Governance = Qlik Catalog, Alerting = Qlik Alerting.&quot;&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Qlik Answers (AI): cloud-only — no on-premises AI deployment roadmap confirmed in official Qlik documentation (Feb 2026 FAQ).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No voice analytics layer. No zero-code HyperIntelligence injection into third-party apps.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Pixel-perfect enterprise reporting native — no NPrinting equivalent required, no separate license, same semantic layer throughout.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic Sentinel governance built in — no separate Catalog product, no separate Alerting product, one platform contract.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Auto Voice (Feb 2026): voice analytics with parallel actions, Gemini-powered, mobile support. Unique in the market — Qlik has no equivalent.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;HyperIntelligence: zero-code injection of governed analytics into any web app. Unique to Strategy Mosaic.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;What is the total license count required to run Qlik with enterprise reporting, data governance, alerting, and AI — versus Strategy Mosaic for the same capabilities?&quot; The honest Qlik answer: Qlik Sense + NPrinting + Qlik Catalog + Qlik Alerting + Qlik Answers. Strategy Mosaic: one platform, one contract, everything included.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;03 / Governed AI delivery&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;BYOE + air-gapped AI vs Bedrock-bound, cloud-only Qlik Answers&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Qlik&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Qlik Answers launched on Amazon Bedrock — no BYOE LLM option documented as of GA (Feb 2026). Verify whether BYOE was announced at Qlik Connect 2026 (April 2026) before using in customer conversations.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Qlik Answers launched as cloud-only per the official Qlik FAQ (Feb 2026) — verify on-premises AI status post-Qlik Connect 2026. Regulated industries requiring air-gapped AI should confirm current Qlik Answers path.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No dedicated LLM shielding layer — AI outputs grounded in associative engine + data products, but governance depends on data product curation quality, not platform enforcement.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;BYOE (Feb 2026): Gemini 2.5, Azure OpenAI, LLAMA 3.3 70B, offline LLMs — customer brings their preferred model, no single LLM vendor lock-in.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Offline LLM support (Jan 2026): Strategy AI works in fully air-gapped environments where no data can leave the perimeter — a hard procurement requirement for banking, government, and defence sectors.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;LLM shielding: AI cannot query outside certified Mosaic objects or return results bypassing governance — enforced by platform design, not data product discipline.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;Our data sovereignty policy requires AI to run on-premises in an air-gapped environment — no data leaves our perimeter. What is Qlik's answer for Qlik Answers in that scenario?&quot; The confirmed answer from Qlik's official documentation: Qlik Answers is cloud-only, no on-prem roadmap. Strategy Mosaic supports offline LLM models for exactly this use case — a procurement gate for banking and government.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;04 / Execution architecture&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Hybrid in-memory + 200+ connectors vs associative model with QVD staging&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Qlik&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Qlik's QIX associative in-memory engine is strong for exploration workloads — context-aware, incremental, fast for associative discovery patterns. Real capability.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Data must be loaded into Qlik's in-memory model — for large datasets or live data, this requires QVD file staging or Qlik Talend pipelines before data reaches the associative engine.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Qlik Cloud capacity-based pricing — high-volume concurrent workloads drive capacity consumption. No independent engine that directly reduces upstream warehouse compute bills.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Hybrid execution: intelligent pushdown for live queries + independent in-memory engine for concurrent/repeated workloads. 500 concurrent users querying the same metric → warehouse may be hit once.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;200+ connectors: data does not need to be pre-loaded via ETL/QVD staging. Mosaic operates as a direct semantic layer on top of cloud warehouses, on-prem databases, SaaS, and files.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Reduces Snowflake and Databricks compute bills at concurrent scale — documented cost-control advantage for large deployments.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;For 500 concurrent users querying Revenue from Snowflake at 8am — does Qlik load that data via QVD staging first, or does your associative engine query Snowflake directly? And does your AI agent's high-frequency query pattern drive incremental Snowflake credits?&quot; Strategy Mosaic's in-memory engine absorbs concurrent workloads. Qlik requires QVD staging or Talend pipelines before data reaches the associative engine at scale.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;3&quot; data-theme=&quot;green&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;04&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Head-to-head — Qlik vs Strategy Mosaic&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;hth-wrap&quot;&gt;
&lt;table class=&quot;hth-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;
&lt;th&gt;Dimension&lt;/th&gt;
&lt;th class=&quot;col-d&quot;&gt;Qlik&lt;/th&gt;
&lt;th class=&quot;col-m&quot;&gt;Strategy Mosaic&lt;/th&gt;
&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Product scope&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Data integration + analytics + agentic AI platform. 40K+ customers, 75% Fortune 500. QIX associative engine at core. Full enterprise stack requires multiple Qlik products.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Full AI+BI platform: Mosaic semantic layer, enterprise reporting, dashboards, Auto AI Suite, HyperIntelligence, mobile — one governed product, one license.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Associative engine&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Proprietary QIX engine: context-aware, global criteria applied to full dataset, incremental reasoning. Enables association-based discovery across related data without predefined joins. No competitor replicates this capability. ✓ Qlik advantage&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Mosaic hybrid in-memory + pushdown execution. Different paradigm: certified governed semantic objects rather than associative discovery. Stronger for regulated enterprise metric delivery.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Semantic layer&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Associative model + Data Products for Analytics (curated, governed datasets, 2026). Metric definitions are application-bound — not portable certified objects with independent cross-surface lineage and policy enforcement.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Mosaic: certified first-class objects — lineage, certification, and security policy travel with the metric across every surface. Universal, tool-agnostic, 200+ connectors.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Governance &amp;amp; audit&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Qlik Catalog (separate product, separate license). AI Trust Score (July 2025). RLS and audit logging in Qlik Cloud. No unified cross-surface semantic object governance in one module equivalent to Mosaic Sentinel.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Mosaic Sentinel: Risk Management, Audit &amp;amp; Compliance (GDPR/HIPAA/SOX), Usage Insights — one platform, no separate license. Cross-surface semantic object-level audit natively.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;AI analytics&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Qlik Answers (GA Feb 2026): structured + unstructured AI on Amazon Bedrock. Discovery Agent (GA February 2026). Qlik Predict (AutoML/ML). MCP Server GA early 2026. Cloud-only at launch — verify on-prem AI status post-Qlik Connect 2026.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Auto AI Suite: AI Agents grounded in Mosaic certified objects, Auto Dashboards, Auto Voice (parallel actions). Key Driver Analysis (MRMR). MCP GA Jan 2026. BYOE + offline LLM support.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;BYOE — bring your own LLM endpoint&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Qlik Answers is Bedrock-native (Anthropic Claude models) — no BYOE within Qlik Answers (official FAQ: &quot;not at this stage&quot;). Customers wanting custom models are directed to use MCP integration. No offline or air-gapped option for Qlik Answers (cloud-only per GA FAQ, Feb 2026). Verify whether Qlik Connect 2026 (April 13–15) introduced any BYOE announcement.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;BYOE: Gemini 2.5, Azure OpenAI, LLAMA 3.3 70B, offline LLMs for air-gapped environments (Jan 2026). Customer controls LLM choice. No single LLM vendor lock-in.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;LLM shielding &amp;amp; hallucination prevention&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No dedicated LLM shielding layer. AI outputs grounded in associative engine + data products, but governance depends on data product curation quality — not enforced by platform design.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;LLM shielding by design — AI cannot query outside certified Mosaic objects or bypass governance. Enforced at platform level, not dependent on curation discipline.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Enterprise reporting&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Qlik Sense dashboards: strong. Pixel-perfect reporting: Qlik NPrinting (separate product, separate license). Explicitly flagged by enterprise users in Gartner Peer Insights: reporting, governance, and alerting each require separate Qlik products.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Pixel-perfect enterprise reporting native — same platform, same semantic layer, no separate product or license. High-volume burst delivery, complex report books, regulated output formats.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;HyperIntelligence&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No equivalent. Mashup API and iframe embedding for developer-built integrations. No zero-code injection of governed analytics into third-party web applications.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;HyperIntelligence: zero-code injection of governed analytics cards into any web app (SAP, Salesforce, Workday, email, portals). No developer integration required. Unique to Strategy Mosaic.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Voice analytics&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No voice analytics layer in Qlik Cloud or Qlik Sense. Qlik Answers is a text/conversational interface. No parallel multi-step action execution via voice.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Auto Voice (Feb 2026): low latency, parallel actions, Gemini-powered, mobile support. Unique capability — no competitor in this comparison has a voice analytics layer.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;AI Sync for Linked Models&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No equivalent. Data product updates require manual governance review. No automated mechanism to re-validate or re-enable AI experiences when underlying semantic definitions change.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;AI Sync for Linked Models (Feb 2026): auto-validates, flags inactive elements, re-enables AI across connected Mosaic models when definitions update. Zero manual maintenance.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Deployment&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Qlik Cloud (AWS Marketplace, multi-cloud). Qlik Sense Enterprise on-prem. Qlik Answers AI: cloud-only, no on-prem roadmap confirmed. Government cloud available (AWS JWCC via Qlik Cloud Government).&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;AWS, Azure, GCP, StackIT, on-premises — same feature set. Offline LLM for air-gapped environments. Sovereign cloud options for regulated markets.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Data integration breadth&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Qlik Talend Cloud (acquired 2023) + Upsolver (acquired 2025): end-to-end data integration, streaming ingestion, data quality, pipeline automation from raw data to analytics. Strongest end-to-end data pipeline story in this comparison. ✓ Qlik advantage&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Mosaic 200+ semantic connectors for analytics consumption. Data pipeline and integration tooling is not a primary Strategy Mosaic scope — pairs with existing ETL/ELT stack.&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td class=&quot;td-dim&quot;&gt;When Qlik wins&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Associative discovery is a primary requirement — free-form exploration across complex multi-table relationships. Data integration + analytics in one vendor preferred. AutoML/predictive analytics embedded in workflow. Existing Qlik investment being extended.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Strategy Mosaic is not the right answer when Qlik's associative engine is the primary differentiator and the customer needs Talend-level data integration pipelines from the same vendor.&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td class=&quot;td-dim&quot;&gt;When Strategy Mosaic wins&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Strategy Mosaic is not the right answer when associative discovery is the primary UX requirement and the customer is comfortable assembling NPrinting + Catalog + Alerting as separate Qlik products.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;One governed platform required — semantic layer + reporting + AI + governance in one license. Regulated industry (air-gapped AI, SOX, HIPAA). HyperIntelligence use case. BYOE or offline LLM required. Platform consolidation from 3–4 Qlik products to one.&lt;/td&gt;&lt;/tr&gt;

    tab.setAttribute('aria-selected', on ? 'true' : 'false');
    frame.style.pointerEvents = on ? 'auto' : 'none';
  });

  var active = document.getElementById('frame-' + name);

}
