&lt;div class=&quot;main arc-cmp-content&quot; id=&quot;arc-cmp-content&quot;&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;0&quot; data-theme=&quot;blue&quot; style=&quot;border-top:none;&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;01&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;ThoughtSpot at a glance&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;snapshot&quot;&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Core identity&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Agentic Analytics Platform&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul&gt;&lt;li&gt;Search-driven, AI-first analytics built on patented search-token architecture and ThoughtSpot Modeling Language (TML).&lt;/li&gt;&lt;li&gt;Spotter 3 AI analyst is the primary interface.&lt;/li&gt;&lt;li&gt;Cloud-native and designed to sit on supported cloud warehouses such as Snowflake, Databricks, BigQuery, Redshift, and Azure Synapse.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Gartner MQ 2025&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Leader (BI Platforms)&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul&gt;&lt;li&gt;Named a Leader in the 2025 Gartner Magic Quadrant for Analytics and BI Platforms.&lt;/li&gt;&lt;li&gt;Differentiated for agentic analytics, natural-language search, and AI-driven discovery.&lt;/li&gt;&lt;li&gt;Widely positioned around fast business-user exploration rather than traditional dashboard-first BI.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;AI posture&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Spotter 3 + Spotter Semantics&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul&gt;&lt;li&gt;Spotter 3 adds multi-step reasoning and end-to-end analytics reporting.&lt;/li&gt;&lt;li&gt;Spotter Semantics extends the model with Metrics Catalog, TML, and aggregate awareness.&lt;/li&gt;&lt;li&gt;MCP Server and SpotCache strengthen the AI-agent story for high-volume usage.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Key architectural reality&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Search-first analytics on warehouse-native data&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul&gt;&lt;li&gt;ThoughtSpot is strongest when the enterprise already has governed data in a supported cloud warehouse.&lt;/li&gt;&lt;li&gt;Its experience is search-first and analyst-assistive, not a replacement for broader enterprise semantic governance by itself.&lt;/li&gt;&lt;li&gt;For BI architects, the key question is how ThoughtSpot fits into the wider semantic, modeling, and consumption stack.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;section-zone&quot; data-section=&quot;1&quot; data-theme=&quot;amber&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;02&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Where they genuinely overlap&lt;/span&gt;&lt;/div&gt;
&lt;p style=&quot;font-size:18px;color:var(--grey-text);margin-bottom:20px;line-height:1.65;&quot;&gt;ThoughtSpot's NLQ search-token architecture is genuinely differentiated — patented, deterministic, and not reliant on raw LLM text-to-SQL. That is real. The competitive question is not whether Spotter can answer a data question. It is: &lt;em style=&quot;color:var(--dark)&quot;&gt;what certified data does it answer from, who governs that data end-to-end, what happens when 500 users query simultaneously at 8am, and what does the full enterprise reporting stack look like beyond self-service exploration?&lt;/em&gt;&lt;/p&gt;
&lt;div class=&quot;overlap-grid&quot;&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have &lt;strong&gt;sustained Gartner MQ recognition&lt;/strong&gt; in Analytics and BI Platforms. ThoughtSpot is a 2025 Gartner Leader; Strategy Mosaic is a 2025 Gartner Visionary — recognised for composable analytics, analytics governance, and AI+BI integration. Different quadrant positions, different strength axes.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have an &lt;strong&gt;agentic analytics story&lt;/strong&gt; — ThoughtSpot via Spotter 3 and Spotter Semantics (March 2026); Strategy Mosaic via Auto AI Suite (Auto Agents, Auto Dashboards, Auto Voice, Auto Expert) grounded in Mosaic.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have a &lt;strong&gt;semantic layer&lt;/strong&gt; — ThoughtSpot via Spotter Semantics / TML / Metrics Catalog; Strategy Mosaic via Mosaic (universal semantic layer with certified first-class objects, Mosaic Studio, Mosaic Sentinel).&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have &lt;strong&gt;MCP server support&lt;/strong&gt; — ThoughtSpot MCP (Sept 2025) connects Spotter to ChatGPT, Claude, Cursor. Strategy MCP (Jan 2026) connects AI agents to certified Mosaic metric definitions.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;embedded analytics&lt;/strong&gt; — ThoughtSpot Embedded (SDK/API/MCP, 2025 Proddy Award winner); Strategy Mosaic embedded analytics + HyperIntelligence (zero-code injection into any web app).&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have &lt;strong&gt;mobile analytics&lt;/strong&gt; — ThoughtSpot mobile app with Spotter NLQ; Strategy Mosaic native iOS/Android with offline access, push notifications, and full governed delivery.&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;section-zone alt&quot; data-section=&quot;2&quot; data-theme=&quot;purple&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How Strategy wins&lt;/span&gt;&lt;/div&gt;
&lt;p class=&quot;win-intro&quot;&gt;ThoughtSpot wins the NLQ argument — patented search tokens are genuinely better than raw LLM text-to-SQL for accuracy. Acknowledge it. The question is what happens before Spotter asks a question and after it returns an answer. That is where Strategy Mosaic wins.&lt;/p&gt;
&lt;div class=&quot;win-grid&quot;&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;01 / Semantic layer architecture&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Certified first-class objects vs TML definitions&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;ThoughtSpot&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Spotter Semantics (March 2026) adds a Metrics Catalog, TML (ThoughtSpot Modeling Language), and aggregate awareness.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;TML defines business context for Spotter's search engine — YAML-like schema definitions that map tables, joins, and measures.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;A real and meaningful improvement.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;However: TML-defined metrics are specific to ThoughtSpot's query surface.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;TML models are defined per primary data connection; multi-source queries require additional modeling work.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Governance (row-level security, audit) depends on the underlying warehouse and ThoughtSpot's platform boundary.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No independent cross-surface semantic governance object.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic + Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic defines metrics, attributes, hierarchies, and security as first-class certified objects — not YAML configurations, not SQL views.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;A &quot;Revenue&quot; object carries lineage, certification status, and security policy regardless of which tool queries it.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic Sentinel (Jan 2026): Risk Management, Audit &amp; Compliance (GDPR/HIPAA/SOX), Usage Insights — at the semantic object level, across every surface simultaneously (dashboard, mobile, AI agent, embedded).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;One audit trail, one certified definition, enforced everywhere.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands in regulated industries&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;Can you provide a single audit log showing every access to the Revenue metric — by user, by surface (dashboard/mobile/AI/embedded), by time — across the last 90 days? And can you prove the governance policy applied to every one of those accesses?&quot; ThoughtSpot can provide platform-level logs. Mosaic Sentinel provides semantic-object-level cross-surface audit trails. For banking and healthcare RFPs, this is often a procurement gate, not a preference.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;02 / Execution architecture &amp; cost at scale&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Independent in-memory engine vs warehouse-push only&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;ThoughtSpot&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;ThoughtSpot is warehouse-first by architecture — all query execution runs in Snowflake, Databricks, BigQuery, or Redshift.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Spotter Semantics adds aggregate awareness to route queries to pre-aggregated tables, reducing some redundant compute.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;SpotCache (announced 2026) addresses high-volume AI agent caching.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;However: every Spotter query, every Liveboard refresh, every background automated insight — these all generate warehouse compute.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;At 500 concurrent users on a Monday morning, warehouse credits accumulate rapidly.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Embedded analytics pricing adds $5–6 per dashboard load in consumption scenarios (third-party vendor analysis, March 2026 — verify against ThoughtSpot published pricing before use in proposals).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Average enterprise contract ~$137K/year before warehouse cost (third-party industry estimate — not from ThoughtSpot published pricing; do not cite in formal proposals).&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic + Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic's hybrid execution engine: intelligent pushdown for live queries, independent in-memory semantic engine for repeated and concurrent workloads.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;When 500 users open the Revenue dashboard simultaneously, the warehouse may be queried once — subsequent results served from the in-memory engine.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;AI Agent query patterns (high frequency, unpredictable timing) benefit from the same reuse. 200+ connectors also mean the architecture supports mixed landscapes — data does not need to be pre-migrated to a cloud warehouse before Analytics can start.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Reduces Snowflake and Databricks compute cost at concurrent scale — documented in Strategy's cost-control messaging.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The CFO-level ask&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;If 500 employees open ThoughtSpot at 8am Monday — how many Snowflake credits does that consume? How does that scale as we add AI agents that query data 24/7?&quot; ThoughtSpot's warehouse-push model is excellent for a warehouse-first team with controlled query volumes. At enterprise concurrent scale with always-on AI agents, Strategy Mosaic's in-memory engine absorbs repeated workloads without proportional warehouse cost growth.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;03 / Enterprise platform completeness&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Full BI platform vs search-first analytics tool&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;ThoughtSpot&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;ThoughtSpot is purpose-built for search-driven self-service exploration and agentic analytics.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;SpotterViz generates automated dashboards.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Analyst Studio supports SQL/Python/R for deeper modeling.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Strong embedded analytics story.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;However: pixel-perfect formatted enterprise reports, complex report books, high-volume scheduled delivery to thousands of users, regulated output formats (the kind sent to boards, regulators, and branch networks) are not ThoughtSpot's primary design targets.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Visualisation depth is acknowledged as a limitation vs Tableau/Power BI (multiple analyst and user review sources, 2025–2026).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Data must reside in a supported cloud warehouse — no legacy/on-premises source support at the semantic layer.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic + Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Strategy Mosaic covers the complete enterprise analytics spectrum: pixel-perfect enterprise reporting, interactive dashboards, Auto AI Suite (Auto Agents, Auto Dashboards, Auto Voice with parallel actions and low latency), HyperIntelligence (zero-code analytics injection into SAP, Salesforce, Workday, any web app.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;unique to Strategy), native iOS/Android mobile, embedded analytics.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;all governed by Mosaic. 200+ source connectors including on-premises, legacy, files, and SaaS without requiring warehouse migration. 25+ years of enterprise production deployments at Fortune 500 companies globally.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The enterprise completeness ask&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;Show me how you deliver a formatted regulatory report to 5,000 branch employees every morning — with row-level security, regional filtering, PDF output, and a complete audit trail. And show me how the same certified data definition powers the branch manager's mobile app, the AI agent in the call centre, and the analytics card that appears in SAP without any separate integration.&quot; ThoughtSpot solves part of this. Strategy Mosaic was purpose-built for all of it.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;04 / Total cost of ownership&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;One governed platform vs ThoughtSpot + warehouse + governance tools&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;ThoughtSpot&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;ThoughtSpot pricing: Essentials $25/user/month (up to 50 users, 25M row limit), Pro $50/user/month (growing teams, includes Spotter AI Agent), Enterprise custom pricing (third-party sources report average ~$137K/year — Vendr 2026; verify before formal proposals).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Embedded analytics is a separate product with consumption-based pricing ($5–6/dashboard load in some scenarios).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Add: the underlying cloud warehouse cost (Snowflake/Databricks credits generated by ThoughtSpot queries), professional services for data modeling ($50K–$200K at implementation), and for regulated enterprises — a separate compliance/governance tool, because ThoughtSpot's audit capability sits at the platform level, not semantic object level.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic + Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Strategy Mosaic is a single platform that includes: Mosaic universal semantic layer, BI delivery (reporting, dashboards, mobile, embedded), Auto AI Suite (agents, dashboards, voice), Mosaic Sentinel (governance intelligence), and HyperIntelligence.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;One vendor, one contract, one support relationship.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No separate semantic layer product, no separate governance tool, no separate embedded analytics product.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;The in-memory execution engine also directly reduces downstream warehouse compute bills — one of Strategy's documented cost-control arguments with Snowflake and Databricks customers.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The TCO ask&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;What is the total 3-year cost of ThoughtSpot for 500 users — including the platform, the Snowflake compute generated by ThoughtSpot queries, governance tooling for SOX compliance, and embedded analytics for the customer portal — versus Strategy Mosaic for the same users?&quot; ThoughtSpot's headline per-user pricing looks competitive. The full cost stack for a regulated enterprise at scale is significantly different.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;section-zone&quot; data-section=&quot;3&quot; data-theme=&quot;green&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;04&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Head-to-head comparison&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;hth-wrap&quot;&gt;
&lt;table class=&quot;hth-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;
&lt;th&gt;Dimension&lt;/th&gt;
&lt;th class=&quot;col-d&quot;&gt;ThoughtSpot&lt;/th&gt;
&lt;th class=&quot;col-m&quot;&gt;Strategy Mosaic&lt;/th&gt;
&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Product scope&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Agentic analytics platform — Spotter NLQ, Liveboards, Analyst Studio, SpotterViz, embedded analytics. Cloud warehouse-dependent. Excellent for self-service exploration and conversational analytics.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Full AI+BI platform: Mosaic semantic layer, enterprise reporting, dashboards, Auto AI Suite, HyperIntelligence, mobile — one governed product. 200+ connectors. 25+ years enterprise production.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;NLQ / AI search&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Patented search-token architecture — deterministic SQL, not raw LLM text-to-SQL. Spotter 3: advanced AI analyst — multi-step reasoning, structured and unstructured data, end-to-end analytics reporting. 64% of customers use Spotter as primary analyst (FY2025). ✓ ThoughtSpot advantage&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Auto AI Suite: AI Agents grounded in Mosaic certified objects, Auto Voice (low latency, parallel actions, Feb 2026). Different approach — governance-first rather than search-first.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Semantic layer&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Spotter Semantics (March 2026): Metrics Catalog, TML, aggregate awareness. Governance at platform boundary. TML models defined per primary data connection. Search-optimised semantic definitions.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Mosaic: certified first-class objects with lineage and security built in. Mosaic Studio (vendor-stated 10× faster AI modeling). Mosaic Sentinel cross-surface governance intelligence (Jan 2026). 200+ connectors.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Governance &amp; audit&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;RBAC, RLS, encryption, audit logs at platform level. Row-level security. Compliance features available on Enterprise plan. Audit logging at platform level. No equivalent to Mosaic Sentinel's semantic object-level audit trail covering every surface simultaneously.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Mosaic Sentinel (Jan 2026): Risk Management, Audit &amp; Compliance (GDPR/HIPAA/SOX), Usage Insights — semantic object level across every surface. LLM shielding. Cross-surface policy enforcement.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Query execution&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Warehouse-only execution — Snowflake, Databricks, BigQuery, Redshift, Azure Synapse. SpotCache (2026) for high-volume AI agent caching. Aggregate awareness routes to pre-aggregated tables. No independent in-memory engine.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Hybrid: pushdown for live + independent in-memory engine for concurrent/repeated. 500 users → warehouse hit once. Reduces Snowflake/Databricks compute at concurrent scale.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Enterprise reporting&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Not a primary design target. Liveboards and SpotterViz for interactive exploration. Acknowledged limitation in visualisation depth vs Tableau/Power BI (multiple analyst sources 2025–2026).&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Purpose-built: pixel-perfect reports, high-volume scheduled delivery, complex report books, regulated output. 25+ years production history at Fortune 500 banks, telcos, and government agencies.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Source connectivity&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Cloud warehouses only: Snowflake (SnowSpot), Databricks (DataSpot), BigQuery, Redshift, Azure Synapse, and others. Data must be in a supported cloud platform. No on-premises or legacy connector at the semantic layer level.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;200+ semantic connectors: cloud warehouses, on-premises, legacy, SaaS (Salesforce, SAP, Workday), files, APIs — no warehouse migration prerequisite.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Embedded analytics&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;ThoughtSpot Embedded: SDK, API, MCP. 2025 Proddy Award for Top Embedded Analytics Product. Strong developer story. Separate product from Analytics — additional consumption-based pricing. ✓ ThoughtSpot embedded strength&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Strategy Mosaic embedded + HyperIntelligence (zero-code injection into any web app — unique). Governed — same semantic policy applies. White-label SaaS embedding. No separate product licensing.&lt;/td&gt;
&lt;/tr&gt;

&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;HyperIntelligence&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;No equivalent — ThoughtSpot delivers analytics inside ThoughtSpot surfaces and via embedded SDK. No zero-code injection of governed analytics into third-party applications.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;HyperIntelligence: zero-code injection of governed analytics cards into any web app (SAP, Salesforce, Workday, email, portals) — unique to Strategy in the market. No developer integration required.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;On-premises / hybrid deployment&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Cloud-native platform — no on-premises deployment option. Multi-cloud: AWS, GCP, Azure. Regional data centre hosting for non-US may incur additional cost.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Cloud (AWS, Azure, GCP, StackIT) + on-premises. Strategy Managed Cloud Enterprise with cloud-native backup/restore. Sovereign cloud options for regulated markets.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;td-dim&quot;&gt;When ThoughtSpot wins&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Cloud warehouse already deployed (Snowflake/Databricks-first). Team wants patented NLQ search as primary interaction model. Developer-led embedded analytics build. Strong self-service exploration culture. Data is already clean and in the warehouse.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Strategy Mosaic is not the right answer when pure NLQ search-first analytics is the primary requirement and the team has no need for enterprise reporting, on-premises connectivity, or cross-surface semantic governance.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;td-dim&quot;&gt;When Strategy Mosaic wins&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Strategy Mosaic is not the right answer when the team is Snowflake/Databricks-first, wants search-driven NLQ as the core UX, has no legacy or on-premises data, and does not need enterprise reporting or regulated compliance audit trails.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Regulated industry compliance required. Enterprise reporting at scale needed. Mixed data landscape (not cloud-warehouse-only). Platform consolidation: one product for semantic layer + BI + AI + governance. HyperIntelligence use case.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;LLM shielding &amp; hallucination prevention&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;No dedicated LLM shielding layer documented. Spotter Semantics grounds answers in TML definitions — genuine improvement for consistency. Governance depends on TML quality and warehouse boundary. AI accuracy relies on how well semantic models are built and maintained.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;All AI answers grounded in Mosaic certified objects — not raw schema. LLM shielding layer prevents AI bypassing governance or querying ungoverned data. No sensitive data transmitted to third-party LLM providers when using offline or air-gapped deployment. AI cannot return results outside the certified semantic boundary. Significantly reduces hallucinations through governed semantic grounding — AI operates only on certified definitions, not raw tables or unstructured SQL.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;BYOE — bring your own LLM endpoint&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;ThoughtSpot uses its own AI infrastructure for Spotter. No BYOE LLM endpoint within the platform as of March 2026 — verify whether any BYOE announcement was made at or after the Spotter Semantics launch (March 2026). No air-gapped AI deployment option documented.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;BYOE for Gemini 2.5 (Feb 2026) for both AI Agents and Auto Dashboards. Offline LLM models for air-gapped / sovereign environments (Jan 2026). Supported: Azure OpenAI, Gemini 2.5, LLAMA 3.3 70B, Gemma-27b (preview). No single LLM vendor lock-in.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;AI Sync for Linked Models&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;TML model updates require manual revalidation and redeployment of AI experiences. No automatic sync or re-validation mechanism when upstream semantic definitions change. Data engineering team must manage AI experience consistency manually.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;AI Sync for Linked Models (Feb 2026): Strategy pre-validates publication status across connected Mosaic models, flags inactive elements in real time, and automatically re-enables AI when models update. Zero manual maintenance of AI experiences as the semantic layer evolves.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;td-dim&quot;&gt;Unstructured data in AI agents&lt;/td&gt;
&lt;td class=&quot;td-d&quot; style=&quot;box-shadow:inset 3px 0 0 rgba(28,92,238,0.4);background:rgba(28,92,238,0.04)&quot;&gt;Spotter 3 (Sept 2025) connects to structured and unstructured data sources including Slack, Salesforce, and Jira — a genuine capability. ✓ ThoughtSpot strength for unstructured data from SaaS apps.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;AI Agents (Jan 2026) answer questions about documents, PDFs, text files, and unstructured content alongside governed structured BI data — in the same agent conversation. Both structured and unstructured in one governed context.&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;main arc-cmp-content&quot; id=&quot;arc-cmp-content&quot;&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;0&quot; data-theme=&quot;blue&quot; style=&quot;border-top:none;&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;01&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Tableau at a glance&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;snapshot&quot;&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Core identity&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Salesforce Analytics Platform&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul&gt;&lt;li&gt;Visual analytics platform widely associated with drag-and-drop exploratory BI.&lt;/li&gt;&lt;li&gt;Powered by the VizQL engine with strong authoring and chart recommendation workflows.&lt;/li&gt;&lt;li&gt;Tableau Next expands the story with composable architecture, unified semantics, and broader data integration.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Gartner MQ 2025&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Leader — 13 consecutive years&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul&gt;&lt;li&gt;Leader in the Gartner MQ for Analytics and BI Platforms for 13 consecutive years.&lt;/li&gt;&lt;li&gt;Recognized for visual analytics strength, Tableau Prep, and automated insight capabilities.&lt;/li&gt;&lt;li&gt;Common cautions include Salesforce ecosystem dependency and licensing complexity.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;AI posture&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Tableau Pulse + Tableau Agent&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul&gt;&lt;li&gt;Tableau Pulse delivers proactive metric monitoring with AI summaries.&lt;/li&gt;&lt;li&gt;Tableau Agent and Tableau Semantics extend the conversational and semantic story in Tableau Next.&lt;/li&gt;&lt;li&gt;The fullest AI story is tied to Tableau+, Data Cloud, Einstein, and the broader Salesforce ecosystem.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Key architectural reality&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Visualisation tool + Salesforce ecosystem&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul&gt;&lt;li&gt;Tableau is primarily a delivery and visualisation surface rather than a full semantic layer platform.&lt;/li&gt;&lt;li&gt;Its AI roadmap is closely tied to Salesforce Data Cloud, Einstein, Slack, and Tableau+.&lt;/li&gt;&lt;li&gt;Server, Cloud, and Next each bring different capability, licensing, and architecture considerations.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;section-zone&quot; data-section=&quot;1&quot; data-theme=&quot;amber&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;02&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Where they genuinely overlap&lt;/span&gt;&lt;/div&gt;
&lt;p style=&quot;font-size:18px;color:var(--grey-text);margin-bottom:20px;line-height:1.65;&quot;&gt;Tableau is the world's most recognised BI brand, and for good reason. Its visualisation depth, drag-and-drop UX, and community are industry benchmarks. The competitive question is not &quot;is Tableau good at charts?&quot; It clearly is. The question is: &lt;em style=&quot;color:var(--dark)&quot;&gt;what happens to enterprise data governance when your semantic layer and your BI delivery tool are two different products from two different companies — and the AI features of your BI tool now require a third company's (Salesforce's) ecosystem to be fully unlocked?&lt;/em&gt; And the TCO question: &lt;em style=&quot;color:var(--dark)&quot;&gt;what does it actually cost to run a governed analytics platform with Tableau at the centre?&lt;/em&gt;&lt;/p&gt;
&lt;div class=&quot;overlap-grid&quot;&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have &lt;strong&gt;sustained Gartner MQ recognition&lt;/strong&gt; in Analytics and BI Platforms — Tableau is a 2025 Gartner Leader for 13 consecutive years; Strategy Mosaic is a 2025 Gartner Visionary, recognised for composable analytics, analytics governance, and AI+BI integration. Different quadrant positions, different strength axes.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both deliver &lt;strong&gt;interactive dashboards&lt;/strong&gt; — Tableau via VizQL drag-and-drop; Strategy Mosaic via governed dashboards on Mosaic. Tableau's visualisation depth and chart variety remain the market standard for exploratory analytics.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have a &lt;strong&gt;proactive AI analytics story&lt;/strong&gt; — Tableau Pulse (metric monitoring, Slack/Teams/email); Strategy Mosaic Auto AI Suite (Auto Answers in dashboards, AI Agents, Auto Voice).&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;embedded analytics&lt;/strong&gt; — Tableau Embedded for ISV/OEM; Strategy Mosaic embedded + HyperIntelligence (zero-code injection into any web app — unique to Strategy).&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;multi-cloud deployment&lt;/strong&gt; — Tableau across Azure, AWS, GCP; Strategy Mosaic on AWS, Azure, GCP, StackIT, and on-premises with Managed Cloud Enterprise.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both serve &lt;strong&gt;enterprise data preparation&lt;/strong&gt; needs — Tableau Prep for data preparation before Tableau; Strategy Mosaic Mosaic Studio for AI-powered semantic model creation directly at the semantic layer.&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;section-zone alt&quot; data-section=&quot;2&quot; data-theme=&quot;purple&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How Strategy wins&lt;/span&gt;&lt;/div&gt;
&lt;p class=&quot;win-intro&quot;&gt;Tableau is the world's best visualisation tool. That is the honest starting position. Strategy Mosaic does not compete on drag-and-drop chart creation. Strategy Mosaic competes on what sits underneath the charts, what governs them, and what the full enterprise analytics platform costs versus buying Tableau plus a semantic layer plus a governance tool plus a compliance tool.&lt;/p&gt;
&lt;div class=&quot;win-grid&quot;&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;01 / The governance seam&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;One governed platform vs semantic layer + Tableau + governance tool&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Tableau&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Tableau is a delivery surface.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Its semantic foundation — whether Tableau's own embedded data model, dbt Semantic Layer, AtScale, Cube, or Mosaic — is a separate product.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Tableau AI Semantics (Tableau Next) adds an AI contextual layer for VizQL, but it is built around Tableau's visualisation engine, not an independent governed semantic platform.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;The governance seam is structural: once a metric definition leaves the semantic layer and enters a Tableau workbook, the certified definition is not automatically enforced.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;An analyst can create an ad-hoc calculated field that contradicts the governing definition — and Tableau has no mechanism to prevent it.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic + Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Strategy Mosaic includes Mosaic as the universal semantic layer and Strategy Mosaic as the delivery surface — the same product.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;The certified Mosaic metric that defines &quot;Revenue&quot; governs the dashboard, the mobile app, the AI agent, and the embedded analytics surface simultaneously.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic Sentinel (Jan 2026) provides cross-surface Risk Management, Audit &amp; Compliance (GDPR/HIPAA/SOX), and Usage Insights.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;There is no seam between semantic definition and consumption — because they are the same product.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;An analyst cannot redefine Revenue in a dashboard by creating a conflicting calculated field; the semantic layer enforces the certified definition.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The governance seam question&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;How do you ensure that the Revenue metric in Tableau — including every calculated field created by every analyst in every workbook — is the same certified definition that governs the mobile app and the AI agent? And how do you audit that guarantee?&quot; In Tableau, this requires governance process discipline and tooling outside Tableau. In Strategy Mosaic, the semantic object enforces it by design and Sentinel audits it automatically.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;02 / Salesforce ecosystem dependency&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Open multi-cloud platform vs Salesforce ecosystem lock-in&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Tableau&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Tableau's AI capabilities — Pulse, Agent, Semantics, Agentforce, Einstein Discovery — are progressively tied to Salesforce Data Cloud, Einstein, and Slack.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Gartner MQ 2025 explicitly notes &quot;licensing complexities and challenges when integrating Tableau outside the Salesforce environment.&quot; Customers not in the Salesforce ecosystem receive a reduced product — strong visualisation without the full AI and proactive analytics story.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Three deployment models (Tableau Server, Tableau Cloud, Tableau Next) have distinct feature sets, pricing structures, and AI capability availability — requiring architectural decisions that carry long-term lock-in implications.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic + Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Strategy Mosaic runs on AWS, Azure, GCP, StackIT, and on-premises.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;MCP (Jan 2026) connects AI agents to certified Mosaic metrics from ChatGPT, Claude, Copilot Studio, Gemini, and AWS — not tied to any single AI vendor.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;BYOE (Bring Your Own Endpoint) for LLMs means organisations bring their preferred model. 200+ connectors cover Salesforce, SAP, Oracle, Workday, and 196 others without requiring Salesforce ownership.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Strategy's AI story works identically whether the customer runs Microsoft Azure, AWS, or a regional sovereign cloud.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ecosystem independence ask&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;How much of the Tableau AI story — Pulse, Agent, Agentforce — requires Salesforce Data Cloud or Slack to be in our stack? And what is the roadmap for Tableau features that are not part of the Salesforce platform?&quot; For enterprises in the Middle East and emerging markets running AWS or Azure without Salesforce, the honest answer from Tableau's own documentation is: the full AI story requires significant Salesforce investment. Strategy Mosaic delivers the same AI capability on any cloud and with any LLM.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;03 / Enterprise reporting depth&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Full reporting platform vs visualisation-first tool&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Tableau&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Tableau is the world standard for interactive visual exploration — drag-and-drop, VizQL engine, Show Me chart recommendations, calculated fields, LOD expressions, set actions.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Its exploratory analytics depth is unmatched.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;However, pixel-perfect formatted enterprise reports are not Tableau's primary design.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Tableau's native export produces image snapshots or basic downloads without pagination, headers/footers, or brand consistency.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Third-party extensions are required for compliance-ready paginated output — adding cost, deployment complexity, and a dependency on an extension vendor not operated by Salesforce/Tableau.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;High-volume burst reporting to thousands of users simultaneously requires careful Tableau Server sizing and workbook optimisation.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic + Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Strategy Mosaic was purpose-built for enterprise reporting at scale from its first release in 1994: pixel-perfect formatted output natively, high-volume scheduled delivery (burst reporting to tens of thousands of users simultaneously), complex report books, regulatory output formats, and consistent headers/footers/branding — with no third-party extension required.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;The same platform delivers Auto Dashboards (AI-generated, Feb 2026), interactive BI, and HyperIntelligence contextual cards — all governed by Mosaic. 25+ years of production deployments at banks, telcos, regulators, and government agencies globally.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The enterprise reporting ask&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;How do you deliver a formatted regulatory report to 10,000 branch employees every morning — with row-level security, regional filtering, multi-language support, PDF output, pagination, and a complete delivery audit trail — using Tableau natively, without a third-party extension?&quot; The honest answer: Tableau requires Pixel Perfect or an equivalent extension, plus careful Server configuration. Strategy Mosaic delivers this natively. It was built for this use case before Tableau was founded.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;04 / Total cost of platform ownership&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;One platform bill vs Tableau + semantic layer + governance + compliance tools&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Tableau&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Tableau licensing: Viewer ~$15/user/month, Explorer ~$42/user/month, Creator ~$75/user/month (published pricing, subject to change — verify with Salesforce).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Tableau+ required for AI features (Pulse, Agent, Semantics).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;To run a governed enterprise analytics stack with Tableau: add a semantic layer product (dbt Cloud, Cube Cloud, AtScale, or Mosaic — each with its own license), add a governance/compliance tool (for regulated industry audit trails at the semantic level), and add Tableau Server infrastructure or Tableau Cloud hosting.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Metric sprawl — where &quot;Revenue&quot; means different things in different workbooks — is a documented Tableau governance challenge.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Gartner notes this in the MQ cautions.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic + Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Strategy Mosaic includes everything in a single platform: Mosaic universal semantic layer, BI reporting and dashboards, Auto AI Suite (agents, dashboards, voice), Mosaic Sentinel (governance intelligence — no separate governance tool), and HyperIntelligence (no separate embedded integration).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;One vendor, one contract, one support relationship, one platform team.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic's in-memory engine reduces Snowflake and Databricks compute bills — reducing one element of TCO that Tableau's purely push-based architecture cannot address.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;For a 1,000-user regulated enterprise, the 3-year total stack cost comparison (Tableau + semantic layer + governance vs Strategy Mosaic) is often the conversation that shifts the deal.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The TCO ask&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;What is the full 3-year total cost of running a governed analytics platform for 1,000 users with Tableau at the centre — including Tableau licensing (Creator/Explorer/Viewer tiers), Tableau+ for AI features, a governed semantic layer product, a compliance audit tool for SOX, and the Snowflake compute consumed by Tableau queries — versus Strategy Mosaic for the same users at the same governance standard?&quot; Build this comparison explicitly with the customer. The per-user Tableau headline number looks reasonable. The full governed enterprise stack comparison tells a different story.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;section-zone&quot; data-section=&quot;3&quot; data-theme=&quot;green&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;04&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Head-to-head comparison&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;hth-wrap&quot;&gt;
&lt;table class=&quot;hth-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;
&lt;th&gt;Dimension&lt;/th&gt;
&lt;th class=&quot;col-d&quot;&gt;Tableau (Salesforce)&lt;/th&gt;
&lt;th class=&quot;col-m&quot;&gt;Strategy Mosaic&lt;/th&gt;
&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Product scope&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Visualisation + agentic analytics (Tableau Next). Best-in-class exploratory BI and interactive dashboards. AI features require Tableau+ and Salesforce ecosystem for full story.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Full AI+BI platform: Mosaic semantic layer, enterprise reporting, dashboards, Auto AI Suite, HyperIntelligence, mobile — one governed product. 25+ years enterprise production.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Data visualisation&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;World standard — VizQL engine, drag-and-drop, LOD expressions, calculated fields, set actions. Widest chart variety, deepest exploratory analytics. one of the largest BI communities globally — largest talent pool in market. ✓ Tableau advantage&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Strong dashboards with AI-generated layouts (Auto Dashboards). Different primary strength — governed enterprise completeness over visual exploration depth.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Semantic layer&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Tableau AI Semantics (Tableau Next): AI contextual layer for VizQL. Not an independent universal semantic layer. Metric sprawl (different definitions across workbooks) is a documented governance challenge. Requires separate semantic layer product for enterprise governance.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Mosaic: certified first-class objects with lineage, governance, and security built in. Mosaic Sentinel cross-surface governance. 200+ connectors. Define once — enforced everywhere.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Governance &amp; audit&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Row-level security and permissions within Tableau. Analysts can create calculated fields overriding certified definitions — no semantic enforcement boundary. Tableau governance ends at the workbook boundary.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Mosaic Sentinel: Risk Management, Audit &amp; Compliance (GDPR/HIPAA/SOX), Usage Insights at semantic object level across every surface. Certified definitions enforced — analysts cannot override them.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Enterprise reporting&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Not designed as a primary enterprise reporting platform. Pixel-perfect paginated output at scale requires additional tooling or workarounds. High-volume burst reporting requires significant configuration overhead.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Purpose-built from 1994: pixel-perfect formatted output, burst reporting to tens of thousands natively, complex report books, regulatory formats — no extension required.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;AI analytics&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Tableau Pulse (proactive metric monitoring, Slack/Teams/email). Tableau Agent (conversational analytics). Einstein Discovery (predictive). Agentforce. Requires Tableau+ SKU + Salesforce ecosystem for full capability.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Auto AI Suite: AI Agents grounded in Mosaic certified metrics, Auto Dashboards, Auto Voice (low latency, parallel actions, Feb 2026), Auto Expert. MCP (Jan 2026): any AI platform. Works on any cloud.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Ecosystem dependency&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Deep Salesforce integration for AI features. Gartner MQ 2025 caution: licensing complexity outside Salesforce ecosystem. Three deployment options with distinct capabilities, pricing, and AI availability.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Multi-cloud (AWS, Azure, GCP, StackIT) + on-premises. BYOE LLM. MCP with any AI platform. 200+ connectors. No single ecosystem dependency. Works identically on any cloud.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;HyperIntelligence&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;No equivalent. Tableau delivers analytics inside Tableau. No zero-code mechanism to inject governed analytics into third-party web applications, CRMs, or ERPs without development work.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;HyperIntelligence: zero-code injection of governed analytics into any web app (SAP, Salesforce, Workday, email, portals). Governed — same Mosaic certified definitions apply. Unique to Strategy Mosaic.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Total platform cost&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Tableau tiers + Tableau+ for AI + separate semantic layer + separate governance tool + Tableau Server infrastructure or Cloud hosting. Metric sprawl governance requires process discipline or additional tooling.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Single platform: Mosaic + BI delivery + Auto AI Suite + Sentinel governance + HyperIntelligence. One contract. In-memory engine reduces downstream warehouse compute. No three-product stack.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Community &amp; talent&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Largest BI community globally — one of the largest BI communities globally, extensive certification, most abundant talent market. Tableau skills are easier to hire and develop than any other BI platform. ✓ Tableau advantage&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Established enterprise community; Strategy World annual conference. Talent pool smaller than Tableau. Advantage: platform knowledge depth over breadth.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Visualisation variety&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Widest chart library — bullet charts, Sankey diagrams, waterfall charts, geospatial, 40+ chart types natively. VizQL LOD expressions for advanced analytical calculations. Show Me recommendations. ✓ Tableau advantage&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Strong standard chart set. AI-generated visualisation layouts (Auto Dashboards). Not the primary competitive strength for chart variety.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;td-dim&quot;&gt;When Tableau wins&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Organisation already in Salesforce ecosystem. Deep Tableau skills internally. Visual exploration is primary use case. Existing Tableau investment not being replaced. Strong drag-and-drop self-service culture. Budget allows for semantic layer + governance tool additions separately.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Strategy Mosaic is not the right answer when Tableau is embedded in the org culture, the team has deep Tableau skills, the primary requirement is visual exploration, and the TCO of adding a separate semantic layer is acceptable.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td class=&quot;td-dim&quot;&gt;When Strategy Mosaic wins&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Strategy Mosaic is not the right answer when drag-and-drop visual exploration is the primary requirement, the team needs the widest chart library, Tableau skills are deeply embedded, and governance requirements are handled by the existing stack.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;One governed platform required. Regulated industry (banking, healthcare, government). Enterprise reporting at scale. Platform consolidation. Non-Salesforce ecosystem. HyperIntelligence use case. Full AI story without ecosystem dependency.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;LLM shielding &amp; hallucination prevention&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Tableau AI grounds answers on the Tableau data model and Einstein AI. No independent LLM shielding layer — AI accuracy depends on semantic definition quality within Tableau workbooks. Analysts can create calculated fields that contradict certified definitions; AI may use those overridden definitions.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;All AI answers grounded in Mosaic certified objects — not raw schema or workbook-level definitions. LLM shielding prevents AI bypassing governance. No sensitive data transmitted to third-party LLM providers when using offline or air-gapped deployment. Analysts cannot override certified metric definitions with calculated fields. Significantly reduces hallucinations through governed semantic grounding — AI operates only on certified definitions, not raw tables or unstructured SQL.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;BYOE — bring your own LLM endpoint&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Tableau AI capabilities (Pulse, Agent, Einstein Discovery, Agentforce) run on Salesforce Einstein infrastructure. No BYOE option as of April 2026 — customers are tied to Salesforce's LLM choices. No air-gapped or sovereign LLM deployment option for Tableau AI features. (Verify against Tableau Next roadmap — this is a fast-moving area.)&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;BYOE for Gemini 2.5 (Feb 2026) for both AI Agents and Auto Dashboards. Offline LLM models for air-gapped / sovereign environments (Jan 2026). Supported: Azure OpenAI, Gemini 2.5, LLAMA 3.3 70B, Gemma-27b (preview). Works on any cloud — no Salesforce dependency.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;AI Sync for Linked Models&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;No equivalent mechanism in Tableau. When Tableau data sources or calculated fields change, AI experiences built on top of them (Pulse metrics, Tableau Agent context) require manual review and update. No automated re-validation or re-enablement of AI features.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;AI Sync for Linked Models (Feb 2026): Strategy pre-validates publication status across connected Mosaic models, flags inactive elements in real time, and automatically re-enables AI when models update. Zero manual maintenance of AI experiences as the semantic layer evolves.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Unstructured data in AI agents&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;Tableau AI works on structured data sources only — Tableau data extracts, live connections, and Salesforce Data Cloud. No native capability for AI agents to answer questions about documents, PDFs, or unstructured content within the same platform.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;AI Agents (Jan 2026) answer questions about documents, PDFs, text files, and unstructured content alongside governed structured BI data — in the same governed agent conversation. Unstructured and structured in one context.&lt;/td&gt;
&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;
&lt;td class=&quot;td-dim&quot;&gt;Query execution &amp; warehouse cost&lt;/td&gt;
&lt;td class=&quot;td-d&quot;&gt;All Tableau queries push to the underlying data source — Snowflake, BigQuery, Redshift, or live connections. No independent in-memory execution engine. At high concurrency (hundreds of users opening dashboards simultaneously), every session generates warehouse compute. Tableau extracts reduce live query load but require scheduled refresh and introduce data latency.&lt;/td&gt;
&lt;td class=&quot;td-m&quot;&gt;Hybrid execution engine: intelligent pushdown for live queries + independent in-memory engine for concurrent and repeated workloads. 500 users opening the same dashboard may generate one warehouse query. Always-on AI agents benefit from the same reuse. Directly reduces Snowflake and Databricks compute bills at scale — a documented cost-control advantage for large deployments.&lt;/td&gt;
&lt;/tr&gt;
&lt;/tbody&gt;
&lt;/table&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

  /* Cube comparison section parity styles */
  .main { max-width: 1260px; margin: 0 auto; padding: 0 0 80px; overflow: visible; }
  .section-label {
    font-size: 14.3px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: var(--font-mono);
    position: relative;
  }
  .section-label .sl-counter { font-size: 11px; color: var(--orange); flex-shrink: 0; }
  .section-label .sl-accent { width: 4px; height: 22px; background: var(--orange); border-radius: 2px; flex-shrink: 0; }
  .section-label::after { content: &#x27;&#x27;; flex: 1; height: 1.5px; background: linear-gradient(90deg, var(--border) 0%, transparent 100%); }
  .section-zone { padding: 44px 64px; border-top: 1px solid var(--border); }
  .section-zone.alt { background: var(--bg-section); }
  .section-zone[data-theme=&quot;orange&quot;] { border-left: 4px solid var(--orange); }
  .section-zone[data-theme=&quot;blue&quot;] { border-left: 4px solid var(--blue); }
  .section-zone[data-theme=&quot;green&quot;] { border-left: 4px solid var(--green); }
  .section-zone[data-theme=&quot;amber&quot;] { border-left: 4px solid var(--amber); }
  .section-zone[data-theme=&quot;purple&quot;] { border-left: 4px solid var(--purple); }
  .snapshot { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .snap-card {
    background: var(--bg-section); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 22px 24px; transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    border-left: 3px solid transparent;
  }
  .snap-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.1); border-left-color: var(--orange); }
  .snap-label { font-size: 12px; color: var(--grey-muted); margin-bottom: 6px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em; }
  .snap-value { font-size: 22px; font-weight: 800; color: var(--black); letter-spacing: -0.02em; }
  .snap-sub { font-size: 14.95px; color: var(--grey-text); margin-top: 4px; line-height: 1.5; }
  .snap-sub ul { margin: 0; padding-left: 18px; }
  .snap-sub li { margin: 0 0 4px 0; }
  .snap-sub li:last-child { margin-bottom: 0; }

  .overlap-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  .overlap-item {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; display: flex; gap: 10px; align-items: flex-start;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  .overlap-item:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
  .overlap-eq {
    width: 22px; height: 22px; border-radius: 50%; background: var(--amber-light); color: var(--amber);
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .point-text { font-size: 17.25px; color: var(--dark); line-height: 1.62; }
  .win-intro { font-size: 15.5px; color: var(--grey-text); margin-bottom: 20px; line-height: 1.72; max-width: 860px; }
  .win-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .win-card {
    background: linear-gradient(180deg, #ffffff 0%, #fff8f2 100%); border: 1px solid var(--orange-border);
    border-radius: var(--radius-lg); padding: 22px 24px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    transition: box-shadow 0.2s ease, transform 0.2s ease;

  .win-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
  .win-card::before { content: &#x27;&#x27;; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, var(--orange) 0%, #ff9a5c 100%); }
  .win-num { font-size: 11px; color: var(--orange); font-family: var(--font-mono); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .win-card-title { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: var(--black); margin-bottom: 14px; }
  .win-mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .win-mini { background: #fff; border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 14px 15px; }
  .win-mini-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; font-family: var(--font-mono); margin-bottom: 6px; }

  .win-mini-text { font-size: 15.525px; line-height: 1.62; color: var(--dark); }
  .win-why { background: rgba(250,102,15,0.08); border: 1px solid var(--orange-border); border-radius: var(--radius); padding: 13px 15px; }
  .win-why-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; font-family: var(--font-mono); color: var(--orange); margin-bottom: 5px; }
  .win-why-text { font-size: 15.525px; line-height: 1.66; color: var(--dark); }
  .hth-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
  .hth-table { width: 100%; border-collapse: collapse; }
  .hth-table thead { background: var(--bg-section); }
  .hth-table thead th { font-size: 11.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-muted); padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-family: var(--font-mono); }
  .hth-table thead th.col-d { color: var(--blue); }
  .hth-table thead th.col-m { color: var(--orange); }
  .hth-table tbody tr { border-bottom: 1px solid var(--border-soft); transition: background 0.15s ease; }
  .hth-table tbody tr:last-child { border-bottom: none; }
  .hth-table tbody tr:hover { background: var(--bg-section); }
  .hth-table tbody td { padding: 14px 18px; vertical-align: top; font-size: 16.7px; line-height: 1.62; }
  .hth-table tbody td ul { margin: 4px 0 0 16px; padding: 0; list-style: disc; font-size: 15.5px; line-height: 1.72; color: inherit; }
  .hth-table tbody td ul li { margin-bottom: 2px; }
  .td-dim { font-size: 11px; font-weight: 700; color: var(--grey-muted); letter-spacing: 0.07em; text-transform: uppercase; width: 12%; font-family: var(--font-mono); }
  .td-d { color: var(--dark); width: 36%; border-left: 3px solid transparent; }
  .td-m { color: var(--dark); width: 36%; border-left: 3px solid transparent; }

  .hth-table tbody tr.mosaic-win td.td-m { background: rgba(250,102,15,0.05); box-shadow: inset 3px 0 0 rgba(250,102,15,0.28); }
  .hth-table tbody tr.mosaic-win:hover td.td-m { background: rgba(250,102,15,0.09); box-shadow: inset 3px 0 0 rgba(250,102,15,0.38); }
  @media (max-width: 1100px) { .snapshot, .overlap-grid, .win-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 760px) {
    .section-zone { padding-left: 22px; padding-right: 22px; }

  }

&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;01&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Power BI at a glance&lt;/span&gt;&lt;/div&gt;

&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Core identity&lt;/div&gt;

&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Power BI is the analytics and BI delivery layer of Microsoft Fabric.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;30 million monthly active users (Microsoft, June 2025). 10th anniversary in 2025.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Most widely adopted BI tool globally — dominant in Microsoft-ecosystem organisations.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Full AI and governance story requires Azure Fabric, Purview (M365 E5+), and Azure OpenAI.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
