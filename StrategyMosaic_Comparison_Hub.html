&lt;!-- L02 SEMANTIC LAYER --&gt;
&lt;div class=&quot;layer&quot;&gt;
  &lt;div class=&quot;lhead&quot;&gt;
    &lt;div class=&quot;lline&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;lnum&quot;&gt;02&lt;/div&gt;
    &lt;div class=&quot;ltitle&quot;&gt;Semantic Layer &amp; Execution — Most Different&lt;/div&gt;
    &lt;div class=&quot;lbadge badge-diff&quot;&gt;Where they structurally diverge&lt;/div&gt;
    &lt;div class=&quot;lline&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;split-row&quot;&gt;
    &lt;div class=&quot;band band-a&quot;&gt;
      &lt;div class=&quot;band-kicker&quot;&gt;
        &lt;span class=&quot;band-label&quot;&gt;AtScale — Universal Semantic Layer (SML)&lt;/span&gt;
        &lt;span class=&quot;pill pill-a&quot;&gt;Warehouse-push · Aggregate acceleration&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;big-node&quot; data-t=&quot;AtScale — SML Semantic Engine&quot; data-b=&quot;Intercepts BI and AI queries, translates against SML definitions, generates optimised SQL pushed to the data platform. Aggregates (auto + user-defined) reduce repeated warehouse compute. SML: YAML-based, Apache-licensed, Git-connected, CI/CD native.&quot; data-i=&quot;Execution stays in the warehouse. AtScale makes warehouse queries faster and more consistent — but compute cost lives in the cloud platform. Aggregate acceleration is genuine, not a passthrough.&quot;&gt;
        &lt;div class=&quot;big-title&quot;&gt;SML Semantic Engine + Query Translation + Aggregate Acceleration&lt;/div&gt;
        &lt;div class=&quot;big-sub&quot;&gt;Inbound queries resolved against SML, translated to optimised SQL, pushed to warehouse. Aggregates reduce repeated compute. Data never leaves the platform.&lt;/div&gt;
        &lt;div class=&quot;sub-grid&quot;&gt;
          &lt;div class=&quot;sub-node acc-a&quot; data-t=&quot;SML — Open-Source Semantic Model&quot; data-b=&quot;YAML-based, Apache-licensed, GitHub-published (Sept 2024). SML v1.6: SDK, CLI, semantic converters for Snowflake Cortex, Databricks UC Metrics, Power BI. Git CI/CD native. Covers metrics, dims, hierarchies, semi-additive measures, many-to-many, cell expressions.&quot; data-i=&quot;SML is AtScale&#x27;s strongest openness argument. Models are portable by design — not locked inside a proprietary UI. One of their clearest competitive strengths.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(24,95,165,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#185FA5&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;polyline points=&quot;16 18 22 12 16 6&quot;/&gt;&lt;polyline points=&quot;8 6 2 12 8 18&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;SML — Open-Source Model&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;Apache-licensed · YAML · GitHub&lt;/li&gt;&lt;li&gt;SDK, CLI, semantic converters&lt;/li&gt;&lt;li&gt;Git CI/CD native&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
          &lt;div class=&quot;sub-node acc-a&quot; data-t=&quot;Query Translation &amp; Pushdown Engine&quot; data-b=&quot;Intercepts MDX, DAX, SQL, XMLA (from BI tools) and MCP (from AI agents). Translates against SML semantic model. Generates optimised SQL for execution in the data platform. No data extracted — all compute in the warehouse.&quot; data-i=&quot;Clean warehouse-push architecture. Tradeoff: every query ultimately runs warehouse compute. High-frequency AI agent workloads can drive warehouse cost unpredictably unless aggregates cover them.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(24,95,165,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#185FA5&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;10&quot;/&gt;&lt;path d=&quot;m16 12-4-4-4 4M12 8v8&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;Query Translation &amp; Pushdown&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;MDX · DAX · SQL · XMLA · MCP&lt;/li&gt;&lt;li&gt;Optimised SQL to data platform&lt;/li&gt;&lt;li&gt;Execution stays in warehouse&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
          &lt;div class=&quot;sub-node acc-a&quot; data-t=&quot;Intelligent Aggregates &amp; Caching&quot; data-b=&quot;Standard aggregates are stored in the data platform. As of May 2025, AtScale also offers In-Memory Aggregates — AI-selected, RAM-cached aggregates for sub-second performance. Standard aggregates remain warehouse-side; In-Memory Aggregates are a newer, separate caching layer.&quot; data-i=&quot;Core performance differentiator. Reduces warehouse compute for predictable workloads. Gap vs Mosaic: aggregates are warehouse-side — high-concurrency or unpredictable AI agent traffic still generates warehouse compute.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(24,95,165,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#185FA5&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M13 2L3 14h9l-1 8 10-12h-9l1-8z&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;Intelligent Aggregates&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;Auto + user-defined aggregates&lt;/li&gt;&lt;li&gt;Result cache for repeated queries&lt;/li&gt;&lt;li&gt;Stored in the data platform&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
          &lt;div class=&quot;sub-node acc-a&quot; data-t=&quot;One-Click Modeling &amp; Composite Modeling (2025)&quot; data-b=&quot;One-Click Modeling: AI scans source data, auto-creates SML objects and relationships — eliminates manual configuration. Composite Modeling: inherit and extend existing models across teams while maintaining a single source of truth. Reduces specialist engineering bottleneck.&quot; data-i=&quot;Genuine 2025 capability — addresses the implementation dependency risk. Reduces the specialist modeling bottleneck that was previously a weakness in AtScale&#x27;s story.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(24,95,165,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#185FA5&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M12 2a10 10 0 1 0 10 10&quot;/&gt;&lt;path d=&quot;M12 6v6l4 2&quot;/&gt;&lt;path d=&quot;M20 2l-4 4 4 4V2z&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;One-Click Modeling (2025)&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;AI auto-creates SML objects&lt;/li&gt;&lt;li&gt;Composite — inherit &amp; extend&lt;/li&gt;&lt;li&gt;Reduces engineering dependency&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;node-note note-a&quot;&gt;Execution stays in the warehouse. Aggregates reduce compute — but they live in the data platform, not an independent engine.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;band band-m&quot;&gt;
      &lt;div class=&quot;band-kicker&quot;&gt;
        &lt;span class=&quot;band-label&quot;&gt;Mosaic — Certified Semantic Objects + Hybrid Engine&lt;/span&gt;
        &lt;span class=&quot;pill pill-m&quot;&gt;First-class objects · In-memory reuse&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;big-node&quot; data-t=&quot;Mosaic — Certified Objects + Hybrid Execution&quot; data-b=&quot;Semantic layer stores metrics, attributes, hierarchies, and security as first-class certified objects — not SQL views or YAML. Hybrid execution: pushdown for live queries, independent in-memory engine for repeated/concurrent workloads. 200 users open the same dashboard → warehouse may be queried once.&quot; data-i=&quot;Fundamental architectural difference: AtScale accelerates warehouse queries. Mosaic&#x27;s in-memory engine means repeated workloads can bypass the warehouse entirely. Critical for high-concurrency BI and unpredictable AI agent traffic.&quot;&gt;
        &lt;div class=&quot;big-title&quot;&gt;Certified Semantic Objects + Semantic Graph + Hybrid Execution Engine&lt;/div&gt;
        &lt;div class=&quot;big-sub&quot;&gt;Business definitions are first-class certified objects, not SQL views. Hybrid execution: pushdown for live, in-memory reuse for concurrent workloads. Define once, governed everywhere.&lt;/div&gt;
        &lt;div class=&quot;sub-grid&quot;&gt;
          &lt;div class=&quot;sub-node acc-m&quot; data-t=&quot;Certified Semantic Objects (First-Class)&quot; data-b=&quot;Metrics, attributes, hierarchies, KPIs, and security exist as independent certified objects — not SQL views or YAML. &#x27;Revenue&#x27; is a certified object with lineage and security. It cannot be redefined by a BI tool. Same object powers Tableau, Power BI, MCP agents, and mobile — identically.&quot; data-i=&quot;Clearest architectural difference from AtScale. In AtScale, SML defines the semantic layer in YAML — excellent portability. In Mosaic, the object has certification and lineage that travels through every downstream surface. Governance is part of the object.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(216,90,48,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#D85A30&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;3&quot;/&gt;&lt;circle cx=&quot;3&quot; cy=&quot;6&quot; r=&quot;2&quot;/&gt;&lt;circle cx=&quot;21&quot; cy=&quot;6&quot; r=&quot;2&quot;/&gt;&lt;circle cx=&quot;3&quot; cy=&quot;18&quot; r=&quot;2&quot;/&gt;&lt;circle cx=&quot;21&quot; cy=&quot;18&quot; r=&quot;2&quot;/&gt;&lt;path d=&quot;M5 6h5M14 6h5M5 18h5M14 18h5M10 12H5M14 12h5&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;Certified Semantic Objects&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;Metrics — first-class, not SQL views&lt;/li&gt;&lt;li&gt;Certification, lineage, security built in&lt;/li&gt;&lt;li&gt;Define once · governed everywhere&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
          &lt;div class=&quot;sub-node acc-m&quot; data-t=&quot;Hybrid Execution Engine — Pushdown + In-Memory&quot; data-b=&quot;Pushdown for live queries. Independent in-memory semantic engine for repeated and concurrent workloads. 200 users hit the same Revenue dashboard at 8am: warehouse may be queried once — subsequent results from in-memory engine. AI agent queries against certified metrics also benefit from this reuse.&quot; data-i=&quot;This is the cost control argument at scale. AtScale&#x27;s aggregate acceleration is warehouse-side. Mosaic&#x27;s in-memory engine is independent — concurrent queries and AI agent workloads can be absorbed without incremental warehouse compute.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(216,90,48,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#D85A30&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;polygon points=&quot;13 2 3 14 12 14 11 22 21 10 12 10 13 2&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;Hybrid Execution Engine&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;Pushdown for live queries&lt;/li&gt;&lt;li&gt;In-memory reuse for concurrent&lt;/li&gt;&lt;li&gt;200 users → warehouse hit once&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
          &lt;div class=&quot;sub-node acc-m&quot; data-t=&quot;Mosaic Sentinel — Unified Governance (Jan 2026)&quot; data-b=&quot;Three modules: Risk Management (real-time anomaly detection, intelligent scoring), Audit &amp; Compliance (complete trail across every surface — GDPR, HIPAA, SOX), Usage Insights (utilisation monitoring, model optimisation). Governance applies across BI, embedded, mobile, and AI outputs.&quot; data-i=&quot;Sentinel extends governance beyond the semantic model into every consumption surface — because delivery is the same platform. AtScale&#x27;s governance ends at the semantic layer boundary.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(216,90,48,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#D85A30&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z&quot;/&gt;&lt;path d=&quot;m9 12 2 2 4-4&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;

          &lt;/div&gt;
          &lt;div class=&quot;sub-node acc-g&quot; data-t=&quot;Mosaic Studio — AI-Powered Modeling&quot; data-b=&quot;AI analyzes source schemas, auto-creates semantic objects and relationships, detects duplicates, generates Python queries. Up to 10× faster than manual modeling. Model linking connects disparate Mosaic models. Business teams can build production-ready models without deep engineering dependency.&quot; data-i=&quot;Comparable to AtScale&#x27;s One-Click Modeling as an AI modeling accelerator. The difference: Mosaic Studio operates on certified objects that carry governance downstream. AtScale&#x27;s One-Click Modeling generates SML YAML that feeds the warehouse-push engine.&quot;&gt;

&lt;!-- L03 GOVERNANCE &amp; AI --&gt;
&lt;div class=&quot;layer alt&quot;&gt;
  &lt;div class=&quot;lhead&quot;&gt;

    &lt;div class=&quot;ltitle&quot;&gt;Governance Scope &amp; AI Access&lt;/div&gt;

  &lt;div class=&quot;split-row&quot;&gt;
    &lt;div class=&quot;band band-a&quot;&gt;
      &lt;div class=&quot;band-kicker&quot;&gt;
        &lt;span class=&quot;band-label&quot;&gt;AtScale — Semantic-layer governance + MCP&lt;/span&gt;
        &lt;span class=&quot;pill pill-a&quot;&gt;RBAC · impersonation · DSO pricing&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;big-node&quot; data-t=&quot;AtScale Governance &amp; AI Access&quot; data-b=&quot;RBAC, RLS, column masking, audit logs enforced at AtScale semantic layer. Query impersonation passes user credentials to the underlying platform — warehouse-level RLS preserved. MCP Server: interoperable with Claude, ChatGPT, custom agents. Integrated with Databricks MCP Marketplace, Agent Bricks, Snowflake Cortex Analyst, Databricks AI/BI Genie.&quot; data-i=&quot;Governance is real and production-grade. Impersonation preserves warehouse-level RLS — not a data exfiltration risk. The gap: once results enter Tableau, Power BI, or a third-party AI tool, AtScale&#x27;s policies no longer apply.&quot;&gt;
        &lt;div class=&quot;big-title&quot;&gt;Semantic-Layer Governance + MCP AI Access&lt;/div&gt;
        &lt;div class=&quot;big-sub&quot;&gt;RBAC, RLS, masking at semantic layer. Query impersonation preserves warehouse-level security. MCP gives governed metric access to AI agents.&lt;/div&gt;
        &lt;div class=&quot;sub-grid&quot;&gt;
          &lt;div class=&quot;sub-node acc-a&quot; data-t=&quot;AtScale Governance Controls&quot; data-b=&quot;RBAC, row-level security, column masking, audit logging within the semantic layer. Query impersonation passes user credentials to the data platform — warehouse RLS policies preserved at source. Governance scope: within the AtScale boundary only. External BI tool modifications are outside AtScale&#x27;s scope.&quot; data-i=&quot;The precision that matters in customer conversations: impersonation preserves warehouse-level RLS. The governance seam is at the BI consumption layer — not at the warehouse query layer. Keep this tight.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(24,95,165,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#185FA5&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;Governance Controls&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;RBAC, RLS, column masking&lt;/li&gt;&lt;li&gt;Query impersonation → warehouse RLS&lt;/li&gt;&lt;li&gt;Scope: semantic layer boundary&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
          &lt;div class=&quot;sub-node acc-a&quot; data-t=&quot;AtScale MCP Server &amp; AI Integrations&quot; data-b=&quot;MCP Server: interoperable with Claude, ChatGPT, custom copilots. Exposes governed SML metric definitions, hierarchies, and relationships to AI agents — eliminates hallucinations on structured business queries. Integrated with: Databricks MCP Marketplace, Databricks Agent Bricks, Snowflake Cortex Analyst, Databricks AI/BI Genie.&quot; data-i=&quot;MCP and AI integrations are real, production-deployed, credible. Key question: when AtScale&#x27;s MCP surfaces an insight, where does it go? Who sees it? Is it auditable? AtScale gets the AI answer right. Mosaic gets it to the right person, in the right context, inside the governed platform.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(24,95,165,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#185FA5&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;rect x=&quot;2&quot; y=&quot;3&quot; width=&quot;20&quot; height=&quot;14&quot; rx=&quot;2&quot;/&gt;&lt;path d=&quot;m8 21 8-8&quot;/&gt;&lt;path d=&quot;m16 21-8-8&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;MCP Server &amp; AI Access&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;Claude · ChatGPT · custom agents&lt;/li&gt;&lt;li&gt;Databricks Agent Bricks · Cortex Analyst · Genie&lt;/li&gt;&lt;li&gt;AI queries governed SML definitions&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;boundary boundary-a&quot;&gt;Governance ends at the semantic layer — external BI tools and AI outputs operate outside AtScale&#x27;s policy scope&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;band band-m&quot;&gt;
      &lt;div class=&quot;band-kicker&quot;&gt;
        &lt;span class=&quot;band-label&quot;&gt;Mosaic — Same-platform governance + AI delivery&lt;/span&gt;
        &lt;span class=&quot;pill pill-m&quot;&gt;Sentinel · LLM shielding · MCP&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;big-node&quot; data-t=&quot;Mosaic Governance &amp; AI Access&quot; data-b=&quot;Governance policy on the semantic object travels into every consumption surface — dashboards, embedded, mobile, AI answers — because delivery is the same platform. MCP (Jan 2026): Strategy AI Agents from ChatGPT, Claude, Copilot, Gemini, AWS using certified metric definitions. Auto AI Suite: AI Agents, Auto Dashboards, Auto Voice (lower latency, parallel actions), Auto Expert. LLM shielding prevents AI bypassing governance.&quot; data-i=&quot;Mosaic&#x27;s AI goes beyond getting the answer right — it delivers the answer inside the governed analytics platform where decisions are made. Dashboards, alerts, scorecards, and embedded experiences carry AI-grounded insights within the same governance framework.&quot;&gt;
        &lt;div class=&quot;big-title&quot;&gt;Same-Platform Governance + AI-Safe Delivery&lt;/div&gt;
        &lt;div class=&quot;big-sub&quot;&gt;Governance travels from semantic definition through last-mile delivery — same platform. AI grounded in certified metrics, not raw queries.&lt;/div&gt;
        &lt;div class=&quot;sub-grid&quot;&gt;
          &lt;div class=&quot;sub-node acc-p&quot; data-t=&quot;Mosaic Sentinel — Unified Governance Intelligence&quot; data-b=&quot;Risk Management: real-time anomaly detection and risk scoring. Audit &amp; Compliance: complete trail of who accessed what data through which surface — GDPR, HIPAA, SOX. Usage Insights: semantic layer utilisation monitoring and model optimisation. No data movement. Covers BI, embedded, mobile, and AI outputs.&quot; data-i=&quot;Sentinel&#x27;s differentiator: governance intelligence covers every consumption surface, not just the semantic layer. Usage Insights shows which semantic objects are actually used — enabling model hygiene AtScale&#x27;s governance doesn&#x27;t provide at this breadth.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(83,74,183,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#534AB7&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z&quot;/&gt;&lt;path d=&quot;m9 12 2 2 4-4&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;Mosaic Sentinel (Jan 2026)&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;Risk Management — real-time alerts&lt;/li&gt;&lt;li&gt;Audit &amp; Compliance — GDPR/HIPAA/SOX&lt;/li&gt;&lt;li&gt;Usage Insights — model utilisation&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
          &lt;div class=&quot;sub-node acc-g&quot; data-t=&quot;Mosaic MCP &amp; Auto AI Suite&quot; data-b=&quot;MCP (Jan 2026): Strategy Agents from ChatGPT, Claude, Copilot Studio, Gemini, AWS — using certified metric definitions. Feb 2026 Preview: direct Mosaic model access via MCP without agent intermediary. Auto AI Suite: AI Agents with Mosaic model integration, Auto Dashboards, Auto Voice (lower latency, parallel actions), Auto Expert. LLM shielding — AI cannot bypass governance.&quot; data-i=&quot;AI delivered inside the governed analytics platform — not just returned to a chat window. Dashboards, alerts, scorecards, embedded experiences all carry AI-grounded insights within the same governance framework.&quot;&gt;
            &lt;div class=&quot;sn-icon&quot; style=&quot;background:rgba(15,110,86,.1)&quot;&gt;&lt;svg width=&quot;14&quot; height=&quot;14&quot; fill=&quot;none&quot; stroke=&quot;#0F6E56&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;rect x=&quot;2&quot; y=&quot;3&quot; width=&quot;20&quot; height=&quot;14&quot; rx=&quot;2&quot;/&gt;&lt;path d=&quot;M8 21h8M12 17v4&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
            &lt;div class=&quot;sn-title&quot;&gt;MCP + Auto AI Suite&lt;/div&gt;
            &lt;ul class=&quot;sn-list&quot;&gt;&lt;li&gt;MCP: Claude, ChatGPT, Copilot, Gemini, AWS&lt;/li&gt;&lt;li&gt;AI Agents · Auto Dashboards · Auto Voice&lt;/li&gt;&lt;li&gt;LLM shielding · governed AI grounding&lt;/li&gt;&lt;/ul&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;boundary boundary-m&quot;&gt;Governance travels end-to-end — semantic definition through last-mile delivery, same platform&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- L04 CONSUMPTION --&gt;
&lt;div class=&quot;layer&quot;&gt;
  &lt;div class=&quot;lhead&quot;&gt;
    &lt;div class=&quot;lline&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;lnum&quot;&gt;04&lt;/div&gt;
    &lt;div class=&quot;ltitle&quot;&gt;Consumption — The Defining Gap&lt;/div&gt;
    &lt;div class=&quot;lbadge badge-diff&quot;&gt;External delivery vs same-platform delivery&lt;/div&gt;
    &lt;div class=&quot;lline&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;con-grid&quot;&gt;
    &lt;div class=&quot;con-card con-shared&quot; data-t=&quot;Power BI &amp; Excel — Shared&quot; data-b=&quot;Both support Power BI and Excel. AtScale&#x27;s MDX/XMLA compatibility is best-in-class — Power BI and Excel behave as if connecting to SSAS. Native DAX live connectivity for Power BI. Mosaic also supports DAX and XMLA. Difference: AtScale governance stops at semantic layer — what a user does inside Power BI is outside AtScale&#x27;s scope.&quot; data-i=&quot;AtScale&#x27;s Microsoft stack compatibility is one of its clearest competitive strengths. For Microsoft-heavy estates, this is a serious argument. Don&#x27;t challenge it directly — reframe toward governed delivery completeness.&quot;&gt;
      &lt;div class=&quot;con-icon&quot; style=&quot;background:rgba(83,74,183,.1)&quot;&gt;&lt;svg width=&quot;15&quot; height=&quot;15&quot; fill=&quot;none&quot; stroke=&quot;#534AB7&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;rect x=&quot;2&quot; y=&quot;3&quot; width=&quot;20&quot; height=&quot;14&quot; rx=&quot;2&quot;/&gt;&lt;path d=&quot;M8 21h8M12 17v4&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
      &lt;div class=&quot;con-name&quot;&gt;Power BI &amp; Excel&lt;/div&gt;
      &lt;div class=&quot;con-sub&quot;&gt;MDX · DAX · XMLA live connectivity&lt;/div&gt;
      &lt;div class=&quot;con-tag tag-shared&quot;&gt;Shared&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;con-card con-shared&quot; data-t=&quot;Tableau &amp; BI Tools — Shared&quot; data-b=&quot;Both integrate with Tableau, Looker, ThoughtSpot, Sigma, Superset, Python notebooks. AtScale added native PGWire support in 2025 for plug-and-play with ThoughtSpot, Superset, Sigma. For AtScale, these BI tools ARE the delivery surface. For Mosaic, they are external connectors alongside native delivery.&quot; data-i=&quot;Both have credible BI interoperability. For AtScale, BI tools are the only delivery surface — customers must license and govern them separately. For Mosaic, BI tools are an option alongside native delivery.&quot;&gt;
      &lt;div class=&quot;con-icon&quot; style=&quot;background:rgba(83,74,183,.1)&quot;&gt;&lt;svg width=&quot;15&quot; height=&quot;15&quot; fill=&quot;none&quot; stroke=&quot;#534AB7&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;rect x=&quot;2&quot; y=&quot;7&quot; width=&quot;6&quot; height=&quot;10&quot; rx=&quot;1&quot;/&gt;&lt;rect x=&quot;9&quot; y=&quot;3&quot; width=&quot;6&quot; height=&quot;18&quot; rx=&quot;1&quot;/&gt;&lt;rect x=&quot;16&quot; y=&quot;10&quot; width=&quot;6&quot; height=&quot;7&quot; rx=&quot;1&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
      &lt;div class=&quot;con-name&quot;&gt;Tableau &amp; BI Tools&lt;/div&gt;
      &lt;div class=&quot;con-sub&quot;&gt;Tableau · Looker · ThoughtSpot · Superset&lt;/div&gt;
      &lt;div class=&quot;con-tag tag-shared&quot;&gt;Shared&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;con-card con-atscale&quot; data-t=&quot;AtScale — External-Only Delivery&quot; data-b=&quot;AtScale has no native dashboards, reports, scorecards, or mobile analytics. Delivery is entirely through external BI tools and MCP-compatible AI agents. Deliberate architectural choice: AtScale is the semantic and performance layer; customers use their existing tools for delivery. Commercial implication: customers separately license, deploy, and govern their BI tool.&quot; data-i=&quot;The clearest strategic gap vs Mosaic. AtScale is a great semantic layer — but requires a separate BI tool for every consumption surface. Who governs the BI tool? Who governs the AI agent output? AtScale&#x27;s answer: you do, with your existing tooling.&quot;&gt;
      &lt;div class=&quot;con-icon&quot; style=&quot;background:rgba(24,95,165,.1)&quot;&gt;&lt;svg width=&quot;15&quot; height=&quot;15&quot; fill=&quot;none&quot; stroke=&quot;#185FA5&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71&quot;/&gt;&lt;path d=&quot;M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
      &lt;div class=&quot;con-name&quot;&gt;External Delivery Only&lt;/div&gt;
      &lt;div class=&quot;con-sub&quot;&gt;No native dashboards · Customer licenses BI separately&lt;/div&gt;
      &lt;div class=&quot;con-tag tag-atscale&quot;&gt;AtScale only&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;con-card con-mosaic&quot; data-t=&quot;Mosaic — Native Delivery Included&quot; data-b=&quot;Mosaic includes native dashboards, scorecards, reports, mobile (iOS/Android), embedded analytics, and HyperIntelligence (zero-code analytics injection into any web app) as part of the governed platform. The same governance policy that protects the semantic object applies in the dashboard, mobile app, and AI answer — same product end to end.&quot; data-i=&quot;Native delivery is Mosaic&#x27;s structural advantage for consolidation conversations. When governance, BI, and AI delivery are the same product, the seam between semantic layer and consumption disappears. That seam is where enterprise governance consistently breaks down.&quot;&gt;
      &lt;div class=&quot;con-icon&quot; style=&quot;background:rgba(216,90,48,.1)&quot;&gt;&lt;svg width=&quot;15&quot; height=&quot;15&quot; fill=&quot;none&quot; stroke=&quot;#D85A30&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;rect x=&quot;2&quot; y=&quot;3&quot; width=&quot;20&quot; height=&quot;14&quot; rx=&quot;2&quot;/&gt;&lt;path d=&quot;M8 21h8M12 17v4&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
      &lt;div class=&quot;con-name&quot;&gt;Native Delivery Included&lt;/div&gt;
      &lt;div class=&quot;con-sub&quot;&gt;Dashboards · Scorecards · Mobile · Embedded&lt;/div&gt;
      &lt;div class=&quot;con-tag tag-mosaic&quot;&gt;Mosaic only&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- L05 THE CORE DIFFERENCE — ONE SENTENCE EACH --&gt;
&lt;div class=&quot;layer arch-reveal&quot; id=&quot;arc-summary&quot;&gt;
  &lt;div class=&quot;lhead&quot;&gt;
    &lt;div class=&quot;lline&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;lnum&quot;&gt;05&lt;/div&gt;
    &lt;div class=&quot;ltitle&quot;&gt;The Core Difference — One Sentence Each&lt;/div&gt;
    &lt;div class=&quot;lbadge badge-split&quot;&gt;Summary&lt;/div&gt;
    &lt;div class=&quot;lline&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;arc-summary-grid&quot;&gt;

    &lt;div class=&quot;arc-sum-card d arch-reveal&quot;
      data-t=&quot;AtScale in One Sentence&quot;
      data-b=&quot;AtScale is a warehouse-centered universal semantic layer. Business definitions are modeled once in open-source SML (Apache-licensed, YAML-based, GitHub-published September 2024). Inbound queries from BI tools — MDX, DAX, SQL, XMLA — and AI agents via MCP are translated against the SML model and executed as optimised SQL against the underlying cloud data platform. Performance is accelerated through intelligent warehouse-side aggregates and In-Memory Aggregates (announced May 2025 — cache frequently queried results in RAM inside AtScale engine). Delivery is entirely through external BI tools and MCP-compatible AI agents. No native BI or analytics surface included. Source: atscale.com; BusinessWire May 29 2025 (2025 Semantic Layer Summit); atscale.com/pricing; github.com/semanticdatalayer/SML.&quot;
      data-i=&quot;AtScale solves the business definition consistency problem for warehouse-first teams who want openness and portability. It does not solve the governed last-mile delivery problem — consumption still requires a separate BI tool or AI interface. That is where the Mosaic conversation begins.&quot;&gt;
      &lt;div class=&quot;arc-sum-head&quot;&gt;
        &lt;div class=&quot;arc-sum-icon&quot; style=&quot;background:var(--blue-light);&quot;&gt;
          &lt;svg fill=&quot;none&quot; height=&quot;16&quot; stroke=&quot;var(--blue)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;16&quot;&gt;&lt;polyline points=&quot;16 18 22 12 16 6&quot;&gt;&lt;/polyline&gt;&lt;polyline points=&quot;8 6 2 12 8 18&quot;&gt;&lt;/polyline&gt;&lt;/svg&gt;
        &lt;/div&gt;
        AtScale is a Semantic Modeling Platform
      &lt;/div&gt;
      &lt;div class=&quot;arc-sum-body&quot;&gt;&amp;ldquo;Model business logic once in open SML &amp;mdash; serve it consistently to every BI tool and every AI agent, with warehouse-optimised execution.&amp;rdquo; AtScale wins when the challenge is semantic standardisation across a warehouse-first stack with existing BI tool investments that are not being replaced.&lt;/div&gt;
      &lt;div class=&quot;arc-tag-row&quot;&gt;
        &lt;span class=&quot;arc-tag d&quot;&gt;Warehouse-First Execution&lt;/span&gt;
        &lt;span class=&quot;arc-tag d&quot;&gt;Open-Source SML&lt;/span&gt;
        &lt;span class=&quot;arc-tag d&quot;&gt;External BI &amp;amp; AI Delivery&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;arc-sum-card m arch-reveal&quot;
      data-t=&quot;Strategy Mosaic in One Sentence&quot;
      data-b=&quot;Mosaic is a governed semantic platform where certified business objects — metrics, attributes, hierarchies, and security — are defined once and travel through the same product into every consumption surface: dashboards, scorecards, mobile, embedded analytics, and AI agents. Hybrid execution combines live SQL pushdown with an independent in-memory semantic engine for concurrent workloads. Governance is enforced end-to-end because delivery is the same platform — there is no seam between semantic layer and last-mile surface. MCP launched January 2026; Mosaic Sentinel (Risk Management, Audit &amp;amp; Compliance, Usage Insights) launched January 2026. Source: Strategy Software product documentation; Strategy January 2026 release notes; Strategy February 2026 release notes.&quot;
      data-i=&quot;Mosaic solves a broader problem than AtScale: not just consistent business definitions, but governed delivery to every user, tool, and AI agent in the same product. The governance seam between semantic layer and consumption layer does not exist — because they are the same product. That seam is where enterprise governance consistently breaks down with best-of-breed stacks.&quot;&gt;

// ── Tooltip ─────────────────────────────────────────────────────────────────
(function() {
  var tip = document.getElementById(&#x27;tip&#x27;);
  if (!tip) return;
  var tt  = document.getElementById(&#x27;tip-t&#x27;);
  var tb  = document.getElementById(&#x27;tip-b&#x27;);
  var ti  = document.getElementById(&#x27;tip-i&#x27;);
  var PAD = 16;

  function showTip(e, el) {
    if (tt) tt.textContent = el.dataset.t || &#x27;&#x27;;
    if (tb) tb.textContent = el.dataset.b || &#x27;&#x27;;
    if (ti) ti.textContent = el.dataset.i || &#x27;&#x27;;
    tip.style.display = &#x27;block&#x27;;
    moveTip(e);
  }
  function moveTip(e) {
    var tw = tip.offsetWidth, th = tip.offsetHeight;
    var vw = window.innerWidth, vh = window.innerHeight;
    var x = e.clientX + PAD, y = e.clientY + PAD;
    if (x + tw &gt; vw - PAD) x = e.clientX - tw - PAD;
    if (y + th &gt; vh - PAD) y = e.clientY - th - PAD;
    tip.style.left = x + &#x27;px&#x27;;
    tip.style.top  = y + &#x27;px&#x27;;
  }
  function hideTip() { tip.style.display = &#x27;none&#x27;; }

  document.addEventListener(&#x27;mouseover&#x27;, function(e) {
    var el = e.target.closest(&#x27;[data-t]&#x27;);
    if (el) showTip(e, el);
  });
  document.addEventListener(&#x27;mousemove&#x27;, function(e) {
    if (tip.style.display !== &#x27;none&#x27;) moveTip(e);
  });
  document.addEventListener(&#x27;mouseout&#x27;, function(e) {
    var el = e.target.closest(&#x27;[data-t]&#x27;);
    if (el) hideTip();
  });
})();

(function(){
  function initArchAlignment(){
    var root = document.getElementById(&#x27;arc-view-arc&#x27;);
    if(!root) return;

    root.querySelectorAll(&#x27;.legend, .layer, .flow, .diverge, .src-card, .band, .con-card, .trait-card&#x27;).forEach(function(el){
      el.classList.add(&#x27;arch-reveal&#x27;);

    if (&#x27;IntersectionObserver&#x27; in window) {
      var obs = new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
          if(entry.isIntersecting){
            entry.target.classList.add(&#x27;arch-visible&#x27;);
            obs.unobserve(entry.target);
          }
        });
      }, {threshold:0.08, rootMargin:&#x27;0px 0px -24px 0px&#x27;});
      root.querySelectorAll(&#x27;.arch-reveal&#x27;).forEach(function(el){ obs.observe(el); });
    } else {
      root.querySelectorAll(&#x27;.arch-reveal&#x27;).forEach(function(el){ el.classList.add(&#x27;arch-visible&#x27;); });
    }
  }

  if(document.readyState === &#x27;loading&#x27;){
    document.addEventListener(&#x27;DOMContentLoaded&#x27;, initArchAlignment);
  } else {
    initArchAlignment();
  }
})();

    font-size: 16.8px; color: var(--grey-text); line-height: 1.55;
  }
  .flag-row:last-child { border-bottom: none; padding-bottom: 0; }
  .flag-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); flex-shrink: 0; margin-top: 6px; }
  .flag-row strong { color: var(--dark); font-weight: 600; }

  /* ── FOOTER ── */


  /* ── SITE FOOTER ── */
  .site-footer {
    background: var(--black); color: rgba(255,255,255,0.45);
    padding: 28px 64px; font-size: 12px;
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 60px;
  }
  .site-footer img { height: 22px; display: block; }

  @media print {
    .navbar { position: static; }
    .snap-card, .col-card, .hth-wrap, .when-card, .pricing-card, .flags-card, .differentiator-banner { break-inside: avoid; }
    .hth-table tbody tr:hover { background: transparent; }
  }

  /* ══════ ANIMATION SYSTEM ══════ */

  /* Progress bar */
  #progress-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, var(--orange), #ff9a5c);
    z-index: 9999; width: 0%; transition: width 0.1s linear;
    border-radius: 0 2px 2px 0;
  }

  /* Back to top */
  #back-to-top {
    position: fixed; bottom: 32px; right: 32px;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--orange); color: #fff; border: none;
    cursor: pointer; font-size: 18px; line-height: 1;
    box-shadow: 0 4px 16px rgba(250,102,15,0.35);
    opacity: 0; transform: translateY(12px) scale(0.85);
    transition: opacity 0.25s ease, transform 0.25s ease, box-shadow 0.2s;
    z-index: 999; display: flex; align-items: center; justify-content: center;
  }
  #back-to-top.visible { opacity: 1; transform: translateY(0) scale(1); }
  #back-to-top:hover { box-shadow: 0 6px 22px rgba(250,102,15,0.5); transform: translateY(-2px) scale(1.06); }
  #back-to-top svg { width: 18px; height: 18px; }

  /* Scroll-reveal base */
  .reveal {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                transform 0.55s cubic-bezier(0.22,1,0.36,1);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.08s; }
  .reveal-delay-2 { transition-delay: 0.16s; }
  .reveal-delay-3 { transition-delay: 0.24s; }
  .reveal-delay-4 { transition-delay: 0.32s; }

  /* Snapshot cards */
  .snap-card {
    cursor: default;
    transition: transform 0.22s ease, box-shadow 0.22s ease,
                border-color 0.22s ease;
    border-left: 3px solid transparent;
  }
  .snap-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.1);
    border-left-color: var(--orange);
  }
  .snap-card:hover .snap-value {
    transform: scale(1.04);
    color: var(--orange);
    transition: transform 0.2s ease, color 0.2s ease;
  }
  .snap-value { transition: transform 0.2s ease, color 0.2s ease; display: block; }

  /* Diff banner border draw animation */
  @keyframes borderDraw {
    from { clip-path: inset(0 0 100% 0); }
    to   { clip-path: inset(0 0 0% 0); }
  }
  .differentiator-banner {
    position: relative;
    overflow: hidden;
  }
  .differentiator-banner::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--orange);
    animation: borderDraw 0.7s cubic-bezier(0.22,1,0.36,1) 0.3s both;
  }

  /* Diff boxes stagger */
  .diff-box {
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  .diff-box:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }
  .diff-box.denodo-box { animation: fadeSlideUp 0.5s ease 0.5s both; }
  .diff-box.mosaic-box { animation: fadeSlideUp 0.5s ease 0.65s both; }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Table row hover accent bars */
  .hth-table tbody tr {
    transition: background 0.15s ease;
    position: relative;
  }
  .hth-table tbody tr td.td-d {
    transition: border-left-color 0.15s ease;
    border-left: 3px solid transparent;
  }
  .hth-table tbody tr td.td-m {
    transition: border-left-color 0.15s ease;
    border-left: 3px solid transparent;
  }
  .hth-table tbody tr:hover { background: #f7f7fb; }
  .hth-table tbody tr:hover td.td-d { border-left-color: var(--blue); }
  .hth-table tbody tr:hover td.td-m { border-left-color: var(--orange); }

  /* Adv badges — pulse once on load, hover scale */
  @keyframes badgePulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); box-shadow: 0 0 0 4px rgba(250,102,15,0.15); }
    100% { transform: scale(1); box-shadow: none; }
  }
  @keyframes badgePulseBlue {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); box-shadow: 0 0 0 4px rgba(24,72,200,0.15); }
    100% { transform: scale(1); box-shadow: none; }
  }
  .adv-m { animation: badgePulse 0.7s ease 1.2s both; cursor: default; }
  .adv-d { animation: badgePulseBlue 0.7s ease 1.2s both; cursor: default; }
  .adv-m:hover { transform: scale(1.08); transition: transform 0.15s ease; }
  .adv-d:hover { transform: scale(1.08); transition: transform 0.15s ease; }

  /* Pricing tier bar fill */
  .tier-fill-wrap {
    height: 3px; background: var(--border-soft);
    border-radius: 2px; margin-top: 6px; overflow: hidden;
  }
  .tier-fill-bar {
    height: 100%; border-radius: 2px;
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
  }
  .tier-fill-bar.filled { transform: scaleX(1); }
  .tier-fill-bar.blue-bar { background: var(--blue); }
  .tier-fill-bar.orange-bar { background: var(--orange); }

  /* Source tooltip expansion */
  .src-item {
    display: flex; gap: 10px; align-items: baseline;
    font-size: 15.6px; color: var(--grey-text);
    padding: 5px 0; border-bottom: 1px solid var(--border-soft);
    cursor: default; transition: background 0.15s;
    border-radius: 4px; padding-left: 6px; margin-left: -6px;
  }
  .src-item:last-child { border-bottom: none; }
  .src-item:hover { background: var(--orange-light); }
  .src-num {
    color: var(--orange); font-weight: 700; flex-shrink: 0;
    font-size: 11px; font-family: var(--font-mono); min-width: 22px;
  }
  .src-text { line-height: 1.5; }

  /* Point reveal stagger */
  .point {
    opacity: 0; transform: translateX(-8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .point.point-visible { opacity: 1; transform: translateX(0); }

  /* Hero entrance */
  .hero-eyebrow { animation: heroFade 0.5s ease 0.1s both; }
  .hero h1       { animation: heroFade 0.5s ease 0.2s both; }
  .hero-sub      { animation: heroFade 0.5s ease 0.3s both; }
  .hero-meta     { animation: heroFade 0.5s ease 0.4s both; }
  @keyframes heroFade {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Pill hover */
  .pill {
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: default;
  }
  .pill:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.1); }

  /* Col-card hover */
  .col-card {
    transition: box-shadow 0.2s ease;
  }
  .col-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.09); }


  /* ══════════════════════════════════════
     ENHANCEMENT v8 — 8 NEW FEATURES
  ══════════════════════════════════════ */

  /* ── 1. SECTION IDENTITY COLOURS ── */
  .section-zone[data-theme=&quot;orange&quot;] { border-left: 4px solid var(--orange); }
  .section-zone[data-theme=&quot;blue&quot;]   { border-left: 4px solid var(--blue); }
  .section-zone[data-theme=&quot;green&quot;]  { border-left: 4px solid var(--green); }
  .section-zone[data-theme=&quot;amber&quot;]  { border-left: 4px solid var(--amber); }
  .section-zone[data-theme=&quot;purple&quot;] { border-left: 4px solid var(--purple); }

  /* ── 2. SECTION COUNTER 01/02/03 ── */
  .sl-counter {
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.4s ease 0.05s, transform 0.4s ease 0.05s;
    flex-shrink: 0;
  }
  .section-label.visible .sl-counter { opacity: 1; transform: translateX(0); }

  /* ── 3. FACE-OFF ANIMATION (differentiator) ── */
  .diff-box.denodo-box {
    animation: none !important;
    opacity: 0;
    transform: translateX(-28px);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                transform 0.55s cubic-bezier(0.22,1,0.36,1);
  }
  .diff-box.mosaic-box {
    animation: none !important;
    opacity: 0;
    transform: translateX(28px);
    transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1) 0.1s,
                transform 0.55s cubic-bezier(0.22,1,0.36,1) 0.1s;
  }
  .diff-box.denodo-box.face-in,
  .diff-box.mosaic-box.face-in {
    opacity: 1;
    transform: translateX(0);
  }
  /* Denodo box: blue left accent, Mosaic: orange */
  .diff-box.denodo-box { border-left: 3px solid var(--blue) !important; }
  .diff-box.mosaic-box { border-left: 3px solid var(--orange) !important; }

  /* ── 4. H2H TABLE — ROW SEQUENTIAL REVEAL ── */
  .hth-table tbody tr.hth-row {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s ease, transform 0.35s ease,
                background 0.15s ease;
  }
  .hth-table tbody tr.hth-row.row-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Winner cell glow */
  .hth-table tbody td.td-m.win {
    transition: background 0.2s ease, box-shadow 0.2s ease, border-left-color 0.15s ease;
  }
  .hth-table tbody tr:hover td.td-m.win {
    background: rgba(10,122,82,0.06);
    box-shadow: inset 0 0 0 1px rgba(10,122,82,0.18);
  }
  .hth-table tbody tr:hover td.td-d.win {
    background: rgba(24,72,200,0.06);
    box-shadow: inset 0 0 0 1px rgba(24,72,200,0.18);
  }


  /* ── H2H subtle winner tint (Denodo-leading rows only) ── */
  .hth-table tbody tr.denodo-win td.td-d {
    background: rgba(24,72,200,0.045);
    box-shadow: inset 3px 0 0 rgba(24,72,200,0.24);
  }
  .hth-table tbody tr.denodo-win:hover td.td-d {
    background: rgba(24,72,200,0.08);
    box-shadow: inset 3px 0 0 rgba(24,72,200,0.34);
  }

  /* ── H2H subtle winner tint (Mosaic-leading rows) ── */
  .hth-table tbody tr.mosaic-win td.td-m {
    background: rgba(250,102,15,0.05);
    box-shadow: inset 3px 0 0 rgba(250,102,15,0.28);
  }
  .hth-table tbody tr.mosaic-win:hover td.td-m {
    background: rgba(250,102,15,0.09);
    box-shadow: inset 3px 0 0 rgba(250,102,15,0.38);
  }

  /* ── 5. COUNT-UP VALUES ── */
  .snap-value[data-countup] { min-height: 1.2em; }

  /* ── 6. PRICING BAR BOUNCE EASING + TOOLTIP ── */
  .tier-fill-bar {
    height: 100%; border-radius: 2px;
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .tier-fill-bar.filled { transform: scaleX(1); }
  .tier-row { position: relative; }
  .tier-tooltip {
    position: absolute;
    right: 0; top: -34px;
    background: var(--dark);
    color: #fff;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transform: translateY(4px);
    transition: opacity 0.18s ease, transform 0.18s ease;
    z-index: 10;
    font-family: var(--font-mono);
  }
  .tier-tooltip::after {
    content: '';
    position: absolute;
    bottom: -5px; right: 16px;
    border: 5px solid transparent;
    border-top-color: var(--dark);
    border-bottom: none;
  }
  .tier-row:hover .tier-tooltip { opacity: 1; transform: translateY(0); }

  /* ── 7. STICKY DOT NAVIGATION ── */
  #dot-nav {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 200;
  }
  .dot-nav-item {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.25s ease, transform 0.25s ease, width 0.25s ease;
    position: relative;
  }
  .dot-nav-item:hover { transform: scale(1.4); background: var(--orange); }
  .dot-nav-item.active { background: var(--orange); transform: scale(1.2); }
  .dot-nav-item .dot-label {
    position: absolute;
    right: 16px; top: 50%;
    transform: translateY(-50%);
    background: var(--dark);
    color: #fff;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
    font-family: var(--font-mono);
  }
  .dot-nav-item:hover .dot-label { opacity: 1; }

  /* ── 8. FLAG ITEMS SLIDE REVEAL + AMBER GLOW ── */
  .flags-card {
    box-shadow: -4px 0 0 var(--amber), var(--shadow-sm) !important;
    border-left: 3px solid var(--amber) !important;
  }
  .flag-row {
    opacity: 0;
    transform: translateX(-14px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .flag-row.flag-visible { opacity: 1; transform: translateX(0); }


  /* ── HOW WE WIN SECTION ── */
  .win-intro {
    font-size: 15px;
    color: var(--grey-text);
    margin-bottom: 20px;
    line-height: 1.65;
    max-width: 820px;
  }
  .win-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .win-card {
    background: linear-gradient(180deg, #ffffff 0%, #fff8f2 100%);
    border: 1px solid var(--orange-border);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
    box-shadow: var(--shadow-sm);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.42s ease, transform 0.42s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .win-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--orange) 0%, #ff9a5c 100%);
  }
  .win-card.win-visible { opacity: 1; transform: translateY(0); }
  .win-card:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
  .win-num {
    font-size: 11px;
    color: var(--orange);
    font-family: var(--font-mono);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .win-card-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--black);
    margin-bottom: 14px;
  }
  .win-mini-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .win-mini {
    background: #fff;
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 14px 15px;
  }
  .win-mini-label {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    font-family: var(--font-mono);
    margin-bottom: 6px;
  }
  .win-mini-label.denodo { color: var(--blue); }
  .win-mini-label.mosaic { color: var(--orange); }
  .win-mini-text {
    font-size: 15.525px;
    line-height: 1.62;
    color: var(--dark);
  }
  .win-why {
    background: rgba(250,102,15,0.08);
    border: 1px solid var(--orange-border);
    border-radius: var(--radius);
    padding: 13px 15px;
  }
  .win-why-label {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    font-family: var(--font-mono);
    color: var(--orange);
    margin-bottom: 5px;
  }
  .win-why-text {
    font-size: 15.525px;
    line-height: 1.66;
    color: var(--dark);
  }

  /* ── OVERLAP SECTION: subtle card treatment ── */
  .overlap-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 14px;
  }
  .overlap-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.38s ease, transform 0.38s ease,
                box-shadow 0.2s ease;
  }
  .overlap-item.overlap-visible { opacity: 1; transform: translateY(0); }
  .overlap-item:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
  .overlap-eq {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--amber-light);
    color: var(--amber);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }


/* Premium readability polish */
.hero-sub { max-width: 760px; }
.win-intro { font-size: 15.5px; line-height: 1.72; }
.diff-sub { line-height: 1.68; }
@media (min-width: 1440px) {
  .main, .hero { max-width: 1260px; }
}


/* ── ARCHITECTURE TOGGLE STRIP ── */
.arc-toggle-strip {
  display: flex;
  align-items: center;
  padding: 0 64px;
  background: #fff;
  border-bottom: 2px solid var(--border);
  height: 46px;
  position: sticky;
  top: 0;
  z-index: 300;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.arc-toggle-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 0 20px; height: 100%;
  font-size: 13px; font-weight: 600; color: var(--grey-muted);
  cursor: pointer; border: none; background: transparent;
  border-bottom: 3px solid transparent;
  transition: color 0.18s, border-color 0.18s;
  font-family: var(--font); letter-spacing: 0.01em;
  margin-bottom: -2px; white-space: nowrap;
}
.arc-toggle-btn:hover { color: var(--dark); }
.arc-toggle-btn.arc-active { color: var(--orange); border-bottom-color: var(--orange); }
.arc-toggle-icon {
  width: 18px; height: 18px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.arc-toggle-icon.cmp { background: var(--blue-light); color: var(--blue); }
.arc-toggle-icon.arc { background: var(--orange-light); color: var(--orange); }
.arc-toggle-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
/* Hide original fixed elements when arch view is active */
body.arc-mode #progress-bar,
body.arc-mode #back-to-top,
body.arc-mode #dot-nav { display: none !important; }
/* Hide the comparison content when arch mode active */
body.arc-mode .arc-cmp-content { display: none; }
/* Show arch panel only in arch mode */
#arc-view-arc { display: none; }
body.arc-mode #arc-view-arc { display: block; }


/* ── ARC PANEL: inherits Hub tokens, adds only what's needed ── */
.arc-panel {
  padding: 32px 64px 60px;
  max-width: 1260px;
  margin: 0 auto;
}
@media(min-width:1440px){ .arc-panel { max-width: 1400px; } }

/* Legend bar */
.arc-legend {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 12px 18px;
  background: var(--bg-section);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
}
.arc-legend-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--grey-faint);
  font-family: var(--font-mono);
  margin-right: 4px;
}
.arc-lpill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: #fff;
  font-size: 12px;
  font-weight: 600;
  color: var(--grey-text);
}
.arc-ldot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.arc-legend-hint {
  margin-left: auto;
  font-size: 11px;
  color: var(--grey-faint);
  font-family: var(--font-mono);
}

/* Canvas */
.arc-canvas {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.07), 0 2px 8px rgba(0,0,0,0.04);
  overflow: hidden;
  position: relative;
}
.arc-canvas::before {
  content: &quot;&quot;;
  position: absolute; inset: 0;
  background: linear-gradient(90deg,
    rgba(24,72,200,0.022) 0%, transparent 28%,
    transparent 72%, rgba(250,102,15,0.022) 100%);
  pointer-events: none;
}

/* Layer section */
.arc-layer {
  position: relative;
  z-index: 1;
  padding: 26px 32px 22px;
}
.arc-layer + .arc-layer { border-top: 1px solid rgba(216,216,232,0.55); }
.arc-layer.arc-alt { background: rgba(247,247,251,0.55); }

/* Layer header */
.arc-lhead {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 20px;
}
.arc-lline { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); max-width: 140px; }
.arc-lnum {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700; letter-spacing: 0.2em;
  color: var(--grey-faint);
  background: var(--bg-section);
  border: 1px solid var(--border-soft);
  border-radius: 999px;
  padding: 2px 10px;
}
.arc-ltitle {
  font-family: var(--font-mono);
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--grey-muted);
  white-space: nowrap;
}
.arc-lbadge {
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px; border-radius: 999px; border: 1px solid;
}
.arc-lbadge.shared { color: var(--purple); border-color: rgba(94,53,177,0.25); background: rgba(94,53,177,0.06); }
.arc-lbadge.split  { color: var(--orange); border-color: var(--orange-border); background: var(--orange-light); }
.arc-lbadge.diff   { color: var(--blue);   border-color: var(--blue-border);   background: var(--blue-light); }
.arc-lbadge.conv   { color: var(--green);  border-color: var(--green-border);  background: var(--green-light); }

/* Source grid */
.arc-src-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 14px;
}
.arc-src-card {
  background: linear-gradient(145deg,#fff,var(--bg-section));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 14px 16px;
  text-align: center;
  cursor: default;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.arc-src-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.09); border-color: rgba(94,53,177,0.3); }
.arc-src-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
  flex-shrink: 0;
}
.arc-src-name { font-size: 13.5px; font-weight: 700; color: var(--dark); margin-bottom: 4px; letter-spacing: -0.01em; }
.arc-src-sub  { font-size: 11.5px; color: var(--grey-muted); line-height: 1.4; }
.arc-src-foot {
  display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 8px;
}
.arc-src-note { font-size: 12px; color: var(--grey-faint); font-style: italic; }
.arc-conn-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 999px;
  border: 1px solid var(--green-border); background: var(--green-light); color: var(--green);
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}

/* Flow down */
.arc-flow-down {
  display: flex; justify-content: center;
  height: 48px; position: relative; z-index: 1;
}
.arc-flow-track {
  position: relative; width: 3px; height: 44px; border-radius: 999px;
  background: linear-gradient(180deg,
    rgba(24,72,200,0.18), rgba(107,114,128,0.12), rgba(250,102,15,0.18));
  overflow: visible;
}
.arc-flow-bead {
  position: absolute; left: 50%; top: -8px;
  width: 10px; height: 10px; border-radius: 50%;
  transform: translateX(-50%);
  background: conic-gradient(var(--blue), var(--orange), var(--blue));
  box-shadow: 0 0 10px rgba(24,72,200,0.3), 0 0 6px rgba(250,102,15,0.2);
  animation: arcFlowDrop 2.2s ease-in-out infinite;
}
@keyframes arcFlowDrop {
  0%   { top:-8px; opacity:0; }
  15%  { opacity:1; }
  85%  { opacity:1; }
  100% { top:42px; opacity:0; }
}

/* Split flow */
.arc-split-wrap {
  display: flex; justify-content: center;
  height: 64px; position: relative; z-index: 1;
}
.arc-split-stem {
  position: absolute; top:0; left:50%; transform:translateX(-50%);
  width:3px; height:26px; border-radius:999px;
  background: linear-gradient(180deg, rgba(24,72,200,0.18), rgba(250,102,15,0.18));
  overflow:visible;
}
.arc-split-stem-bead {
  position:absolute; top:-8px; left:50%; transform:translateX(-50%);
  width:10px; height:10px; border-radius:50%;
  background: conic-gradient(var(--blue), var(--orange), var(--blue));
  animation: arcSplitDrop 2.4s ease-in-out infinite;
}
@keyframes arcSplitDrop {
  0%   { top:-8px; opacity:0; }
  20%  { opacity:1; }
  80%  { opacity:1; }
  100% { top:24px; opacity:0; }
}
.arc-split-arms {
  position:absolute; top:24px;
  width:min(76%,940px); height:38px;
}
.arc-split-arms::before,.arc-split-arms::after {
  content:&quot;&quot;; position:absolute; top:0; width:50%; height:38px;
  border-top:2.5px solid rgba(107,114,128,0.14);
}
.arc-split-arms::before { left:0; border-left:2.5px solid rgba(24,72,200,0.25); border-top-left-radius:22px; }
.arc-split-arms::after  { right:0; border-right:2.5px solid rgba(250,102,15,0.25); border-top-right-radius:22px; }
.arc-bead-l, .arc-bead-r {
  position:absolute; top:20px;
  width:12px; height:12px; border-radius:50%;
}
.arc-bead-l {
  left:calc(50% - 6px); background:var(--blue);
  filter:drop-shadow(0 0 5px rgba(24,72,200,0.55));
  animation:arcBeadLeft 2.4s ease-in-out infinite;
}
.arc-bead-r {
  left:calc(50% - 6px); background:var(--orange);
  filter:drop-shadow(0 0 5px rgba(250,102,15,0.55));
  animation:arcBeadRight 2.4s ease-in-out infinite;
}
.arc-split-label {
  position:absolute; top:-16px; left:50%; transform:translateX(-50%);
  font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--grey-faint); font-family:var(--font-mono); white-space:nowrap;
}
@keyframes arcBeadLeft {
  0%   { transform:translate(0,0) scale(.75); opacity:0; }
  20%  { opacity:1; }
  65%  { transform:translate(calc(-50% - 17vw),16px) scale(1); opacity:1; }
  100% { transform:translate(calc(-50% - 34vw),30px) scale(.8); opacity:0; }
}
@keyframes arcBeadRight {
  0%   { transform:translate(0,0) scale(.75); opacity:0; }
  20%  { opacity:1; }
  65%  { transform:translate(calc(-50% + 17vw),16px) scale(1); opacity:1; }
  100% { transform:translate(calc(-50% + 34vw),30px) scale(.8); opacity:0; }
}

/* Split row layout */
.arc-split-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  align-items: stretch;
  width: 100%;
}
/* Band */
.arc-band {
  border-radius:var(--radius-lg);
  padding:16px 16px 14px;
  box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column;
  position:relative; overflow:hidden;
}
.arc-band::after {
  content:&quot;&quot;; position:absolute; inset:0; border-radius:inherit;
  pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,transparent 40%);
}
.arc-band.d {
  background:linear-gradient(160deg,rgba(24,72,200,0.065) 0%,rgba(255,255,255,0.98) 55%);
  border:1px solid var(--blue-border);
}
.arc-band.m {
  background:linear-gradient(160deg,rgba(250,102,15,0.065) 0%,rgba(255,255,255,0.98) 55%);
  border:1px solid var(--orange-border);
}
.arc-band-kicker {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:11px; position:relative; z-index:1;
}
.arc-band-label {
  font-family:var(--font-mono); font-size:9.5px; font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--grey-muted);
}
.arc-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:999px;
  font-family:var(--font-mono); font-size:9px; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase; white-space:nowrap;
}
.arc-pill::before { content:&quot;◆&quot;; font-size:5px; }
.arc-pill.d { background:var(--blue-light); color:#1439a8; border:1px solid var(--blue-border); }
.arc-pill.m { background:var(--orange-light); color:#c44800; border:1px solid var(--orange-border); }

/* Big node */
.arc-big-node {
  background:rgba(255,255,255,0.75);
  border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);
  padding:14px 14px 12px;
  position:relative; z-index:1; flex:1;
  cursor:default;
  transition:box-shadow 0.2s;
}
.arc-big-node:hover { box-shadow:0 6px 20px rgba(0,0,0,0.09); }
.arc-big-node-title {
  font-size:15px; font-weight:700; letter-spacing:-0.015em;
  color:var(--dark); margin-bottom:4px; line-height:1.2;
}
.arc-big-node-sub {
  font-size:12px; color:var(--grey-muted); margin-bottom:12px; line-height:1.45;
}

/* Sub-grid */
.arc-sub-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.arc-sub-grid.full { grid-template-columns:1fr; }
.arc-sub-node {
  background:rgba(255,255,255,0.7);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:11px 12px 10px;
  cursor:default;
  transition:background 0.18s, transform 0.18s;
  position:relative;
}
.arc-sub-node:hover { background:rgba(255,255,255,0.95); transform:translateY(-1px); }
.arc-sub-node.acc-d { border-top:2px solid var(--blue); }
.arc-sub-node.acc-m { border-top:2px solid var(--orange); }
.arc-sub-node.acc-g { border-top:2px solid var(--green); background:linear-gradient(160deg,var(--green-light),rgba(255,255,255,0.7)); border-color:var(--green-border); }
.arc-sub-node.acc-p { border-top:2px solid var(--purple); background:linear-gradient(160deg,var(--purple-light),rgba(255,255,255,0.7)); border-color:rgba(94,53,177,0.2); }
.arc-sn-title {
  font-family:var(--font-mono); font-size:9px; font-weight:700;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--grey-muted); margin-bottom:7px; padding-bottom:6px;
  border-bottom:1px solid var(--border-soft);
}
.arc-sn-list { list-style:none; display:grid; gap:3px; }
.arc-sn-list li {
  position:relative; padding-left:11px;
  font-size:12.5px; color:var(--grey-text); line-height:1.4;
}
.arc-sn-list li::before { content:&quot;–&quot;; position:absolute; left:0; top:0; color:var(--grey-faint); }

/* Icon box in sub-node */
.arc-sn-icon {
  width:28px; height:28px; border-radius:8px;
  display:inline-flex; align-items:center; justify-content:center;
  margin-bottom:8px; flex-shrink:0;
}

/* Note box */
.arc-note {
  margin-top:10px; padding:9px 13px;
  border:1px dashed var(--border); border-radius:var(--radius);
  font-size:12px; color:var(--grey-muted); line-height:1.5;
  background:rgba(255,255,255,0.4);
  position:relative; z-index:1;
}
.arc-note.d { border-color:var(--blue-border); background:var(--blue-light); }
.arc-note.m { border-color:var(--orange-border); background:var(--orange-light); }

/* Boundary bar */
.arc-boundary {
  margin-top:11px; display:flex; align-items:center; gap:8px;
  padding:6px 11px; border-radius:var(--radius);
  font-family:var(--font-mono); font-size:9px; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase;
  position:relative; z-index:1;
}
.arc-boundary.d { background:var(--blue-light); border:1px dashed var(--blue-border); color:#1439a8; }
.arc-boundary.m { background:var(--orange-light); border:1px dashed var(--orange-border); color:#c44800; }
.arc-boundary::before { content:&quot;⟵&quot;; font-size:11px; }
.arc-boundary.m::before { content:&quot;⟶&quot;; }

/* Consumer grid */
.arc-cons-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; max-width:1180px; margin:0 auto; justify-content:center; }
.arc-cons-card {
  background:linear-gradient(145deg,#fff,var(--bg-section));
  border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:20px 14px 16px; text-align:center;
  box-shadow:var(--shadow-sm); cursor:default;
  transition:transform 0.2s, box-shadow 0.2s;
  position:relative; overflow:hidden;
}
.arc-cons-card::after {
  content:&quot;&quot;; position:absolute; bottom:0; left:0; right:0; height:3px;
  border-radius:0 0 var(--radius-lg) var(--radius-lg);
}
.arc-cons-card.common::after { background:linear-gradient(90deg,var(--blue),var(--orange)); }
.arc-cons-card.mosaic-only { border-color:var(--orange-border); background:linear-gradient(145deg,rgba(250,102,15,0.05),#fff); }
.arc-cons-card.mosaic-only::after { background:var(--orange); }
.arc-cons-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.09); }
.arc-cons-icon {
  width:38px; height:38px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 10px;
}
.arc-cons-name { font-size:14px; font-weight:700; letter-spacing:-0.01em; color:var(--dark); margin-bottom:4px; }
.arc-cons-sub { font-size:11.5px; color:var(--grey-muted); line-height:1.4; margin-bottom:10px; }
.arc-cons-chips { display:flex; flex-wrap:wrap; justify-content:center; gap:5px; }
.arc-chip {
  font-family:var(--font-mono); font-size:8.5px; font-weight:700;
  letter-spacing:0.06em; padding:3px 8px; border-radius:999px; border:1px solid;
}
.arc-chip.d { color:var(--blue); border-color:var(--blue-border); background:var(--blue-light); }
.arc-chip.m { color:var(--orange); border-color:var(--orange-border); background:var(--orange-light); }

/* Bottom legend */
.arc-bottom-legend {
  display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:18px;
}
.arc-bl-chip {
  display:inline-flex; align-items:center; gap:7px;
  padding:5px 12px; border-radius:999px; border:1px solid var(--border);
  background:rgba(255,255,255,0.8);
  font-size:12px; font-weight:500; color:var(--grey-muted);
}
.arc-bl-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }

/* Summary */
.arc-summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.arc-sum-card {
  border-radius:var(--radius-lg); padding:20px 22px 18px;
  position:relative; overflow:hidden;
}
.arc-sum-card::before {
  content:&quot;&quot;; position:absolute; top:0; left:0; right:0; height:3px;
}
.arc-sum-card.d {
  background:linear-gradient(145deg,var(--blue-light),rgba(255,255,255,0.95));
  border:1.5px solid var(--blue-border);
}
.arc-sum-card.d::before { background:var(--blue); }
.arc-sum-card.m {
  background:linear-gradient(145deg,var(--orange-light),rgba(255,255,255,0.95));
  border:1.5px solid var(--orange-border);
}
.arc-sum-card.m::before { background:var(--orange); }
.arc-sum-head {
  font-size:17px; font-weight:800; letter-spacing:-0.02em;
  color:var(--dark); margin-bottom:8px;
  display:flex; align-items:center; gap:10px;
}
.arc-sum-icon {
  width:32px; height:32px; border-radius:8px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.arc-sum-body { font-size:13.5px; color:var(--grey-text); line-height:1.6; margin-bottom:14px; }
.arc-tag-row { display:flex; flex-wrap:wrap; gap:6px; }
.arc-tag {
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:999px;
  font-family:var(--font-mono); border:1px solid;
}
.arc-tag.d { color:var(--blue); border-color:var(--blue-border); background:var(--blue-light); }
.arc-tag.m { color:var(--orange); border-color:var(--orange-border); background:var(--orange-light); }

/* Canvas footer */
.arc-canvas-foot {
  text-align:center; padding:16px 32px 20px;
  border-top:1px solid var(--border-soft);
  position:relative; z-index:1;
}
.arc-canvas-foot span {
  font-family:var(--font-mono); font-size:9.5px;
  letter-spacing:0.12em; text-transform:uppercase; color:var(--grey-faint);
}

/* Scroll reveal */



/* Responsive */
@media(max-width:1100px) {
  .arc-src-grid,.arc-cons-grid { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:900px) {
  .arc-panel { padding:24px 24px 40px; }
  .arc-split-row { grid-template-columns:1fr; }
  .arc-row-label span { writing-mode:horizontal-tb; transform:none; }
  .arc-sub-grid { grid-template-columns:1fr; }
  .arc-summary-grid { grid-template-columns:1fr; }
}
@media(max-width:640px) {
  .arc-src-grid,.arc-cons-grid { grid-template-columns:1fr; }
}

/* SVG icons helper */
.arc-icon-svg { width:20px; height:20px; }

&lt;div class=&quot;section-label reveal&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How We Win vs Denodo — 4 key differentiators&lt;/span&gt;&lt;/div&gt;
&lt;p class=&quot;win-intro reveal&quot;&gt;These are the four messages to lead with when Denodo is already in the conversation. The goal is to shift the discussion from data access to semantic control, trusted AI, stack simplification, and execution efficiency.&lt;/p&gt;
&lt;div class=&quot;win-grid&quot; id=&quot;win-grid&quot;&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;01 / Core Architecture&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Consistent Meaning vs. Disciplined SQL&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label denodo&quot;&gt;Denodo&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Governs access through SQL views. “Net Revenue” lives as code inside views and consistency depends on teams reusing the same logic.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Governs meaning through certified semantic objects. The same definition is reused across dashboards, applications, and AI agents.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;Why we win&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;We turn metric consistency into architecture. Denodo relies on discipline and governance meetings. Mosaic makes the same business definition travel everywhere by design.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;02 / AI Trust&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;AI Hallucination Protection at the Source&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label denodo&quot;&gt;Denodo&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;AI agents reason over schemas and views. Reliability depends on whether the right views are modeled and selected.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;AI operates on governed semantic definitions in the Universal Semantic Layer, not raw tables or loosely governed SQL artifacts.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;Why we win&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;Denodo gives AI a pipe to data. Mosaic gives AI governed business meaning. That is the difference between querying data and delivering trusted answers.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;03 / Stack Simplification&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;The Complete “Last Mile”&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label denodo&quot;&gt;Denodo&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Stops at the data layer. Reporting and dashboards still require separate BI products, integration work, and another governance surface.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Extends from semantic layer to native BI and AI through Strategy One, while still supporting external BI tools when needed.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;Why we win&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;We reduce tool sprawl and close the last mile. One platform governs the path from source data to dashboard to AI interaction.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;04 / Performance &amp;amp; Cost&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Execution Efficiency vs. Source Dependency&lt;/div&gt;

&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;Hybrid execution combines pushdown with an in-memory engine that absorbs repeated and high-concurrency workloads without re-triggering source compute.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;Why we win&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;We decouple usage from warehouse pain. Repeated BI and AI workloads can be served from memory, improving stability while protecting Snowflake and Databricks spend.&lt;/div&gt;
