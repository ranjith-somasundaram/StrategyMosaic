&lt;div class=&quot;section-zone&quot; data-section=&quot;0&quot; data-theme=&quot;blue&quot; style=&quot;border-top:none;&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;01&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Looker (Google Cloud) at a glance&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;snapshot&quot;&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Core identity&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;LookML Semantic Layer + BI Platform&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Google Cloud-hosted BI and semantic layer platform.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;LookML (YAML/SQL) is the market reference for &quot;define once, use everywhere&quot; metric governance.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Optimised for BigQuery. Acquired by Google in 2019.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Standard tier ~$5K/month; avg enterprise deal ~$150K/year (third-party industry estimate only — not official Google pricing; do not cite in formal proposals without current vendor verification).&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Gartner MQ 2025&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Leader (Google Cloud)&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Google recognised as a Leader in the 2025 Gartner MQ for Analytics and BI Platforms (June 2025).&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;LookML semantic layer highlighted as a governance differentiator.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Strategy Mosaic is a 2025 Gartner Visionary — different quadrant positions, different strength axes.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;AI posture&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Gemini in Looker&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Conversational Analytics (NLQ against LookML models) — GA for Looker-hosted users, April 2025.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;LookML Assistant (generates LookML from natural language) and Visualisation Assistant require Looker v25.2+.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Customer-hosted deployments NOT supported for AI features (official Google Cloud docs, April 2026).&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Gemini only — no BYOE LLM. Requires internet connectivity to Google Gemini.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Key architectural reality&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Developer-first, GCP-dependent&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;LookML requires skilled engineers to build and maintain the semantic layer.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;In-database architecture — all queries push to the connected warehouse, no data imported.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Native CI/CD via Spectacles.dev acquisition (April 2025).&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Visualisation library noted as limited vs comparable tools (Gartner Peer Insights 2025–2026).&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;1&quot; data-theme=&quot;amber&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;02&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Where they genuinely overlap — acknowledge this&lt;/span&gt;&lt;/div&gt;
&lt;p style=&quot;font-size:17px;color:var(--grey-text);margin-bottom:20px;line-height:1.65;&quot;&gt;Looker&#x27;s LookML is the benchmark that made &quot;define once, use everywhere&quot; semantic governance mainstream. It is a genuinely strong platform for data teams on Google Cloud. The competitive question is not &quot;does Looker have a semantic layer?&quot; It clearly does. The question is: &lt;em style=&quot;color:var(--dark)&quot;&gt;what happens when the organisation needs governed metric objects accessible by any BI tool, any AI agent, any LLM — without LookML engineering skills, without Google Cloud dependency, and with enterprise reporting, voice analytics, and HyperIntelligence in one governed platform?&lt;/em&gt; Both have sustained Gartner recognition — different quadrant positions, different strength axes.&lt;/p&gt;
&lt;div class=&quot;overlap-grid&quot;&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have &lt;strong&gt;Gartner MQ 2025 recognition&lt;/strong&gt;. Google/Looker is a 2025 Leader; Strategy Mosaic is a 2025 Visionary recognised for composable analytics, governance, and AI+BI integration. Different quadrant positions, different strength axes.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have a &lt;strong&gt;governed semantic layer&lt;/strong&gt; — Looker via LookML (YAML/SQL, Git-versioned, define-once metric governance); Strategy Mosaic via certified first-class objects with lineage, certification status, and security policy that travel with the metric across every surface.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have an &lt;strong&gt;AI analytics story&lt;/strong&gt; — Looker via Gemini in Looker (Conversational Analytics, LookML Assistant, slide generation, GA April 2025 for Looker-hosted users); Strategy Mosaic via Auto AI Suite (Auto Agents, Auto Dashboards, Auto Voice) grounded in certified Mosaic objects.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both are &lt;strong&gt;in-database architectures&lt;/strong&gt; — Looker pushes all queries to the connected warehouse without importing data; Strategy Mosaic hybrid execution pushes to live sources or serves from in-memory engine. Neither duplicates data into a proprietary store by default.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;CI/CD for semantic models&lt;/strong&gt; — Looker via native CI (Spectacles.dev acquisition) for automated LookML testing and validation; Strategy Mosaic via Mosaic Studio with versioned governance objects and change impact tracking.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both expose their &lt;strong&gt;semantic layer to AI agents&lt;/strong&gt; — Looker via Conversational Analytics API (build custom BI agents on LookML); Strategy Mosaic via MCP (GA January 2026) connecting ChatGPT, Claude, Copilot, Gemini directly to certified Mosaic metric definitions with LLM shielding.&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-zone alt&quot; data-section=&quot;2&quot; data-theme=&quot;purple&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How Strategy Mosaic wins — 4 architectural differentiators&lt;/span&gt;&lt;/div&gt;
&lt;p class=&quot;win-intro&quot;&gt;Looker is the market reference for semantic governance in developer-led data teams — acknowledge it. Strategy Mosaic does not compete on LookML-style Git-versioned code governance. Strategy Mosaic competes on what comes after the metric is defined: certified object delivery, platform independence, enterprise completeness, and governed AI that does not require LookML engineering to maintain or a Google Cloud environment to unlock.&lt;/p&gt;
&lt;div class=&quot;win-grid&quot;&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;01 / Semantic object architecture&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Certified first-class objects vs LookML code-based definitions&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Looker&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;LookML is YAML/SQL code in Git — powerful for developer-led teams, but requires LookML engineers to build, maintain, and extend. Steep learning curve flagged by multiple Gartner Peer Insights reviewers (2025–2026).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Metrics and dimensions are LookML explores and views — code constructs, not first-class certified objects with independent certification status and cross-surface audit trails.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Gemini-assisted LookML generation (LookML Assistant) reduces authoring friction but does not remove the dependency on LookML engineering skills for production model maintenance.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Semantic layer is tightly coupled to the Looker platform — metric definitions are not natively portable to non-Looker BI tools without re-exposing via the Conversational Analytics API.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic certified first-class metric objects carry lineage, certification status, and security policy independently of any code file — accessible to any surface without LookML engineering skills.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic Studio: 87% faster model build, 10x throughput — data teams build governed objects in a UI. No Git workflow required for business users to certify and annotate metrics.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;LLM shielding: AI cannot query outside certified Mosaic objects — accuracy not dependent on quality of LookML code or explore configuration.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;200+ connectors — metric objects work across Snowflake, Databricks, BigQuery, Oracle, SAP, and on-prem simultaneously. Not BigQuery-optimised, not GCP-dependent.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;How many LookML engineers does your team need to build and maintain the semantic model — and what happens to governance when one of them leaves?&quot; Strategy Mosaic&#x27;s certified objects are maintained in a governed UI, not in code files in Git. The business analyst, the data engineer, and the AI agent all work from the same certified object — no LookML authoring required.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;02 / Platform completeness&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Full AI+BI platform vs semantic layer + limited visualisation + BI tool required&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Looker&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Looker&#x27;s visualisation library is limited — multiple Gartner Peer Insights reviews from 2025–2026 explicitly state: &quot;the selection of visualisations is very limited compared to similar tools&quot; and &quot;some very important charts missing.&quot;&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Looker Reports (introduced April 2025, unifying Looker Studio) improves the reporting experience but Looker remains primarily a dashboard and explore platform — not a pixel-perfect enterprise reporting tool.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No voice analytics layer. No zero-code HyperIntelligence injection into third-party applications.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Full enterprise use case: Looker (semantic layer + dashboards) + separate enterprise reporting tool + separate governance module. Enterprise completeness requires assembly.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Pixel-perfect enterprise reporting native — same semantic layer, no separate product, 25+ years of regulated-industry reporting capability.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Auto Voice (Feb 2026): voice analytics with parallel actions, Gemini-powered, mobile support. No Looker equivalent exists.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;HyperIntelligence: zero-code injection of governed analytics cards into SAP, Salesforce, Workday, email, and any web app. Unique to Strategy Mosaic.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Auto Dashboards, Auto Agents, AI Sync for Linked Models — complete AI+BI delivery without assembling additional products on top of the semantic layer.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;Looker is a strong semantic layer and explore tool. What does your stack look like for pixel-perfect regulatory reporting, voice analytics, and injecting governed KPIs into your SAP portal — and how many products does that require?&quot; Strategy Mosaic delivers all of it from one platform, one license, one contract.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;03 / Platform independence&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Multi-cloud open governance vs Google Cloud and Looker-hosted dependency&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Looker&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Gemini AI features require a Looker-hosted instance — customer-hosted Looker deployments do NOT support AI features. Confirmed in official Google Cloud documentation (updated April 2026).&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Looker AI requires internet connectivity to access Google&#x27;s Gemini models — no offline or air-gapped AI deployment option. Data residency constraint for regulated industries.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Optimised for BigQuery — best performance and tightest integration in the GCP/BigQuery context. Non-BigQuery warehouses supported but not the primary design target.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No BYOE LLM — Gemini only. No support for Azure OpenAI, LLAMA, or offline models for air-gapped environments.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Runs on AWS, Azure, GCP, StackIT, and on-premises — full feature parity across all deployments, not GCP-dependent.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;BYOE (Feb 2026): Gemini 2.5, Azure OpenAI, LLAMA 3.3 70B, offline LLMs for air-gapped environments. Customer controls LLM choice.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Offline LLM support (Jan 2026): fully air-gapped environments where no data leaves the perimeter — a hard procurement requirement in banking, government, and defence.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;200+ connectors across all major warehouses, on-prem databases, SAP, Oracle, and legacy systems — not optimised for one cloud platform.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;Our organisation runs on Azure with on-premises data that cannot leave our environment. What Looker AI features are available to us — and specifically, do Conversational Analytics and LookML Assistant work on a customer-hosted Looker instance?&quot; The confirmed answer is no — AI features require Looker-hosted. Strategy Mosaic delivers the same AI+BI capabilities on-premises, on any cloud, in any air-gapped environment.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;04 / Governance completeness&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Cross-surface semantic audit + Sentinel vs LookML-layer governance only&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;Looker&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;LookML governance: access controls, row-level security, content certification, usage analytics within Looker. Genuine and well-designed for Looker-ecosystem usage.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Governance is Looker-layer only — enforces within the Looker exploration environment. Metrics consumed via the external Conversational Analytics API or third-party BI tools operate under the calling application&#x27;s security model.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No unified cross-surface semantic object-level audit trail covering the same metric across dashboard, mobile, AI agent, MCP client, and embedded analytics simultaneously.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No compliance module equivalent to Mosaic Sentinel — no GDPR/HIPAA/SOX Audit &amp;amp; Compliance built into the platform.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic Sentinel (Jan 2026): Risk Management + Audit &amp;amp; Compliance (GDPR/HIPAA/SOX) + Usage Insights — one module, no separate product, no separate license.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Certified metric objects enforce governance regardless of which surface queries them — dashboard, mobile, AI agent, MCP client, embedded, external API. Governance travels with the object.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;LLM shielding: AI cannot query outside certified objects or bypass row/object-level security. Enforced by the platform, not dependent on LookML configuration quality.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;AI Sync for Linked Models (Feb 2026): auto-validates all AI experiences when semantic definitions change. LookML changes require manual testing of downstream AI and BI experiences.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;When a third-party AI agent queries your Revenue metric through Looker&#x27;s Conversational Analytics API — what governance layer enforces that the agent cannot access data the user is not authorised for? And can you produce a SOX audit trail for that query?&quot; Strategy Mosaic&#x27;s LLM shielding and Mosaic Sentinel handle both natively. In Looker, the answer depends on the calling application&#x27;s security configuration.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;/div&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;3&quot; data-theme=&quot;green&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;04&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Head-to-head — Looker vs Strategy Mosaic&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;hth-wrap&quot;&gt;
&lt;table class=&quot;hth-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;
&lt;th&gt;Dimension&lt;/th&gt;
&lt;th class=&quot;col-d&quot;&gt;Looker (Google Cloud)&lt;/th&gt;
&lt;th class=&quot;col-m&quot;&gt;Strategy Mosaic&lt;/th&gt;
&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Product scope&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;LookML semantic layer + in-database BI platform. Gartner MQ 2025 Leader (Google Cloud). Optimised for BigQuery/GCP. Platform + user pricing, min ~$5K/month.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Full AI+BI platform: Mosaic semantic layer, enterprise reporting, dashboards, Auto AI Suite, HyperIntelligence, mobile — one governed product. Multi-cloud and on-premises.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Semantic governance&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;LookML: YAML/SQL Git-versioned, define-once metric governance. Native CI/CD via Spectacles.dev. Market reference point for semantic governance in developer-led data teams on GCP. ✓ Looker advantage for GCP/dbt stacks&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Mosaic certified first-class objects with lineage, certification, and security policy built in. UI-driven authoring — no LookML skills required. Cross-surface governance enforced by platform design.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Semantic object type&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;LookML explores and views — code constructs in Git files. Not portable to non-Looker BI tools without API re-exposure. No independent certification status or cross-surface audit trail.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Certified first-class objects: lineage, certification, and access policy travel with the metric across every surface independently of delivery tool. 200+ connector reach.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;AI analytics&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Gemini in Looker: Conversational Analytics, LookML Assistant, Visualisation Assistant, slide generation (GA Looker-hosted, April 2025). Customer-hosted: NOT supported. Gemini only — no BYOE LLM.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Auto AI Suite: AI Agents, Auto Dashboards, Auto Voice (parallel actions). MCP GA Jan 2026 with LLM shielding. BYOE: Gemini 2.5, Azure OpenAI, LLAMA 3.3 70B, offline LLMs.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;BYOE / LLM flexibility&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Gemini only. No BYOE LLM. No offline or air-gapped AI. Requires internet connectivity to Google Gemini — data residency constraint for regulated industries.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;BYOE: Gemini 2.5, Azure OpenAI, LLAMA 3.3 70B, offline LLMs for air-gapped environments (Jan 2026). Customer controls LLM choice.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Platform dependency&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;AI features require Looker-hosted (not customer-hosted). Optimised for GCP/BigQuery. Azure and AWS organisations get a reduced story. No on-prem option with AI features.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;AWS, Azure, GCP, StackIT, on-premises — full feature parity. 200+ connectors. No cloud-platform dependency. Full AI capabilities on-prem and air-gapped.&lt;/td&gt;&lt;/tr&gt;

&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;HyperIntelligence&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No equivalent. Looker Embedded (iframe, API) for developer-built integrations. No zero-code injection of governed analytics into third-party applications.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;HyperIntelligence: zero-code injection of governed analytics cards into any web app (SAP, Salesforce, Workday, email, portals). No developer integration required. Unique to Strategy Mosaic.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Voice analytics&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No voice analytics layer. Gemini in Looker is a text/conversational interface only. No parallel multi-step action execution via voice.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Auto Voice (Feb 2026): low latency, parallel actions, Gemini-powered, mobile support. No competitor in this comparison has a voice analytics layer.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;LLM shielding&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No dedicated LLM shielding. Looker&#x27;s semantic layer reduces AI data errors by ~2/3 per Google&#x27;s own testing — a genuine improvement, but not a platform-enforced governance boundary for external AI agents.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;LLM shielding by design — AI cannot query outside certified Mosaic objects or bypass governance. Enforced at platform level regardless of LLM or calling application behaviour.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;AI Sync for Linked Models&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No equivalent. LookML changes require manual testing of downstream Conversational Analytics and LookML-based agent experiences. No automated re-validation mechanism.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;AI Sync for Linked Models (Feb 2026): auto-validates, flags inactive elements, re-enables AI experiences when Mosaic definitions update. Zero manual maintenance.&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td class=&quot;td-dim&quot;&gt;When Looker wins&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;GCP/BigQuery-primary organisation. Developer-led data team comfortable with LookML and Git workflows. dbt transformation layer already in place. Explore-driven self-service is the primary use case. No enterprise reporting, HyperIntelligence, or air-gapped AI requirement.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Strategy Mosaic is not the right answer when the customer is GCP-first, developer-led, and prefers LookML-style Git-versioned semantic code as their governance model.&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td class=&quot;td-dim&quot;&gt;When Strategy Mosaic wins&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Strategy Mosaic is not the right answer when the customer is fully GCP/BigQuery standardised with a mature LookML data team and no requirement for HyperIntelligence, voice, or air-gapped AI.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Multi-cloud or non-GCP environment. Air-gapped or on-prem AI required. Pixel-perfect enterprise reporting needed. HyperIntelligence use case. Business-user-governed semantic layer (no LookML engineers). BYOE LLM required.&lt;/td&gt;&lt;/tr&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;0&quot; data-theme=&quot;blue&quot; style=&quot;border-top:none;&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;01&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;dbt Semantic Layer at a glance&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;snapshot&quot;&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Core identity&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Transformation-attached metric layer&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;The dbt Semantic Layer, powered by MetricFlow, centralises metric definitions as YAML code.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;dbt Labs merged with Fivetran in an all-stock deal (October 2025, combined ~$600M ARR).&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;MetricFlow open-sourced under Apache 2.0 at Coalesce 2025.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Semantic Layer requires dbt Starter or Enterprise plan — not available in dbt Core alone.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Market position&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Developer standard, not a BI platform&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;dbt is the de-facto standard for analytics engineering — the largest active data engineering community.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Not a BI platform: always requires a separate BI tool (Tableau, Power BI, Looker, etc.) for dashboard delivery.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Not in the Gartner MQ for Analytics and BI Platforms.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Strategy Mosaic is a 2025 Gartner Visionary — full AI+BI platform scope.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;AI posture&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;MCP server + dbt Copilot + Developer Agent&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;dbt MCP server (public beta July 2025): exposes models, metrics, tests, and lineage to AI systems.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;dbt Copilot (GA, Enterprise accounts): AI code generation in Cloud IDE; BYOE Azure OpenAI available.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Developer Agent (beta April 2026): writes/refactors dbt models from natural language.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;dbt is not a business-facing analytics AI — it provides governed context to downstream AI tools.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;snap-card&quot;&gt;
&lt;div class=&quot;snap-label&quot;&gt;Key architectural reality&lt;/div&gt;
&lt;div class=&quot;snap-value&quot;&gt;Metrics as code — no BI delivery&lt;/div&gt;
&lt;div class=&quot;snap-sub&quot;&gt;&lt;ul style=&quot;margin:2px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Generates optimised SQL for Snowflake, BigQuery, Databricks, Redshift — exposes metrics via JDBC and GraphQL.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Semantic Layer is a dbt Cloud hosted feature — data passes through dbt Labs servers for queries.&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;Microsoft Fabric NOT supported as of 2025 release notes — verify current status before customer delivery, as dbt Fabric support is an evolving area. Power BI integration was in preview (2025 release notes).&lt;/li&gt;&lt;li style=&quot;margin-bottom:5px;line-height:1.5;font-size:13.5px;&quot;&gt;No native BI delivery — always requires a separate analytics delivery platform on top.&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;1&quot; data-theme=&quot;amber&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;02&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;What this competition is actually about — acknowledge the real question&lt;/span&gt;&lt;/div&gt;
&lt;p style=&quot;font-size:17px;color:var(--grey-text);margin-bottom:20px;line-height:1.65;&quot;&gt;The dbt Semantic Layer objection is different from every other competitor in this hub. The question is not &quot;which platform is better?&quot; It is: &lt;em style=&quot;color:var(--dark)&quot;&gt;&quot;Why do we need Strategy Mosaic when we already have dbt defining our metrics?&quot;&lt;/em&gt; The honest answer: dbt MetricFlow defines business logic at the transformation layer — genuinely valuable. But it does not deliver dashboards, enterprise reports, AI agents, voice analytics, or HyperIntelligence. It is a metric definition and SQL generation tool that requires a complete AI+BI delivery platform on top of it. Strategy Mosaic can be that platform.&lt;/p&gt;
&lt;div class=&quot;overlap-grid&quot;&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have a &lt;strong&gt;&quot;define metrics once, use everywhere&quot; mission&lt;/strong&gt; — dbt MetricFlow in YAML code attached to transformation models; Mosaic in certified first-class objects governed in a UI. Same problem statement, different architectural approach and delivery scope.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;MCP integration&lt;/strong&gt; — dbt MCP server (public beta July 2025) exposes dbt models, metrics, and lineage to AI systems; Strategy Mosaic MCP (GA January 2026) connects AI agents directly to certified Mosaic metric definitions with LLM shielding enforced.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both use &lt;strong&gt;YAML-based metric specifications&lt;/strong&gt; — dbt MetricFlow defines entities, measures, dimensions, and metrics in YAML; Mosaic defines certified objects in a governed UI aligned with open standard formats. MetricFlow&#x27;s new OSI-aligned YAML spec (April 2026) is open and portable.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both emphasise &lt;strong&gt;version control and testing for metrics&lt;/strong&gt; — dbt natively Git-versioned with automated CI/CD testing; Mosaic Studio supports versioned model build with Mosaic Sentinel governance and change impact tracking.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both work on &lt;strong&gt;the same warehouse ecosystem&lt;/strong&gt; — dbt MetricFlow supports Snowflake, BigQuery, Databricks, Redshift, Trino, Postgres; Mosaic has 200+ connectors covering the same warehouses plus on-prem, SAP, Oracle, and legacy systems.&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both are &lt;strong&gt;complementary in mature stacks&lt;/strong&gt; — dbt for transformation and metric definition, Mosaic for governed AI+BI delivery on top. Mosaic can consume dbt MetricFlow metrics as the data foundation. These tools are not mutually exclusive.&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-zone alt&quot; data-section=&quot;2&quot; data-theme=&quot;purple&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How Strategy Mosaic wins — 4 structural differentiators&lt;/span&gt;&lt;/div&gt;
&lt;p class=&quot;win-intro&quot;&gt;dbt MetricFlow is excellent at what it does — metric definitions as code, Git-versioned, tested. Strategy Mosaic does not try to replace dbt. Strategy Mosaic competes on what comes after the metric is defined: certified object governance, complete BI delivery, governed AI, enterprise completeness, and the ability to put business users in control of governed analytics without a Git workflow.&lt;/p&gt;
&lt;div class=&quot;win-grid&quot;&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;01 / Complete delivery platform&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;AI+BI platform vs metric definition layer requiring a BI tool on top&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;dbt Semantic Layer&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;dbt Semantic Layer defines metrics in YAML and generates SQL — it does not deliver dashboards, reports, or self-service analytics. A separate BI tool is always required on top.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No native BI delivery. No enterprise reporting. No pixel-perfect output. No self-service exploration UI. No embedded analytics without assembling additional products.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No voice analytics. No HyperIntelligence equivalent. No Auto Dashboards, Auto Agents, or Auto Voice.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Full stack: dbt + Fivetran (ingestion) + warehouse + BI tool + governance tool — multiple contracts, multiple integration points, multiple support relationships.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic is the complete delivery layer: certified semantic objects + dashboards + pixel-perfect reports + AI agents + Auto Voice + HyperIntelligence — one platform, one license.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No separate BI tool required. The semantic layer and BI delivery surface are the same governed platform — metrics defined once are immediately available as dashboards, reports, AI answers, and HyperIntelligence cards.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Auto Dashboards, Auto Agents, Auto Voice (Feb 2026) — BI experiences generated directly from certified metric definitions.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic can consume dbt MetricFlow models as the data foundation — acting as the governed AI+BI delivery layer on top of the dbt transformation layer.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;dbt MetricFlow defines your Revenue metric cleanly — that&#x27;s valuable. But which BI tool is delivering your Revenue dashboard? Which platform is generating your pixel-perfect regulatory report? Which tool is answering a business user&#x27;s voice query at 7am from their mobile? dbt defines the metric. Strategy Mosaic delivers every one of those experiences from it.&quot;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;02 / Governed object vs code file&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;Certified first-class objects vs YAML metric definitions in a Git repo&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;dbt Semantic Layer&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;dbt MetricFlow metric definitions are YAML files in a Git repository — accessible to data engineers with dbt project access. Business users and data stewards cannot certify or govern metrics without the Git workflow.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Access control is warehouse-level — no native &quot;user X can see Revenue but not Cost&quot; at the metric layer. Restrictions enforced by warehouse views or BI tool RLS, not dbt itself.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No certification workflow for business users. No object-level Audit &amp;amp; Compliance module. No usage analytics across surfaces.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;MetricFlow YAML spec is still evolving — a new spec update is referenced for April 2026, requiring migration for existing implementations (verify against getdbt.com/changelog before citing in customer meetings).&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic certified first-class objects: data stewards certify metrics in a governed UI without touching code files. Certification status, lineage, and access policy are metadata on the object — not a property of a YAML file.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Object-level security enforced at the Mosaic layer — every BI tool, AI agent, and MCP client respects the same security policy for the same certified object simultaneously.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic Sentinel: cross-surface semantic object-level audit trail — same metric, every access, every surface, one log. GDPR/HIPAA/SOX compliance built in.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;AI Sync for Linked Models (Feb 2026): metric changes automatically re-validate all AI experiences. No manual dbt model re-testing and BI tool re-publishing cycle.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;When your Chief Risk Officer needs a SOX-compliant audit trail showing every system that accessed the Revenue metric in the last 90 days — how do you produce that from your dbt MetricFlow YAML files and the downstream BI tools consuming them?&quot; In dbt, that requires assembling warehouse logs + BI tool access logs + dbt job logs. In Mosaic Sentinel, it is a single native report across every surface.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;03 / AI delivery architecture&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;LLM shielding + BYOE AI vs metric context for external AI systems&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;dbt Semantic Layer&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;dbt MCP server (public beta July 2025): exposes dbt models, metrics, tests, and lineage as governed context for AI systems. Valuable for grounding agents in transformation-layer logic.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;dbt itself does not generate AI answers or dashboards for business users — it provides context to downstream AI tools. AI delivery responsibility belongs to the downstream system.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;No LLM shielding. If an AI agent queries outside the dbt-defined metric context, there is no platform-level enforcement preventing it — governance depends on the downstream AI system&#x27;s behaviour.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;dbt Copilot (BYOE Azure OpenAI, GA Enterprise): developer productivity tool for writing dbt models — not a consumer-facing analytics AI.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic MCP (GA Jan 2026): connects AI agents to certified Mosaic metric definitions WITH LLM shielding — AI cannot query outside certified objects or bypass governance. Not just context, but enforced boundaries.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Auto AI Suite delivers AI directly to business users: Auto Agents answer questions, Auto Dashboards build visualisations, Auto Voice executes parallel actions. No separate AI tool required.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;BYOE (Feb 2026): Gemini 2.5, Azure OpenAI, LLAMA 3.3 70B, offline LLMs for air-gapped environments — dbt has no path for air-gapped AI delivery.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic can sit on top of dbt transformation models — consuming the dbt data foundation while adding governed AI delivery, certified object governance, and enterprise reporting.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;Your dbt MCP server exposes your metric context to AI agents — that is genuinely useful. But what prevents an AI agent from querying raw warehouse tables directly, bypassing your dbt-defined metric context entirely? Strategy Mosaic&#x27;s LLM shielding enforces that boundary by platform design. dbt&#x27;s MCP server provides context — it does not enforce the boundary.&quot;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;win-card&quot;&gt;
&lt;div class=&quot;win-num&quot;&gt;04 / Enterprise deployment&lt;/div&gt;
&lt;div class=&quot;win-card-title&quot;&gt;On-prem + air-gapped AI vs cloud-required dbt Cloud Semantic Layer&lt;/div&gt;
&lt;div class=&quot;win-mini-grid&quot;&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label comp&quot;&gt;dbt Semantic Layer&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;The dbt Semantic Layer hosted gateway is a dbt Cloud feature — dbt Starter or Enterprise plan required. Not available in dbt Core alone for production Semantic Layer queries.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;When queries run through the dbt Cloud Semantic Layer, data passes through dbt Labs servers on the way back from the warehouse — a data residency concern for regulated industries.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Microsoft Fabric NOT supported as a data platform. Power BI integration in preview as of 2025 release notes.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;dbt + Fivetran merger (Oct 2025): combined ~$600M ARR. Post-merger pricing direction and dbt Core future are active concerns in the data engineering community.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-mini&quot;&gt;
&lt;div class=&quot;win-mini-label mosaic&quot;&gt;Strategy Mosaic&lt;/div&gt;
&lt;div class=&quot;win-mini-text&quot;&gt;&lt;ul style=&quot;margin:4px 0 0 0;padding:0 0 0 15px;list-style:disc;&quot;&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Runs on AWS, Azure, GCP, StackIT, and on-premises with full feature parity. No data passes through third-party servers for Semantic Layer queries — full data sovereignty.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Offline LLM support (Jan 2026): fully air-gapped environments where no data leaves the perimeter. A procurement gate for banking, government, and defence that dbt Cloud cannot pass.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;25+ years of enterprise BI delivery — established governance, compliance certifications, and enterprise support structure. Stable YAML specifications, not a moving target.&lt;/li&gt;
&lt;li style=&quot;margin-bottom:6px;line-height:1.5;font-size:14px;&quot;&gt;Mosaic alongside dbt is a mature enterprise architecture: dbt for transformation, Mosaic for governed AI+BI delivery. Not mutually exclusive — complementary.&lt;/li&gt;
&lt;/ul&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;win-why&quot;&gt;
&lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
&lt;div class=&quot;win-why-text&quot;&gt;&quot;When Semantic Layer queries run through the dbt Cloud gateway, does data pass through dbt Labs servers? And does your data sovereignty policy permit that for regulated data?&quot; For organisations where the answer is no — on-premises dbt Core does not include the Semantic Layer. Strategy Mosaic delivers the complete governed analytics platform entirely within the customer&#x27;s infrastructure.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-zone&quot; data-section=&quot;3&quot; data-theme=&quot;green&quot;&gt;
&lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;04&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Head-to-head — dbt Semantic Layer vs Strategy Mosaic&lt;/span&gt;&lt;/div&gt;
&lt;div class=&quot;hth-wrap&quot;&gt;
&lt;table class=&quot;hth-table&quot;&gt;
&lt;thead&gt;&lt;tr&gt;
&lt;th&gt;Dimension&lt;/th&gt;
&lt;th class=&quot;col-d&quot;&gt;dbt Semantic Layer (MetricFlow)&lt;/th&gt;
&lt;th class=&quot;col-m&quot;&gt;Strategy Mosaic&lt;/th&gt;
&lt;/tr&gt;&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Product scope&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Metric definition layer attached to dbt transformation project. Generates optimised SQL for downstream tools. Not a BI platform — always requires a separate BI tool for dashboard and report delivery.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Full AI+BI platform: certified semantic layer, enterprise reporting, dashboards, Auto AI Suite, HyperIntelligence, mobile — one governed product. Can consume dbt transformation models as data foundation.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Ecosystem + community&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;De-facto standard for analytics engineering. Largest active data engineering community. MetricFlow Apache 2.0 open source. OSI member (Snowflake, Salesforce, Tableau). dbt + Fivetran merger ~$600M ARR (Oct 2025). ✓ dbt advantage for data engineering teams&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;25+ years production, Gartner 2025 Visionary, 200+ connectors. Enterprise depth over community breadth. Complements dbt as the AI+BI delivery layer — not a transformation tool.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Native BI delivery&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;None. dbt generates SQL, not dashboards or reports. Always requires a separate BI tool. Total stack = dbt + warehouse + BI tool + governance tool.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Native delivery: dashboards, pixel-perfect reports, Auto Dashboards, embedded analytics, mobile, HyperIntelligence — all from the same semantic layer without a separate BI tool.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Semantic object governance&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;YAML metric definitions in Git. Access control is warehouse-level — no native metric-level security at the dbt layer. No certification workflow for business users. No usage analytics or cross-surface audit trail.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Certified first-class objects: object-level security, certification, lineage, and cross-surface audit trail. Mosaic Sentinel: GDPR/HIPAA/SOX compliance built in. Business users certify in a UI — no Git workflow required.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;AI analytics delivery&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;dbt MCP server (public beta July 2025): exposes metric context to AI systems. dbt Copilot (developer tool). Developer Agent (beta April 2026). Does not generate business user AI answers — downstream BI tool&#x27;s responsibility.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Auto AI Suite delivers AI directly to business users: AI Agents, Auto Dashboards, Auto Voice (parallel actions). MCP GA Jan 2026 with LLM shielding. BYOE + offline LLM. No separate AI delivery tool required.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;LLM shielding&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No LLM shielding. dbt MCP server provides metric context but does not prevent AI from querying outside that context. Governance depends on the downstream AI system&#x27;s behaviour.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;LLM shielding by design — AI cannot query outside certified Mosaic objects or bypass governance. Enforced at platform level, not dependent on calling AI system behaviour.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;BYOE / deployment&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;dbt Cloud required for Semantic Layer gateway. Data passes through dbt Labs servers for Semantic Layer queries. Microsoft Fabric not supported. No offline or air-gapped AI deployment.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;AWS, Azure, GCP, StackIT, on-premises with full feature parity. Offline LLM for air-gapped environments. No data passes through third-party servers. Full sovereignty.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Enterprise reporting&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;None. dbt does not produce reports. Metric definitions must be consumed by a BI tool that delivers reports. Pixel-perfect and regulated-format output requires a separate product.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Pixel-perfect enterprise reporting native — same semantic layer, same platform, same governance. High-volume burst delivery, regulated formats, complex report books. No separate product.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;HyperIntelligence&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No equivalent and no path to it. dbt is a developer tool — injecting governed KPIs into SAP or Salesforce is outside dbt&#x27;s scope entirely.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;HyperIntelligence: zero-code injection of governed analytics cards into any web app (SAP, Salesforce, Workday, email, portals). Unique to Strategy Mosaic.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;mosaic-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Voice analytics&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;No voice interface. dbt is accessed via CLI, IDE, and API — not a consumer-facing analytics delivery surface.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Auto Voice (Feb 2026): low latency, parallel actions, Gemini-powered, mobile support. Unique in the market.&lt;/td&gt;&lt;/tr&gt;
&lt;tr class=&quot;comp-win&quot;&gt;&lt;td class=&quot;td-dim&quot;&gt;Complementary architecture&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;dbt + Mosaic is a mature enterprise architecture: dbt defines and transforms data, MetricFlow defines metric semantics, Mosaic delivers governed AI+BI on top. These tools are complementary — not mutually exclusive. ✓ Both can coexist&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Mosaic can consume dbt transformation models as the data foundation. When a customer already has dbt: Mosaic adds certified object governance, AI delivery, HyperIntelligence, and enterprise reporting — without replacing dbt transformation.&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td class=&quot;td-dim&quot;&gt;When dbt SL wins&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Developer-led data team already using dbt. Metrics-as-code in Git is the preferred governance model. Downstream BI tools already in place and working. No requirement for a unified AI+BI delivery platform.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Strategy Mosaic is not the right answer when the customer only needs a metric definition layer attached to their dbt project and is happy assembling BI delivery separately.&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td class=&quot;td-dim&quot;&gt;When Strategy Mosaic wins&lt;/td&gt;&lt;td class=&quot;td-d&quot;&gt;Strategy Mosaic is not the right answer when the customer only needs a transformation-layer metric definition tool and already has a functioning BI stack.&lt;/td&gt;&lt;td class=&quot;td-m&quot;&gt;Complete AI+BI delivery from one platform. Regulated industry requiring cross-surface semantic audit and SOX compliance. HyperIntelligence use case. Air-gapped or on-prem AI. Voice analytics. Business user governance without Git workflows.&lt;/td&gt;&lt;/tr&gt;
