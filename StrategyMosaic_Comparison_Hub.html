&lt;script&gt;
// ══════════════════════════════════════════════
// COMPLETE INTERACTION ENGINE v8
// ══════════════════════════════════════════════

const progressBar = document.getElementById('progress-bar');
const backTop     = document.getElementById('back-to-top');
const dotNav      = document.getElementById('dot-nav');
const dotItems    = dotNav ? Array.from(dotNav.querySelectorAll('.dot-nav-item')) : [];
const sectionZones = Array.from(document.querySelectorAll('.section-zone[data-section]'));

// ─── Progress bar + back to top ───
function updateScroll() {
  const sy = window.scrollY;
  const dh = document.documentElement.scrollHeight - window.innerHeight;
  progressBar.style.width = (dh &gt; 0 ? (sy/dh)*100 : 0) + '%';
  backTop.classList.toggle('visible', sy &gt; 400);

  // Active dot nav
  let activeIdx = 0;
  sectionZones.forEach((zone, i) =&gt; {
    const top = zone.getBoundingClientRect().top;
    if (top &lt;= window.innerHeight * 0.45) activeIdx = i;
  });
  dotItems.forEach((d, i) =&gt; d.classList.toggle('active', i === activeIdx));
}
window.addEventListener('scroll', updateScroll, { passive: true });
updateScroll();

backTop.addEventListener('click', () =&gt; window.scrollTo({ top: 0, behavior: 'smooth' }));

// ─── Dot nav click ───
dotItems.forEach(dot =&gt; {
  dot.addEventListener('click', () =&gt; {
    const idx = parseInt(dot.dataset.target);
    const zone = sectionZones[idx];
    if (zone) zone.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

// ─── General reveal observer ───
const revealObs = new IntersectionObserver((entries) =&gt; {
  entries.forEach(e =&gt; {
    if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
  });
}, { threshold: 0.07, rootMargin: '0px 0px -30px 0px' });
document.querySelectorAll('.reveal').forEach(el =&gt; revealObs.observe(el));

// ─── Staggered point reveals inside col-cards ───
const pointObs = new IntersectionObserver((entries) =&gt; {
  entries.forEach(e =&gt; {
    if (e.isIntersecting) {
      e.target.querySelectorAll('.point').forEach((pt, i) =&gt;
        setTimeout(() =&gt; pt.classList.add('point-visible'), i * 60)
      );
      pointObs.unobserve(e.target);
    }
  });
}, { threshold: 0.08 });
document.querySelectorAll('.col-card').forEach(el =&gt; pointObs.observe(el));

// ─── Face-off animation (differentiator boxes) ───
const diffGrid = document.getElementById('diff-grid');
if (diffGrid) {
  const faceObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        setTimeout(() =&gt; e.target.querySelectorAll('.diff-box').forEach(b =&gt; b.classList.add('face-in')), 100);
        faceObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  faceObs.observe(diffGrid);
}


// ─── How We Win cards stagger ───
const winGrid = document.getElementById('win-grid');
if (winGrid) {
  const winObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        e.target.querySelectorAll('.win-card').forEach((card, i) =&gt;
          setTimeout(() =&gt; card.classList.add('win-visible'), i * 90)
        );
        winObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  winObs.observe(winGrid);
}

// ─── H2H row sequential reveal ───
const hthWrap = document.querySelector('.hth-wrap');
if (hthWrap) {
  const hthObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        e.target.querySelectorAll('.hth-row').forEach((row, i) =&gt;
          setTimeout(() =&gt; row.classList.add('row-visible'), i * 55)
        );
        hthObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.05 });
  hthObs.observe(hthWrap);
}

// ─── Count-up animation ───
function animateCount(el) {
  const target   = parseFloat(el.dataset.countup);
  const suffix   = el.dataset.suffix || '';
  const decimals = parseInt(el.dataset.decimals || '0');
  const dur      = 1200;
  const start    = performance.now();
  function tick(now) {
    const progress = Math.min((now - start) / dur, 1);
    const ease     = 1 - Math.pow(1 - progress, 3);
    const val      = (target * ease).toFixed(decimals);
    el.textContent = val + suffix;
    if (progress &lt; 1) requestAnimationFrame(tick);
    else el.textContent = target.toFixed(decimals) + suffix;
  }
  requestAnimationFrame(tick);
}
const countObs = new IntersectionObserver((entries) =&gt; {
  entries.forEach(e =&gt; {
    if (e.isIntersecting &amp;&amp; e.target.dataset.countup) {
      animateCount(e.target);
      countObs.unobserve(e.target);
    }
  });
}, { threshold: 0.5 });
document.querySelectorAll('[data-countup]').forEach(el =&gt; countObs.observe(el));

// ─── Pricing bar fill with bounce easing ───
const fillObs = new IntersectionObserver((entries) =&gt; {
  entries.forEach(e =&gt; {
    if (e.isIntersecting) {
      e.target.querySelectorAll('.tier-fill-bar').forEach((bar, i) =&gt; {
        const w = bar.dataset.width || 50;
        setTimeout(() =&gt; { bar.style.width = w + '%'; bar.classList.add('filled'); }, i * 130);
      });
      fillObs.unobserve(e.target);
    }
  });
}, { threshold: 0.2 });
document.querySelectorAll('.pricing-card').forEach(el =&gt; fillObs.observe(el));

// ─── Overlap cards stagger ───
const overlapGrid = document.getElementById('overlap-grid');
if (overlapGrid) {
  const ovObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        e.target.querySelectorAll('.overlap-item').forEach((item, i) =&gt;
          setTimeout(() =&gt; item.classList.add('overlap-visible'), i * 80)
        );
        ovObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  ovObs.observe(overlapGrid);
}

// ─── Flag items slide reveal ───
const flagsCard = document.querySelector('.flags-card');
if (flagsCard) {
  const flagObs = new IntersectionObserver((entries) =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) {
        e.target.querySelectorAll('.flag-row').forEach((row, i) =&gt;
          setTimeout(() =&gt; row.classList.add('flag-visible'), i * 90)
        );
        flagObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  flagObs.observe(flagsCard);
}

&lt;div class=&quot;arc-layer arc-reveal&quot; id=&quot;arc-core&quot;&gt;

&lt;div class=&quot;arc-ltitle&quot;&gt;Core Processing — Most Different&lt;/div&gt;
&lt;div class=&quot;arc-lbadge diff&quot;&gt;Where they truly diverge&lt;/div&gt;
&lt;div class=&quot;arc-lline&quot;&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-split-row&quot;&gt;
&lt;div class=&quot;arc-band d&quot;&gt;
&lt;div class=&quot;arc-band-kicker&quot;&gt;
&lt;span class=&quot;arc-band-label&quot;&gt;Denodo — Access + Federated Runtime&lt;/span&gt;
&lt;span class=&quot;arc-pill d&quot;&gt;VDP adapters + live federated pushdown&lt;/span&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-big-node arc-tt&quot; data-insight=&quot;The architecture is SQL-first and schema-centric from connection through runtime. Cross-source federation is Denodo's killer capability, while business meaning is layered into derived views rather than existing as independent certified objects.&quot; data-text=&quot;Denodo connects through its Virtual DataPort (VDP) engine using JDBC/ODBC, REST, SOAP, GraphQL, and OData adapters. Physical schemas become base views, then derived views add joins, transforms, and business logic, and published views expose unified virtual datasets. A cost-based optimizer plans cross-source joins at runtime. This is Denodo's gold standard: join Oracle + Salesforce + S3 in one virtual query without ETL.&quot; data-title=&quot;Denodo — VDP Access Layer + Logical Data Runtime&quot;&gt;
&lt;div class=&quot;arc-big-node-title&quot;&gt;VDP Access Layer + Logical Data Runtime&lt;/div&gt;
&lt;div class=&quot;arc-big-node-sub&quot;&gt;Connection begins at VDP adapters, then flows through base, derived, and published views with live federated execution. KPIs still live inside SQL-based views — no independent certified existence.&lt;/div&gt;
&lt;div class=&quot;arc-sub-grid&quot;&gt;
&lt;div class=&quot;arc-sub-node acc-d arc-tt&quot; data-insight=&quot;Cross-source federation: join Oracle ERP + Salesforce CRM + S3 files in one virtual query at runtime. No ETL required — Denodo's clearest competitive strength.&quot; data-text=&quot;Base views mirror source schemas. Derived views apply SQL transformations, cross-source joins, and business logic. Published views expose unified virtual datasets to consumers. A cost-based optimizer selects the optimal execution path across sources at runtime.&quot; data-title=&quot;Virtual View Hierarchy&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--blue-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--blue)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;rect height=&quot;10&quot; rx=&quot;1&quot; width=&quot;6&quot; x=&quot;2&quot; y=&quot;7&quot;&gt;&lt;/rect&gt;&lt;rect height=&quot;18&quot; rx=&quot;1&quot; width=&quot;6&quot; x=&quot;9&quot; y=&quot;3&quot;&gt;&lt;/rect&gt;&lt;rect height=&quot;7&quot; rx=&quot;1&quot; width=&quot;6&quot; x=&quot;16&quot; y=&quot;10&quot;&gt;&lt;/rect&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;Virtual View Hierarchy&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;Base → Derived → Published views&lt;/li&gt;&lt;li&gt;Cross-source joins at query runtime&lt;/li&gt;&lt;li&gt;Cost-based query optimizer (VQL)&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sub-node acc-d arc-tt&quot; data-insight=&quot;Cache is disk-based, not in-memory — useful for repeat-query reduction, but architecturally different from Mosaic's in-memory semantic reuse. Confirmed in the H2H overlap section.&quot; data-text=&quot;Denodo's external database cache (embedded Derby or external RDBMS) stores frequently-run query results. Cache modes: full, incremental, partial. Performance gain from avoiding source re-fetch — not RAM-resident computation. Lakehouse Accelerator (Presto/Velox MPP) for heavy analytical workloads.&quot; data-title=&quot;Cache &amp;amp; Performance&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--blue-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--blue)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;path d=&quot;M13 2L3 14h9l-1 8 10-12h-9l1-8z&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;Cache &amp;amp; Performance&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;External JDBC database cache&lt;/li&gt;&lt;li&gt;Lakehouse Accelerator — Velox MPP&lt;/li&gt;&lt;li&gt;Multi-mode: full / incremental / partial cache&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sub-node acc-d arc-tt&quot; data-insight=&quot;VDP is where Denodo's competitive differentiation begins — the federated query planner is industry-leading.&quot; data-text=&quot;Core runtime that abstracts physical schemas into virtual base views using VQL — a SQL-compatible query language. Acts as a universal data access layer between sources and consumers, with built-in cost-based query optimization for federated query planning.&quot; data-title=&quot;VDP Engine&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--blue-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--blue)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;polyline points=&quot;16 18 22 12 16 6&quot;&gt;&lt;/polyline&gt;&lt;polyline points=&quot;8 6 2 12 8 18&quot;&gt;&lt;/polyline&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;VDP Engine&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;JDBC / ODBC / REST / SOAP / GraphQL / OData&lt;/li&gt;&lt;li&gt;Base views — raw schema mirrors&lt;/li&gt;&lt;li&gt;VQL — SQL-compatible query language&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sub-node acc-d arc-tt&quot; data-insight=&quot;Strong adapter breadth. But connection is schema-centric — business semantics come later in derived views.&quot; data-text=&quot;Native adapters for traditional databases, NoSQL (Elasticsearch, MongoDB, Cassandra), cloud-native (Cosmos DB, DynamoDB), Hadoop/Hive/Spark, and file formats. Connection is at the data-schema level — business meaning must be added upstream.&quot; data-title=&quot;100+ Source Adapters&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--blue-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--blue)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;path d=&quot;M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71&quot;&gt;&lt;/path&gt;&lt;path d=&quot;M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;100+ Source Adapters&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;Hadoop / Hive / Spark / Presto&lt;/li&gt;&lt;li&gt;Elasticsearch / MongoDB / Cassandra&lt;/li&gt;&lt;li&gt;Files: CSV, JSON, XML, Parquet&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-note d&quot;&gt;KPIs live inside SQL derived views — no independent existence. Multiple views can carry conflicting definitions. Consistency requires governance applied outside Denodo.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-band m&quot;&gt;
&lt;div class=&quot;arc-band-kicker&quot;&gt;
&lt;span class=&quot;arc-band-label&quot;&gt;Mosaic — Semantic Connection + Hybrid Runtime&lt;/span&gt;
&lt;span class=&quot;arc-pill m&quot;&gt;Semantic connectors + hybrid pushdown/in-memory&lt;/span&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-big-node arc-tt&quot; data-insight=&quot;This is the core of Win 01 (Consistent Meaning) and Win 04 (Execution Efficiency) in the comparison. Business meaning starts at connection, then carries through runtime and every consumption surface.&quot; data-text=&quot;200+ native semantic connectors map source data into governed business objects at the point of connection. The Semantic Graph stores certified metrics, attributes, hierarchies, relationships, and security policies as connected metadata. Define once, deploy everywhere: Tableau, Power BI, AI agents, MCP clients all draw from the same governed definitions. Hybrid execution combines pushdown for live queries with in-memory reuse for concurrent workloads.&quot; data-title=&quot;Mosaic — Semantic Connectors, Semantic Graph &amp;amp; Hybrid Engine&quot;&gt;
&lt;div class=&quot;arc-big-node-title&quot;&gt;Semantic Connection + Semantic Graph + Hybrid Engine&lt;/div&gt;
&lt;div class=&quot;arc-big-node-sub&quot;&gt;Business meaning is assigned at connection, stored as certified first-class objects, and executed through hybrid pushdown plus in-memory reuse. Define once, consistent everywhere.&lt;/div&gt;
&lt;div class=&quot;arc-sub-grid&quot;&gt;
&lt;div class=&quot;arc-sub-node acc-m arc-tt&quot; data-insight=&quot;Define-once-deploy-everywhere. This directly addresses the comparison's H2H row: Semantic layer architecture — Mosaic: first-class certified objects.&quot; data-text=&quot;The Semantic Graph stores attributes, certified metrics, KPI definitions, hierarchies, relationships, and security policies as a connected metadata graph. It is platform-neutral and portable. Revenue means the same thing in Tableau, Power BI, and via MCP — because the definition lives in Mosaic, not in any consuming tool.&quot; data-title=&quot;Semantic Graph&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--orange-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--orange)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;3&quot;&gt;&lt;/circle&gt;&lt;circle cx=&quot;3&quot; cy=&quot;6&quot; r=&quot;2&quot;&gt;&lt;/circle&gt;&lt;circle cx=&quot;21&quot; cy=&quot;6&quot; r=&quot;2&quot;&gt;&lt;/circle&gt;&lt;circle cx=&quot;3&quot; cy=&quot;18&quot; r=&quot;2&quot;&gt;&lt;/circle&gt;&lt;circle cx=&quot;21&quot; cy=&quot;18&quot; r=&quot;2&quot;&gt;&lt;/circle&gt;&lt;path d=&quot;M5 6h5M14 6h5M5 18h5M14 18h5M10 12H5M14 12h5&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;Semantic Graph&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;Certified metrics — first-class objects&lt;/li&gt;&lt;li&gt;Security travels with the model&lt;/li&gt;&lt;li&gt;Define once · deploy everywhere&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sub-node acc-m arc-tt&quot; data-insight=&quot;Concurrent users sharing semantic results rather than each independently hitting the warehouse — Win 04 (Performance &amp;amp; Cost) in the comparison.&quot; data-text=&quot;Mosaic uses intelligent pushdown for live queries and in-memory semantic reuse for repeated/concurrent workloads. When 50 users run the same Revenue dashboard simultaneously, the warehouse is queried once and the result served from the semantic engine — reducing cloud warehouse spend materially. This is the source of Win 04: Execution Efficiency.&quot; data-title=&quot;Hybrid Execution Engine&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--orange-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--orange)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;polygon points=&quot;13 2 3 14 12 14 11 22 21 10 12 10 13 2&quot;&gt;&lt;/polygon&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;Hybrid Execution Engine&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;Intelligent pushdown for live queries&lt;/li&gt;&lt;li&gt;In-memory reuse for concurrent workloads&lt;/li&gt;&lt;li&gt;50 users → warehouse hit once&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sub-node acc-m arc-tt&quot; data-insight=&quot;Semantic-first connection is Mosaic's fundamental architectural difference from Denodo — confirmed in the comparison's Win 01: Consistent Meaning vs Disciplined SQL.&quot; data-text=&quot;Unlike JDBC adapters, Mosaic's connectors are semantic-aware — they understand source schema patterns and auto-suggest object mappings. Business meaning assigned at connection: SQL (JDBC), DAX, MDX, REST, Python. Optimised connectors for Tableau, Power BI, Excel, Google Sheets.&quot; data-title=&quot;Semantic Connectors&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--orange-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--orange)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;10&quot;&gt;&lt;/circle&gt;&lt;path d=&quot;M12 8v4l3 3&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;Semantic Connectors&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;SQL (JDBC), DAX, MDX, REST, Python&lt;/li&gt;&lt;li&gt;Schema auto-mapping to business objects&lt;/li&gt;&lt;li&gt;Tableau, Power BI, Excel optimised connectors&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sub-node acc-g arc-tt&quot; data-insight=&quot;Mosaic Studio removes the manual modeling bottleneck — directly relevant to Win 01 (Consistent Meaning) and Win 03 (Stack Simplification) in the comparison.&quot; data-text=&quot;AI-powered modeling built into Mosaic. Analyzes raw source schemas, auto-creates semantic objects and relationships, applies aggregation functions, detects duplicates, generates Python queries. Up to 10× faster than manual modeling. Business teams, not just engineers, build production-ready semantic models.&quot; data-title=&quot;Mosaic Studio — AI Modeling&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--green-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--green)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;path d=&quot;M12 2a10 10 0 1 0 10 10&quot;&gt;&lt;/path&gt;&lt;path d=&quot;M12 6v6l4 2&quot;&gt;&lt;/path&gt;&lt;path d=&quot;M20 2l-4 4 4 4V2z&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;Mosaic Studio — AI Modeling&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;AI auto-creates objects &amp;amp; relationships&lt;/li&gt;&lt;li&gt;Up to 10× faster than manual modeling&lt;/li&gt;&lt;li&gt;Business teams can self-serve&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-note m&quot;&gt;Governance scope extends through consumption — BI tools, AI agents, MCP clients all draw from the same governed definitions. Security travels with the model, not replicated per tool.&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;arc-lbadge split&quot;&gt;Significantly different scope&lt;/div&gt;
&lt;div class=&quot;arc-lline&quot;&gt;&lt;/div&gt;

&lt;div class=&quot;arc-split-row&quot;&gt;
&lt;div class=&quot;arc-band d&quot;&gt;
&lt;div class=&quot;arc-band-kicker&quot;&gt;
&lt;span class=&quot;arc-band-label&quot;&gt;Denodo — Access-layer governance&lt;/span&gt;
&lt;span class=&quot;arc-pill d&quot;&gt;RBAC + view-level controls&lt;/span&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-big-node arc-tt&quot; data-insight=&quot;Governance at the access layer is valuable — masking ensures source data is never directly exposed. The comparison's overlap section confirms both enforce row-level security and RBAC centrally.&quot; data-text=&quot;RBAC, column masking, row-level security, and audit logging enforced at the virtual view layer. Any consumer routing through Denodo is governed. Direct source access bypasses all controls. Scope: access layer only. Platform 9.4 adds embedded MCP — AI agents connect via SQL views and MCP, with vector DB for unstructured data.&quot; data-title=&quot;Denodo Governance&quot;&gt;
&lt;div class=&quot;arc-big-node-title&quot;&gt;Access Control &amp;amp; MCP (9.4)&lt;/div&gt;
&lt;div class=&quot;arc-big-node-sub&quot;&gt;Governance enforced at the virtual view layer. MCP embedded in Platform 9.4 — AI agents query SQL views via MCP interface.&lt;/div&gt;
&lt;div class=&quot;arc-sub-grid&quot;&gt;
&lt;div class=&quot;arc-sub-node acc-d arc-tt&quot; data-insight=&quot;Governance is at the access layer — scope ends where Denodo ends. H2H confirms: 'governance enforced at the access layer — upstream source definitions may diverge'.&quot; data-text=&quot;RBAC policies, column-level data masking, row-level security, and audit logging enforced at the virtual access layer. Consumers routing through Denodo are governed — direct source access bypasses controls. Lineage available within the VDP boundary.&quot; data-title=&quot;Denodo Governance Controls&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--blue-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--blue)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;path d=&quot;M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;Governance Controls&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;RBAC at virtual layer&lt;/li&gt;&lt;li&gt;Column masking &amp;amp; row-level security&lt;/li&gt;&lt;li&gt;Audit logging, lineage within VDP&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sub-node acc-d arc-tt&quot; data-insight=&quot;MCP access is real and functional. The key difference (confirmed in the comparison's Win 02): Denodo gives AI a pipe to data. Mosaic gives AI governed business meaning.&quot; data-text=&quot;Platform 9.4 embeds MCP directly — governed data accessible from any MCP-compatible agent. Agents query virtual SQL views, seeing schema-level data. Vector DB integration (9.4) adds unstructured data access. DeepQuery enables multi-step analytical reasoning. The comparison overlap confirms: both support MCP — MCP alone is not a differentiator.&quot; data-title=&quot;Denodo AI Access — Platform 9.4&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--blue-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--blue)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;rect height=&quot;14&quot; rx=&quot;2&quot; width=&quot;20&quot; x=&quot;2&quot; y=&quot;3&quot;&gt;&lt;/rect&gt;&lt;path d=&quot;m8 21 8-8&quot;&gt;&lt;/path&gt;&lt;path d=&quot;m16 21-8-8&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-sn-title&quot;&gt;AI / MCP Access (9.4)&lt;/div&gt;
&lt;ul class=&quot;arc-sn-list&quot;&gt;&lt;li&gt;MCP embedded — 9.4 release&lt;/li&gt;&lt;li&gt;AI sees SQL views + vector DB&lt;/li&gt;&lt;li&gt;DeepQuery: multi-step reasoning&lt;/li&gt;&lt;/ul&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-boundary d&quot;&gt;Denodo governance scope ends at the access layer&lt;/div&gt;
&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-band m&quot;&gt;
&lt;div class=&quot;arc-band-kicker&quot;&gt;
&lt;span class=&quot;arc-band-label&quot;&gt;Mosaic — Semantic + AI governance&lt;/span&gt;
&lt;span class=&quot;arc-pill m&quot;&gt;Sentinel + LLM shielding&lt;/span&gt;
&lt;/div&gt;
&lt;div class=&quot;arc-big-node arc-tt&quot; data-insight=&quot;Win 02 (AI Hallucination Protection): Denodo gives AI a pipe to data. Mosaic gives AI governed business meaning. LLMs interact with metadata and governed context — not full datasets.&quot; data-text=&quot;Governance extends through all consumption: BI tools, AI agents, MCP clients all governed by the same semantic model. Mosaic Sentinel (Jan 2026) adds three modules: Risk Management (real-time anomaly detection), Audit &amp;amp; Compliance (GDPR/HIPAA/SOX trails), Usage Insights (semantic layer utilisation). MCP connects Claude, Copilot, Gemini, ChatGPT to certified metric definitions — not raw views.&quot; data-title=&quot;Mosaic Sentinel &amp;amp; AI-Safe Access&quot;&gt;
&lt;div class=&quot;arc-big-node-title&quot;&gt;Mosaic Sentinel &amp;amp; AI-Safe MCP&lt;/div&gt;
&lt;div class=&quot;arc-big-node-sub&quot;&gt;Governance continues through consumption. AI agents query certified metric definitions, not raw SQL. Security policy travels with the semantic model everywhere.&lt;/div&gt;
&lt;div class=&quot;arc-sub-grid&quot;&gt;
&lt;div class=&quot;arc-sub-node acc-p arc-tt&quot; data-insight=&quot;Confirmed in the H2H Governance row: Mosaic Sentinel provides Risk Management, Audit &amp;amp; Compliance, and Usage Insights — all without data movement.&quot; data-text=&quot;Unified governance intelligence platform with three modules. Risk Management: real-time risk alerts, anomaly detection, intelligent scoring. Audit &amp;amp; Compliance: complete trail of who accessed what data and when — GDPR, HIPAA, SOX. Usage Insights: semantic layer utilisation monitoring and model optimisation. No data movement required for governance.&quot; data-title=&quot;Mosaic Sentinel (Jan 2026)&quot;&gt;
&lt;div class=&quot;arc-sn-icon&quot; style=&quot;background:var(--purple-light);&quot;&gt;
&lt;svg fill=&quot;none&quot; height=&quot;14&quot; stroke=&quot;var(--purple)&quot; stroke-linecap=&quot;round&quot; stroke-width=&quot;2&quot; viewbox=&quot;0 0 24 24&quot; width=&quot;14&quot;&gt;&lt;path d=&quot;M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z&quot;&gt;&lt;/path&gt;&lt;path d=&quot;m9 12 2 2 4-4&quot;&gt;&lt;/path&gt;&lt;/svg&gt;

&lt;script&gt;
(function(){
  // ── Global fixed tooltip — never clips ──
  const tt      = document.getElementById('arc-tooltip');
  const ttTitle = document.getElementById('arc-tt-title');
  const ttBody  = document.getElementById('arc-tt-body');
  const ttInsight = document.getElementById('arc-tt-insight');

  function showTT(e, title, body, insight) {
    ttTitle.textContent = title;
    ttBody.textContent  = body;
    ttInsight.textContent = insight ? '💡 ' + insight : '';
    ttInsight.style.display = insight ? 'block' : 'none';
    tt.style.display = 'block';
    moveTT(e);
  }
  function moveTT(e) {
    const pad = 16, w = 320;
    let left = e.clientX + pad;
    let top  = e.clientY - 12;
    if (left + w &gt; window.innerWidth - 20) left = e.clientX - w - pad;
    const h = tt.offsetHeight || 140;
    if (top + h &gt; window.innerHeight - 20) top = window.innerHeight - h - 20;
    if (top &lt; 10) top = 10;
    tt.style.left = left + 'px';
    tt.style.top  = top  + 'px';
  }
  function hideTT() { tt.style.display = 'none'; }

  document.querySelectorAll('.arc-tt').forEach(el =&gt; {
    el.addEventListener('mouseenter', e =&gt; showTT(e, el.dataset.title, el.dataset.text, el.dataset.insight));
    el.addEventListener('mousemove',  moveTT);
    el.addEventListener('mouseleave', hideTT);
  });

  // ── Scroll reveal ──
  const obs = new IntersectionObserver(entries =&gt; {
    entries.forEach(e =&gt; {
      if (e.isIntersecting) { e.target.classList.add('arc-in'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.06, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.arc-reveal').forEach(el =&gt; obs.observe(el));
})();
&lt;/script&gt;

function arcSwitch(view) {
  var body   = document.body;
  var btnCmp = document.getElementById('arcbtn-cmp');
  var btnArc = document.getElementById('arcbtn-arc');
  if (view === 'arc') {
    body.classList.add('arc-mode');
    btnCmp.classList.remove('arc-active');
    btnArc.classList.add('arc-active');
    window.scrollTo({ top: 0 });
  } else {
    body.classList.remove('arc-mode');
    btnCmp.classList.add('arc-active');
    btnArc.classList.remove('arc-active');
    window.scrollTo({ top: 0 });
  }
}

<script>
function showTab(name) {
  ['atscale','denodo'].forEach(n => {
    var frame = document.getElementById('frame-' + n);
    var tab   = document.getElementById('tab-' + n);
    var isActive = (n === name);
    frame.classList.toggle('active', isActive);
    tab.classList.toggle('active', isActive);
    tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
    frame.style.pointerEvents = isActive ? 'auto' : 'none';
  });
  if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
    document.activeElement.blur();
  }
  var frame = document.getElementById('frame-' + name);
  if (frame && frame.contentWindow) {
    try { frame.contentWindow.scrollTo(0, 0); } catch(e) {}
  }
}
document.addEventListener('DOMContentLoaded', function() {
  ['atscale','denodo'].forEach(n => {
    var frame = document.getElementById('frame-' + n);
    if (!frame.classList.contains('active')) frame.style.pointerEvents = 'none';
    var tab = document.getElementById('tab-' + n);
    tab.addEventListener('mousedown', function(e) { e.preventDefault(); });
    tab.addEventListener('click', function() { tab.focus(); });
  });
});
</script>
