  font-family: var(--font); letter-spacing: 0.01em;
  margin-bottom: -2px; white-space: nowrap;
}
.arc-toggle-btn:hover { color: var(--dark); }
.arc-toggle-btn.arc-active { color: var(--orange); border-bottom-color: var(--orange); }
.arc-toggle-icon {
  width: 18px; height: 18px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.arc-toggle-icon.cmp { background: var(--blue-light); color: var(--blue); }
.arc-toggle-icon.arc { background: var(--orange-light); color: var(--orange); }
.arc-toggle-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
/* Hide original fixed elements when arch view is active */
body.arc-mode #progress-bar,
body.arc-mode #back-to-top,
body.arc-mode #dot-nav { display: none !important; }
/* Hide the comparison content when arch mode active */
body.arc-mode .arc-cmp-content { display: none; }
/* Show arch panel only in arch mode */
#arc-view-arc { display: none; }
body.arc-mode #arc-view-arc { display: block; }


/* ── ARC PANEL: inherits Hub tokens, adds only what&#x27;s needed ── */
.arc-panel {
  padding: 32px 64px 60px;
  max-width: 1260px;
  margin: 0 auto;
}
@media(min-width:1440px){ .arc-panel { max-width: 1400px; } }

/* Legend bar */
.arc-legend {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 12px 18px;
  background: var(--bg-section);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 24px;
}
.arc-legend-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--grey-faint);
  font-family: var(--font-mono);
  margin-right: 4px;
}
.arc-lpill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: #fff;
  font-size: 12px;
  font-weight: 600;
  color: var(--grey-text);
}
.arc-ldot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.arc-legend-hint {
  margin-left: auto;
  font-size: 11px;
  color: var(--grey-faint);
  font-family: var(--font-mono);
}

/* Canvas */
.arc-canvas {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.07), 0 2px 8px rgba(0,0,0,0.04);
  overflow: hidden;
  position: relative;
}
.arc-canvas::before {
  content: &quot;&quot;;
  position: absolute; inset: 0;
  background: linear-gradient(90deg,
    rgba(24,72,200,0.022) 0%, transparent 28%,
    transparent 72%, rgba(250,102,15,0.022) 100%);
  pointer-events: none;
}

/* Layer section */
.arc-layer {
  position: relative;
  z-index: 1;
  padding: 26px 32px 22px;
}
.arc-layer + .arc-layer { border-top: 1px solid rgba(216,216,232,0.55); }
.arc-layer.arc-alt { background: rgba(247,247,251,0.55); }

/* Layer header */
.arc-lhead {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 20px;
}
.arc-lline { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); max-width: 140px; }
.arc-lnum {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700; letter-spacing: 0.2em;
  color: var(--grey-faint);
  background: var(--bg-section);
  border: 1px solid var(--border-soft);
  border-radius: 999px;
  padding: 2px 10px;
}
.arc-ltitle {
  font-family: var(--font-mono);
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--grey-muted);
  white-space: nowrap;
}
.arc-lbadge {
  font-family: var(--font-mono);
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px; border-radius: 999px; border: 1px solid;
}
.arc-lbadge.shared { color: var(--purple); border-color: rgba(94,53,177,0.25); background: rgba(94,53,177,0.06); }
.arc-lbadge.split  { color: var(--orange); border-color: var(--orange-border); background: var(--orange-light); }
.arc-lbadge.diff   { color: var(--blue);   border-color: var(--blue-border);   background: var(--blue-light); }
.arc-lbadge.conv   { color: var(--green);  border-color: var(--green-border);  background: var(--green-light); }

/* Source grid */
.arc-src-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 14px;
}
.arc-src-card {
  background: linear-gradient(145deg,#fff,var(--bg-section));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 14px 16px;
  text-align: center;
  cursor: default;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.arc-src-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.09); border-color: rgba(94,53,177,0.3); }
.arc-src-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
  flex-shrink: 0;
}
.arc-src-name { font-size: 13.5px; font-weight: 700; color: var(--dark); margin-bottom: 4px; letter-spacing: -0.01em; }
.arc-src-sub  { font-size: 11.5px; color: var(--grey-muted); line-height: 1.4; }
.arc-src-foot {
  display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 8px;
}
.arc-src-note { font-size: 12px; color: var(--grey-faint); font-style: italic; }
.arc-conn-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 999px;
  border: 1px solid var(--green-border); background: var(--green-light); color: var(--green);
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}

/* Flow down */
.arc-flow-down {
  display: flex; justify-content: center;
  height: 48px; position: relative; z-index: 1;
}
.arc-flow-track {
  position: relative; width: 3px; height: 44px; border-radius: 999px;
  background: linear-gradient(180deg,
    rgba(24,72,200,0.18), rgba(107,114,128,0.12), rgba(250,102,15,0.18));
  overflow: visible;
}
.arc-flow-bead {
  position: absolute; left: 50%; top: -8px;
  width: 10px; height: 10px; border-radius: 50%;
  transform: translateX(-50%);
  background: conic-gradient(var(--blue), var(--orange), var(--blue));
  box-shadow: 0 0 10px rgba(24,72,200,0.3), 0 0 6px rgba(250,102,15,0.2);
  animation: arcFlowDrop 2.2s ease-in-out infinite;
}
@keyframes arcFlowDrop {
  0%   { top:-8px; opacity:0; }
  15%  { opacity:1; }
  85%  { opacity:1; }
  100% { top:42px; opacity:0; }
}

/* Split flow */
.arc-split-wrap {
  display: flex; justify-content: center;
  height: 64px; position: relative; z-index: 1;
}
.arc-split-stem {
  position: absolute; top:0; left:50%; transform:translateX(-50%);
  width:3px; height:26px; border-radius:999px;
  background: linear-gradient(180deg, rgba(24,72,200,0.18), rgba(250,102,15,0.18));
  overflow:visible;
}
.arc-split-stem-bead {
  position:absolute; top:-8px; left:50%; transform:translateX(-50%);
  width:10px; height:10px; border-radius:50%;
  background: conic-gradient(var(--blue), var(--orange), var(--blue));
  animation: arcSplitDrop 2.4s ease-in-out infinite;
}
@keyframes arcSplitDrop {
  0%   { top:-8px; opacity:0; }
  20%  { opacity:1; }
  80%  { opacity:1; }
  100% { top:24px; opacity:0; }
}
.arc-split-arms {
  position:absolute; top:24px;
  width:min(76%,940px); height:38px;
}
.arc-split-arms::before,.arc-split-arms::after {
  content:&quot;&quot;; position:absolute; top:0; width:50%; height:38px;
  border-top:2.5px solid rgba(107,114,128,0.14);
}
.arc-split-arms::before { left:0; border-left:2.5px solid rgba(24,72,200,0.25); border-top-left-radius:22px; }
.arc-split-arms::after  { right:0; border-right:2.5px solid rgba(250,102,15,0.25); border-top-right-radius:22px; }
.arc-bead-l, .arc-bead-r {
  position:absolute; top:20px;
  width:12px; height:12px; border-radius:50%;
}
.arc-bead-l {
  left:calc(50% - 6px); background:var(--blue);
  filter:drop-shadow(0 0 5px rgba(24,72,200,0.55));
  animation:arcBeadLeft 2.4s ease-in-out infinite;
}
.arc-bead-r {
  left:calc(50% - 6px); background:var(--orange);
  filter:drop-shadow(0 0 5px rgba(250,102,15,0.55));
  animation:arcBeadRight 2.4s ease-in-out infinite;
}
.arc-split-label {
  position:absolute; top:-16px; left:50%; transform:translateX(-50%);
  font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--grey-faint); font-family:var(--font-mono); white-space:nowrap;
}
@keyframes arcBeadLeft {
  0%   { transform:translate(0,0) scale(.75); opacity:0; }
  20%  { opacity:1; }
  65%  { transform:translate(calc(-50% - 17vw),16px) scale(1); opacity:1; }
  100% { transform:translate(calc(-50% - 34vw),30px) scale(.8); opacity:0; }
}
@keyframes arcBeadRight {
  0%   { transform:translate(0,0) scale(.75); opacity:0; }
  20%  { opacity:1; }
  65%  { transform:translate(calc(-50% + 17vw),16px) scale(1); opacity:1; }
  100% { transform:translate(calc(-50% + 34vw),30px) scale(.8); opacity:0; }
}

/* Split row layout */
.arc-split-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  align-items: stretch;
  width: 100%;
}
/* Band */
.arc-band {
  border-radius:var(--radius-lg);
  padding:16px 16px 14px;
  box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column;
  position:relative; overflow:hidden;
}
.arc-band::after {
  content:&quot;&quot;; position:absolute; inset:0; border-radius:inherit;
  pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,transparent 40%);
}
.arc-band.d {
  background:linear-gradient(160deg,rgba(24,72,200,0.065) 0%,rgba(255,255,255,0.98) 55%);
  border:1px solid var(--blue-border);
}
.arc-band.m {
  background:linear-gradient(160deg,rgba(250,102,15,0.065) 0%,rgba(255,255,255,0.98) 55%);
  border:1px solid var(--orange-border);
}
.arc-band-kicker {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:11px; position:relative; z-index:1;
}
.arc-band-label {
  font-family:var(--font-mono); font-size:9.5px; font-weight:700;
  letter-spacing:0.18em; text-transform:uppercase; color:var(--grey-muted);
}
.arc-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:999px;
  font-family:var(--font-mono); font-size:9px; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase; white-space:nowrap;
}
.arc-pill::before { content:&quot;◆&quot;; font-size:5px; }
.arc-pill.d { background:var(--blue-light); color:#1439a8; border:1px solid var(--blue-border); }
.arc-pill.m { background:var(--orange-light); color:#c44800; border:1px solid var(--orange-border); }

/* Big node */
.arc-big-node {
  background:rgba(255,255,255,0.75);
  border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);
  padding:14px 14px 12px;
  position:relative; z-index:1; flex:1;
  cursor:default;
  transition:box-shadow 0.2s;
}
.arc-big-node:hover { box-shadow:0 6px 20px rgba(0,0,0,0.09); }
.arc-big-node-title {
  font-size:15px; font-weight:700; letter-spacing:-0.015em;
  color:var(--dark); margin-bottom:4px; line-height:1.2;
}
.arc-big-node-sub {
  font-size:12px; color:var(--grey-muted); margin-bottom:12px; line-height:1.45;
}

/* Sub-grid */
.arc-sub-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.arc-sub-grid.full { grid-template-columns:1fr; }
.arc-sub-node {
  background:rgba(255,255,255,0.7);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:11px 12px 10px;
  cursor:default;
  transition:background 0.18s, transform 0.18s;
  position:relative;
}
.arc-sub-node:hover { background:rgba(255,255,255,0.95); transform:translateY(-1px); }
.arc-sub-node.acc-d { border-top:2px solid var(--blue); }
.arc-sub-node.acc-m { border-top:2px solid var(--orange); }
.arc-sub-node.acc-g { border-top:2px solid var(--green); background:linear-gradient(160deg,var(--green-light),rgba(255,255,255,0.7)); border-color:var(--green-border); }
.arc-sub-node.acc-p { border-top:2px solid var(--purple); background:linear-gradient(160deg,var(--purple-light),rgba(255,255,255,0.7)); border-color:rgba(94,53,177,0.2); }
.arc-sn-title {
  font-family:var(--font-mono); font-size:9px; font-weight:700;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--grey-muted); margin-bottom:7px; padding-bottom:6px;
  border-bottom:1px solid var(--border-soft);
}
.arc-sn-list { list-style:none; display:grid; gap:3px; }
.arc-sn-list li {
  position:relative; padding-left:11px;
  font-size:12.5px; color:var(--grey-text); line-height:1.4;
}
.arc-sn-list li::before { content:&quot;–&quot;; position:absolute; left:0; top:0; color:var(--grey-faint); }

/* Icon box in sub-node */
.arc-sn-icon {
  width:28px; height:28px; border-radius:8px;
  display:inline-flex; align-items:center; justify-content:center;
  margin-bottom:8px; flex-shrink:0;
}

/* Note box */
.arc-note {
  margin-top:10px; padding:9px 13px;
  border:1px dashed var(--border); border-radius:var(--radius);
  font-size:12px; color:var(--grey-muted); line-height:1.5;
  background:rgba(255,255,255,0.4);
  position:relative; z-index:1;
}
.arc-note.d { border-color:var(--blue-border); background:var(--blue-light); }
.arc-note.m { border-color:var(--orange-border); background:var(--orange-light); }

/* Boundary bar */
.arc-boundary {
  margin-top:11px; display:flex; align-items:center; gap:8px;
  padding:6px 11px; border-radius:var(--radius);
  font-family:var(--font-mono); font-size:9px; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase;
  position:relative; z-index:1;
}
.arc-boundary.d { background:var(--blue-light); border:1px dashed var(--blue-border); color:#1439a8; }
.arc-boundary.m { background:var(--orange-light); border:1px dashed var(--orange-border); color:#c44800; }
.arc-boundary::before { content:&quot;⟵&quot;; font-size:11px; }
.arc-boundary.m::before { content:&quot;⟶&quot;; }

/* Consumer grid */
.arc-cons-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; max-width:1180px; margin:0 auto; justify-content:center; }
.arc-cons-card {
  background:linear-gradient(145deg,#fff,var(--bg-section));
  border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:20px 14px 16px; text-align:center;
  box-shadow:var(--shadow-sm); cursor:default;
  transition:transform 0.2s, box-shadow 0.2s;
  position:relative; overflow:hidden;
}
.arc-cons-card::after {
  content:&quot;&quot;; position:absolute; bottom:0; left:0; right:0; height:3px;
  border-radius:0 0 var(--radius-lg) var(--radius-lg);
}
.arc-cons-card.common::after { background:linear-gradient(90deg,var(--blue),var(--orange)); }
.arc-cons-card.mosaic-only { border-color:var(--orange-border); background:linear-gradient(145deg,rgba(250,102,15,0.05),#fff); }
.arc-cons-card.mosaic-only::after { background:var(--orange); }
.arc-cons-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.09); }
.arc-cons-icon {
  width:38px; height:38px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 10px;
}
.arc-cons-name { font-size:14px; font-weight:700; letter-spacing:-0.01em; color:var(--dark); margin-bottom:4px; }
.arc-cons-sub { font-size:11.5px; color:var(--grey-muted); line-height:1.4; margin-bottom:10px; }
.arc-cons-chips { display:flex; flex-wrap:wrap; justify-content:center; gap:5px; }
.arc-chip {
  font-family:var(--font-mono); font-size:8.5px; font-weight:700;
  letter-spacing:0.06em; padding:3px 8px; border-radius:999px; border:1px solid;
}
.arc-chip.d { color:var(--blue); border-color:var(--blue-border); background:var(--blue-light); }
.arc-chip.m { color:var(--orange); border-color:var(--orange-border); background:var(--orange-light); }

/* Bottom legend */
.arc-bottom-legend {
  display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-top:18px;
}
.arc-bl-chip {
  display:inline-flex; align-items:center; gap:7px;
  padding:5px 12px; border-radius:999px; border:1px solid var(--border);
  background:rgba(255,255,255,0.8);
  font-size:12px; font-weight:500; color:var(--grey-muted);
}
.arc-bl-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }

/* Summary */
.arc-summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.arc-sum-card {
  border-radius:var(--radius-lg); padding:20px 22px 18px;
  position:relative; overflow:hidden;
}
.arc-sum-card::before {
  content:&quot;&quot;; position:absolute; top:0; left:0; right:0; height:3px;
}
.arc-sum-card.d {
  background:linear-gradient(145deg,var(--blue-light),rgba(255,255,255,0.95));
  border:1.5px solid var(--blue-border);
}
.arc-sum-card.d::before { background:var(--blue); }
.arc-sum-card.m {
  background:linear-gradient(145deg,var(--orange-light),rgba(255,255,255,0.95));
  border:1.5px solid var(--orange-border);
}
.arc-sum-card.m::before { background:var(--orange); }
.arc-sum-head {
  font-size:17px; font-weight:800; letter-spacing:-0.02em;
  color:var(--dark); margin-bottom:8px;
  display:flex; align-items:center; gap:10px;
}
.arc-sum-icon {
  width:32px; height:32px; border-radius:8px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.arc-sum-body { font-size:13.5px; color:var(--grey-text); line-height:1.6; margin-bottom:14px; }
.arc-tag-row { display:flex; flex-wrap:wrap; gap:6px; }
.arc-tag {
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:999px;
  font-family:var(--font-mono); border:1px solid;
}
.arc-tag.d { color:var(--blue); border-color:var(--blue-border); background:var(--blue-light); }
.arc-tag.m { color:var(--orange); border-color:var(--orange-border); background:var(--orange-light); }

/* Canvas footer */
.arc-canvas-foot {
  text-align:center; padding:16px 32px 20px;
  border-top:1px solid var(--border-soft);
  position:relative; z-index:1;
}
.arc-canvas-foot span {
  font-family:var(--font-mono); font-size:9.5px;
  letter-spacing:0.12em; text-transform:uppercase; color:var(--grey-faint);
}

/* Scroll reveal */



/* Responsive */
@media(max-width:1100px) {
  .arc-src-grid,.arc-cons-grid { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:900px) {
  .arc-panel { padding:24px 24px 40px; }
  .arc-split-row { grid-template-columns:1fr; }
  .arc-row-label span { writing-mode:horizontal-tb; transform:none; }
  .arc-sub-grid { grid-template-columns:1fr; }
  .arc-summary-grid { grid-template-columns:1fr; }
}
@media(max-width:640px) {
  .arc-src-grid,.arc-cons-grid { grid-template-columns:1fr; }
}

/* SVG icons helper */
.arc-icon-svg { width:20px; height:20px; }

  :root {
    --orange: #FA660F;
    --black: #0a0a0a;
    --dark: #1a1a1a;
    --border: #d8d8e8;
    --border-soft: #ebebf5;
    --text: #4a4a5a;
    --muted: #7a7a88;
    --bg-shell: #f4f5f8;
    --font-sans: &#x27;Segoe UI&#x27;, -apple-system, system-ui, sans-serif;
    --font-mono: &#x27;Cascadia Code&#x27;, &#x27;SF Mono&#x27;, ui-monospace, monospace;

    --color-background-primary: #ffffff;
    --color-background-secondary: #f7f7fb;
    --color-background-tertiary: #f1f2f8;
    --color-border-tertiary: #d8d8e8;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #4a4a5a;
    --color-text-tertiary: #7a7a88;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-shell);
    color: var(--black);
    min-height: 100vh;
  }
  .topbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }
  .topbar-inner { max-width: 1480px; margin: 0 auto; padding: 0 40px; }
  .topbar-row1 {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 0 12px; border-bottom:1px solid #f0f0f6;
  }
  .topbar-logo { height: 26px; display:block; }
  .topbar-badge {
    font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color: var(--muted); font-family: var(--font-mono);
    border:1px solid var(--border); padding:4px 12px; border-radius:20px;
  }
  .topbar-row2 {
    display:flex; align-items:center; justify-content:space-between; gap:24px; padding:14px 0;
  }
  .topbar-title-block { min-width:0; }
  .topbar-kicker {
    font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    color: var(--orange); margin-bottom:4px; font-family: var(--font-mono);
  }
  .topbar-h1 { font-size:24px; font-weight:800; line-height:1.1; letter-spacing:-.025em; color:var(--black); }
  .topbar-h1 span { color: var(--orange); }
  .tab-strip {
    display:flex; gap:8px; align-items:center; flex-shrink:0; background:#f3f4f7; padding:5px;
    border-radius:999px; border:1px solid var(--border);
  }
  .tab {
    appearance:none; border:none; background:transparent; color:var(--muted); border-radius:999px;
    padding:9px 22px; font-size:14px; font-weight:600; font-family: var(--font-sans);
  }
  .tab.active { background: var(--orange); color:#fff; box-shadow:0 4px 14px rgba(250,102,15,0.3); }
  .section-nav { background:#fff; border-bottom:1px solid var(--border); }
  .section-nav-inner { max-width:1480px; margin:0 auto; padding:0 40px; }
  .section-tabs { display:flex; align-items:center; gap:26px; }
  .section-tab {

  }
  .section-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  .section-tab + .section-tab { position: relative; }
  .section-tab + .section-tab::before {
    content:&#x27;&#x27;; position:absolute; left:-14px; top:50%; transform:translateY(-50%); width:1px; height:18px; background:var(--border);
  }
  .section-tab svg { width:16px; height:16px; }
  .page { max-width: 1200px; margin: 30px auto 56px; padding: 0 14px; }

  @media (max-width: 860px) {

    .topbar-h1 { font-size:20px; }
    .page { margin-top: 18px; }
  }

&lt;div class=&quot;main arc-cmp-content&quot; id=&quot;arc-cmp-content&quot;&gt;
&lt;div style=&quot;padding:14px 64px 0;max-width:1260px;margin:0 auto;&quot;&gt;&lt;div style=&quot;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#FA660F;font-family:&#x27;Cascadia Code&#x27;,&#x27;SF Mono&#x27;,monospace;&quot;&gt;Mosaic vs AtScale  ·  Semantic Layer  ·  April 2026&lt;/div&gt;&lt;/div&gt;

  &lt;div class=&quot;section-zone&quot; data-section=&quot;0&quot; data-theme=&quot;blue&quot; style=&quot;border-top:none;&quot;&gt;
    &lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;01&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;AtScale at a glance&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;snapshot&quot;&gt;
      &lt;div class=&quot;snap-card&quot;&gt;
        &lt;div class=&quot;snap-label&quot;&gt;Core identity&lt;/div&gt;
        &lt;div class=&quot;snap-value&quot;&gt;Universal semantic layer&lt;/div&gt;
        &lt;div class=&quot;snap-sub&quot;&gt;AtScale positions itself as a universal semantic layer platform for enterprise AI and analytics.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;snap-card&quot;&gt;
        &lt;div class=&quot;snap-label&quot;&gt;Modeling standard&lt;/div&gt;
        &lt;div class=&quot;snap-value&quot;&gt;Open-source SML&lt;/div&gt;
        &lt;div class=&quot;snap-sub&quot;&gt;Semantic Modeling Language is YAML-based, open source, and supported by active tooling including SDK, CLI, and converter direction, with portability and interoperability as core themes.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;snap-card&quot;&gt;
        &lt;div class=&quot;snap-label&quot;&gt;AI posture&lt;/div&gt;
        &lt;div class=&quot;snap-value&quot;&gt;MCP + AI agents&lt;/div&gt;
        &lt;div class=&quot;snap-sub&quot;&gt;Official messaging includes LLMs, AI applications, agent workflows, and semantic context for AI use cases.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;snap-card&quot;&gt;
        &lt;div class=&quot;snap-label&quot;&gt;Product scope&lt;/div&gt;
        &lt;div class=&quot;snap-value&quot;&gt;Pure-play USL&lt;/div&gt;
        &lt;div class=&quot;snap-sub&quot;&gt;Strong semantic layer with external BI reliance, plus a warehouse-optimization and aggregate-acceleration story; Snowflake customers can also deploy via a native marketplace app.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;section-zone&quot; data-section=&quot;1&quot; data-theme=&quot;amber&quot;&gt;
    &lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;02&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Where they genuinely overlap — acknowledge this&lt;/span&gt;&lt;/div&gt;
    &lt;p style=&quot;font-size:18px;color:var(--grey-text);margin-bottom:18px;line-height:1.6;&quot;&gt;AtScale is not a lightweight competitor. There is real overlap in semantic-layer intent, BI interoperability, performance optimization, and AI-grounding language. Acknowledging that upfront makes the differentiation more credible.&lt;/p&gt;
    &lt;div class=&quot;overlap-grid&quot;&gt;
      &lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both position themselves as a &lt;strong&gt;semantic layer above raw data&lt;/strong&gt;, centralizing business logic instead of exposing users to raw tables.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both emphasize &lt;strong&gt;consistent metrics and business logic&lt;/strong&gt; reused across multiple consumer tools and workflows.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;AI and agent use cases&lt;/strong&gt;, with AtScale explicitly referencing LLMs, autonomous agents, and MCP-based semantic context.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both support &lt;strong&gt;BI interoperability&lt;/strong&gt;. AtScale publicly supports Power BI, Tableau, Excel, Python notebooks, and analytical applications.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both position semantic logic as a way to improve &lt;strong&gt;governance, explainability, and trust&lt;/strong&gt; across human and AI consumers.&lt;/div&gt;&lt;/div&gt;
      &lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both have a strong &lt;strong&gt;performance story&lt;/strong&gt;. AtScale emphasizes intelligent aggregates and optimized SQL over live cloud data, while Mosaic emphasizes hybrid execution and in-memory reuse.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;overlap-item&quot;&gt;&lt;div class=&quot;overlap-eq&quot;&gt;≈&lt;/div&gt;&lt;div class=&quot;point-text&quot;&gt;Both now carry stronger &lt;strong&gt;Snowflake credibility signals&lt;/strong&gt;. AtScale has notable Snowflake ecosystem alignment, while Mosaic can credibly engage the same warehouse-first enterprise conversation from a governed platform angle.&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;section-zone alt&quot; data-section=&quot;2&quot; data-theme=&quot;purple&quot;&gt;
    &lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;03&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;How We Win&lt;/span&gt;&lt;/div&gt;
    &lt;p class=&quot;win-intro&quot;&gt;AtScale is a credible semantic layer. The question is never &quot;do they have a semantic layer?&quot; — they do. The question is what happens &lt;em style=&quot;font-style:italic;color:var(--dark)&quot;&gt;after&lt;/em&gt; the semantic layer. That is where Mosaic wins.&lt;/p&gt;

    &lt;div class=&quot;win-grid&quot;&gt;

      &lt;div class=&quot;win-card&quot;&gt;
        &lt;div class=&quot;win-num&quot;&gt;01 / Delivery&lt;/div&gt;
        &lt;div class=&quot;win-card-title&quot;&gt;Last-mile included&lt;/div&gt;
        &lt;div class=&quot;win-mini-grid&quot;&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;AtScale stops at the semantic layer. It integrates well with Tableau, Power BI, and Excel — but those are separate products your customer still has to license, deploy, and manage independently.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;Mosaic includes dashboards, scorecards, mobile, and embedded analytics as part of the governed platform. The semantic layer and the delivery surface are the same product.&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;win-why&quot;&gt;
          &lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
          &lt;div class=&quot;win-why-text&quot;&gt;&quot;AtScale is a great semantic layer. Who consumes it? Through what tool? And who governs that tool?&quot; Every honest answer reveals a gap Mosaic closes. Semantic governance that stops before the dashboard is only half the job.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;win-card&quot;&gt;
        &lt;div class=&quot;win-num&quot;&gt;02 / Economics&lt;/div&gt;
        &lt;div class=&quot;win-card-title&quot;&gt;Compute you don&#x27;t pay twice&lt;/div&gt;
        &lt;div class=&quot;win-mini-grid&quot;&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;AtScale uses intelligent aggregates and optimized SQL to reduce warehouse pressure — but it remains a warehouse-push model. Commercial scaling should be discussed carefully, because AtScale publicly emphasizes deployed semantic objects while repeated consumption patterns can still matter operationally and commercially.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;Mosaic&#x27;s in-memory semantic engine absorbs repeated workloads without re-triggering source compute. The same semantic result is reused across concurrent users, scheduled reports, and AI agent requests.&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;win-why&quot;&gt;
          &lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
          &lt;div class=&quot;win-why-text&quot;&gt;&quot;What happens to your AtScale bill when 200 users open their Monday morning dashboard at 8am? And when your AI agents start querying every minute?&quot; Repeated access patterns expose the structural cost difference fast.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;win-card&quot;&gt;
        &lt;div class=&quot;win-num&quot;&gt;03 / Governance&lt;/div&gt;
        &lt;div class=&quot;win-card-title&quot;&gt;One policy, every surface&lt;/div&gt;
        &lt;div class=&quot;win-mini-grid&quot;&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;AtScale governs the semantic layer well — access control, masking, metric definitions, and query impersonation into the warehouse. The gap is not source-level enforcement; it is that governance is no longer natively enforced by the same product surface once results are consumed in Tableau, Power BI, or a third-party AI tool.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;In Mosaic, the governance policy that protects the semantic object also governs the dashboard, the embedded card, the mobile report, and the AI answer — because it is the same platform end to end.&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;win-why&quot;&gt;
          &lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
          &lt;div class=&quot;win-why-text&quot;&gt;&quot;Show me how a row-level security policy in AtScale propagates into a Power BI report a business user modified last week.&quot; The seam between semantic layer and delivery layer is where enterprise governance consistently breaks down.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;win-card&quot;&gt;
        &lt;div class=&quot;win-num&quot;&gt;04 / AI&lt;/div&gt;
        &lt;div class=&quot;win-card-title&quot;&gt;AI that acts, not just answers&lt;/div&gt;
        &lt;div class=&quot;win-mini-grid&quot;&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;AtScale&#x27;s MCP server gives LLMs governed access to structured metrics. AI can query the semantic layer correctly — genuinely valuable. But the output lands in a chat window or a developer-built integration, disconnected from governed business workflows.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;Mosaic connects governed AI answers directly into the analytics surfaces where decisions are made — dashboards, scorecards, alerts, embedded experiences — so AI becomes part of the business process, not a parallel tool.&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;win-why&quot;&gt;
          &lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
          &lt;div class=&quot;win-why-text&quot;&gt;&quot;When AtScale&#x27;s MCP surfaces an insight, where does it go? Who sees it? Is it auditable?&quot; AtScale gets the answer right. Mosaic gets it to the right person, in the right context, inside the governed platform they already use every day.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

    &lt;div class=&quot;win-card&quot; style=&quot;grid-column: 1 / -1;&quot;&gt;
        &lt;div class=&quot;win-num&quot;&gt;05 / Implementation &amp; Ownership&lt;/div&gt;
        &lt;div class=&quot;win-card-title&quot;&gt;Who builds it, owns it, and scales it?&lt;/div&gt;
        &lt;div class=&quot;win-mini-grid&quot;&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label atscale&quot;&gt;AtScale&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;AtScale requires structured semantic modeling using SML. Initial setup and ongoing evolution typically depend on data or analytics engineering teams, with strong modeling discipline required up front. That is a strength for semantic rigor, but it can also create a dependency on specialized ownership.&lt;/div&gt;
          &lt;/div&gt;
          &lt;div class=&quot;win-mini&quot;&gt;
            &lt;div class=&quot;win-mini-label mosaic&quot;&gt;Mosaic&lt;/div&gt;
            &lt;div class=&quot;win-mini-text&quot;&gt;Mosaic can be positioned on faster onboarding and broader accessibility, reducing dependency on deep semantic modeling expertise while still maintaining governance. The semantic layer is easier to operationalize across business-facing consumption surfaces instead of staying concentrated inside a specialist modeling team.&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;win-why&quot;&gt;
          &lt;div class=&quot;win-why-label&quot;&gt;The ask that lands&lt;/div&gt;
          &lt;div class=&quot;win-why-text&quot;&gt;&quot;How long does it take to stand up your first governed model — and who has to be involved?&quot; If semantic ownership stays with a specialized engineering team, scale becomes a bottleneck. Mosaic shifts that balance closer to the business without giving up control.&lt;/div&gt;
        &lt;/div&gt;

    &lt;/div&gt;
  &lt;/div&gt;

  
  &lt;/div&gt;

  &lt;div class=&quot;section-zone&quot; data-section=&quot;3&quot; data-theme=&quot;orange&quot;&gt;
    &lt;div class=&quot;section-label&quot;&gt;&lt;span class=&quot;sl-counter&quot;&gt;04&lt;/span&gt;&lt;span class=&quot;sl-accent&quot;&gt;&lt;/span&gt;&lt;span class=&quot;sl-text&quot;&gt;Head-to-head&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;hth-wrap&quot;&gt;
      &lt;table class=&quot;hth-table&quot;&gt;
        &lt;thead&gt;
          &lt;tr&gt;
            &lt;th&gt;Dimension&lt;/th&gt;
            &lt;th class=&quot;col-d&quot;&gt;AtScale&lt;/th&gt;
            &lt;th class=&quot;col-m&quot;&gt;Strategy Mosaic&lt;/th&gt;
          &lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;

          &lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Product scope&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Pure-play universal semantic layer — no native dashboards, reports, or BI visualization&lt;/li&gt;
              &lt;li&gt;Positioned as the layer between cloud data platforms and consuming tools; relies entirely on Tableau, Power BI, Excel, Looker, or custom apps for last-mile delivery&lt;/li&gt;
              &lt;li&gt;Semantic layer + MCP is a complete story; the delivery stack is not part of the product&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Semantic layer + analytics engine + native BI (dashboards, scorecards, reports, mobile, embedded) in a single governed platform&lt;/li&gt;
              &lt;li&gt;Supports external BI tools through open interfaces while also offering a native delivery surface — customers can consolidate instead of stack&lt;/li&gt;
              &lt;li&gt;Semantic governance travels directly into the last-mile experience because it is the same product&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

          &lt;tr class=&quot;hth-row denodo-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Semantic modeling language&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;SML (Semantic Modeling Language) is Apache open-sourced, YAML-based, and published on GitHub with a public spec and pre-built models&lt;/li&gt;
              &lt;li&gt;Multidimensional coverage: metrics, dimensions, hierarchies, semi-additive measures, many-to-many relationships, and cell-based expressions — documented and verifiable&lt;/li&gt;
              &lt;li&gt;Object-based and modular; models are defined in YAML and managed programmatically through Git-connected workflows&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Governed semantic objects are the lead message — certification, security, and enterprise reuse rather than an open standard language spec&lt;/li&gt;
              &lt;li&gt;Differentiation is on governance richness and downstream controlled consumption, not openness or portability as primary value&lt;/li&gt;
              &lt;li&gt;Position on semantic control, not semantic modeling vocabulary — AtScale wins the open/portable language argument directly&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

          &lt;tr class=&quot;hth-row denodo-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Microsoft stack fit&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;One of AtScale&#x27;s clearest public strengths is its MDX and XMLA compatibility — Excel and Power BI behave as if connecting to SSAS, the standard enterprises already know&lt;/li&gt;
              &lt;li&gt;Native DAX connectivity for Power BI enables Live Query against cloud warehouses (Snowflake, BigQuery, Redshift, Azure Synapse, Databricks) without data imports&lt;/li&gt;
              &lt;li&gt;Supports SSAS-compatible XMLA/MDX workflows alongside native DAX live connectivity for Power BI&lt;/li&gt;
              &lt;li&gt;This is one of AtScale&#x27;s clearest and most defensible public strengths — do not challenge it directly&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;DAX and XMLA support is credible and supports Power BI and Excel scenarios&lt;/li&gt;
              &lt;li&gt;Competitive angle is not to fight AtScale on Microsoft compatibility — it is to reframe the conversation away from MDX/XMLA depth and toward governed delivery completeness&lt;/li&gt;
              &lt;li&gt;When the customer is Microsoft-first and warehousing on Azure, AtScale is a strong fit; Mosaic wins on platform breadth beyond the Microsoft stack&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

          &lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Execution &amp; performance&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Warehouse-push model: translates inbound BI and AI queries into optimized SQL executed against live cloud data — no data movement or duplication&lt;/li&gt;
              &lt;li&gt;Intelligent aggregate generation (system-generated and user-defined) reduces repeated warehouse compute and delivers sub-second performance at scale&lt;/li&gt;
              &lt;li&gt;Caching mechanisms improve concurrency for high-frequency workloads, but the architecture remains fundamentally warehouse-oriented&lt;/li&gt;
              &lt;li&gt;Aggregate acceleration is genuine — this is not purely a pass-through query engine&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Hybrid execution: pushdown to warehouse plus an independent in-memory semantic engine for repeated query reuse&lt;/li&gt;
              &lt;li&gt;Repeated BI workloads, concurrent dashboard loads, and AI agent queries can be served from in-memory results without re-triggering source compute each time&lt;/li&gt;
              &lt;li&gt;Stronger story for cost control as concurrency scales — especially relevant when AI agent query volume is unpredictable and frequent&lt;/li&gt;
              &lt;li&gt;The performance architecture is different, not merely incrementally faster; position on when the warehouse is not queried at all&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

          &lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Governance model&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Role-based access control, row-level security, data masking, and governance controls within the semantic layer — well-documented and production-grade&lt;/li&gt;
              &lt;li&gt;Governance is enforced at the AtScale layer; query impersonation passes user credentials through to the underlying data platform for consistent enforcement&lt;/li&gt;
              &lt;li&gt;Governance stops at the semantic layer boundary — once data or results enter Tableau, Power BI, or a third-party AI tool, AtScale&#x27;s policies no longer apply&lt;/li&gt;
              &lt;li&gt;Strong lineage and explainability narrative within the platform&#x27;s scope&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Governance policy defined at the semantic object level travels into every downstream consumption surface — dashboards, embedded analytics, mobile, and AI answers — because delivery is part of the same platform&lt;/li&gt;
              &lt;li&gt;No governance seam between semantic layer and last-mile visualization; the same access rules, masking policies, and audit trail apply end to end&lt;/li&gt;
              &lt;li&gt;Position on enterprise-wide governed consumption, not just governance vocabulary at the model layer&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

          &lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;AI &amp; MCP&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;MCP Server is public and documented, interoperable with MCP-compatible AI tools including Claude, ChatGPT, and other compatible agent frameworks&lt;/li&gt;
              &lt;li&gt;Semantic context exposed via MCP gives LLMs governed metric definitions, hierarchies, and relationships — eliminates hallucination on structured business queries&lt;/li&gt;
              &lt;li&gt;Integrated with Databricks MCP Marketplace and Agent Bricks, and publicly integrated with Snowflake Cortex Analyst and Databricks AI/BI Genie&lt;/li&gt;
              &lt;li&gt;Snowflake Ventures led AtScale&#x27;s largest announced equity round, which strengthens its credibility in Snowflake-centered enterprise conversations&lt;/li&gt;
              &lt;li&gt;AI answers are accurate and governed — but they are returned to the agent or chat interface, not surfaced inside a governed business workflow or analytics platform&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;MCP is also part of the Mosaic story — the competitive angle is not MCP availability, it is what sits behind MCP&lt;/li&gt;
              &lt;li&gt;Governed AI answers connect directly into the analytics surfaces where business decisions are made: dashboards, scorecards, alerts, embedded experiences&lt;/li&gt;
              &lt;li&gt;AI becomes part of the governed business workflow, not a parallel tool requiring separate integration and governance overhead&lt;/li&gt;
              &lt;li&gt;Position: AtScale gets the AI answer right; Mosaic gets it to the right person, in the right context, inside the governed platform they already use&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

          &lt;tr class=&quot;hth-row denodo-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Open ecosystem &amp; portability&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;SML is Apache-licensed open source — free to use in any application, with a public GitHub repository and community contribution model&lt;/li&gt;
              &lt;li&gt;Explicit interoperability with Tableau, Power BI, Excel, Looker, Hex, ThoughtSpot, Superset, Python notebooks, and Jupyter&lt;/li&gt;
              &lt;li&gt;AtScale has publicly stated a semantic translator direction to help migrate existing semantic modeling approaches into SML; maturity varies by platform and should be validated per use case&lt;/li&gt;
              &lt;li&gt;Strongly positioned as vendor-neutral: semantic models built in SML are portable across platforms by design&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Supports external BI tools through open interfaces — the openness story is credible but portability is not the lead competitive message&lt;/li&gt;
              &lt;li&gt;Differentiation is on governance and delivery completeness, not open-standard portability; concede the openness point and redirect to platform value&lt;/li&gt;
              &lt;li&gt;Customers prioritizing vendor neutrality and tool-agnostic semantic portability are more naturally aligned with AtScale; focus Mosaic on customers with platform consolidation pain&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

          &lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Pricing model&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Consumption-based pricing centered on deployed semantic objects (DSOs); AtScale&#x27;s pricing page states it does not bill by users, queries, or data size&lt;/li&gt;
              &lt;li&gt;Available on Google Cloud Marketplace and Snowflake Snowpark Container Services (SPCS); supports Kubernetes deployment on public cloud, private cloud, and hybrid&lt;/li&gt;
              &lt;li&gt;Commercial scaling should be validated carefully in deal context, especially where BI concurrency and AI agent activity are expected to grow rapidly&lt;/li&gt;
              &lt;li&gt;Developer Edition available for free download with access to SML and pre-built semantic model library&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Position Mosaic&#x27;s commercial model using approved internal materials — do not make unsupported pricing comparisons&lt;/li&gt;
              &lt;li&gt;Competitive angle is platform economics: the total cost of Mosaic (semantic layer + BI + AI delivery) versus the stack cost of AtScale + a separate BI tool license + governance overhead across two products&lt;/li&gt;
              &lt;li&gt;When AI agent volume is high and unpredictable, consumption-based per-query pricing becomes a commercial risk conversation — use it selectively, not as a default attack&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;


          &lt;tr class=&quot;hth-row denodo-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Platform coverage &amp; deployment fit&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Strong fit for warehouse-first environments across Snowflake, Databricks, BigQuery, Redshift, Synapse, Oracle, PostgreSQL, and Teradata&lt;/li&gt;
              &lt;li&gt;Supports Kubernetes deployment across public cloud, private cloud, and hybrid environments; Snowflake customers can also deploy through a native marketplace app rather than Kubernetes&lt;/li&gt;
              &lt;li&gt;Naturally aligned to customers standardizing on modern data platforms and preserving existing BI investments&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Broader platform story around heterogeneous enterprise connectivity plus native governed delivery&lt;/li&gt;
              &lt;li&gt;Better fit when the customer wants to reduce tool sprawl rather than optimize a best-of-breed warehouse-first stack&lt;/li&gt;
              &lt;li&gt;Position on consolidation and governed consumption, not just semantic augmentation&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

          &lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Implementation model &amp; ownership&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Strong semantic rigor, but initial setup and ongoing evolution typically depend on data or analytics engineering teams&lt;/li&gt;
              &lt;li&gt;Best suited when the customer is comfortable with structured semantic ownership and technical modeling discipline&lt;/li&gt;
              &lt;li&gt;Scales well with disciplined engineering, but can create dependency on specialist ownership&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Position Mosaic on faster onboarding and broader accessibility without giving up governance&lt;/li&gt;
              &lt;li&gt;Semantic capability can be operationalized closer to business-facing consumption surfaces instead of remaining concentrated inside a specialist modeling team&lt;/li&gt;
              &lt;li&gt;Stronger fit when speed, accessibility, and cross-functional adoption matter as much as semantic rigor&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

          &lt;tr class=&quot;hth-row mosaic-win&quot;&gt;
            &lt;td class=&quot;td-dim&quot;&gt;Where each wins&lt;/td&gt;
            &lt;td class=&quot;td-d&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Best fit: enterprises wanting a pure, best-of-breed semantic layer that integrates with an existing BI stack they are not replacing&lt;/li&gt;
              &lt;li&gt;Especially strong in Microsoft-heavy estates (heavy Excel, Power BI, Azure Synapse) and modern warehouse-first environments (Snowflake, Databricks, BigQuery)&lt;/li&gt;
              &lt;li&gt;Strong for analytics engineering teams who want code-first semantic modeling with Git-connected workflows and SML portability across tools&lt;/li&gt;
              &lt;li&gt;Recent analyst visibility such as GigaOm&#x27;s Leader/Fast Mover recognition can surface in customer conversations as an added credibility signal&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
            &lt;td class=&quot;td-m&quot;&gt;&lt;ul&gt;
              &lt;li&gt;Best fit: enterprises with tool sprawl pain — too many BI tools, semantic drift across dashboards, governance seams between layers, or repeated compute cost from concurrent workloads&lt;/li&gt;
              &lt;li&gt;Strongest when the customer wants semantic governance plus native BI and AI delivery in one governed platform, reducing the number of products they procure and manage&lt;/li&gt;
              &lt;li&gt;Position where the conversation is about platform consolidation, not best-of-breed BI tool augmentation&lt;/li&gt;
            &lt;/ul&gt;&lt;/td&gt;
          &lt;/tr&gt;

        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/div&gt;

&lt;style&gt;
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
.wrap{padding:16px 0 32px}
.legend{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:20px;padding:12px 18px;background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:12px}
.legend-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.08em;text-transform:uppercase;margin-right:4px}
.lpill{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--color-text-secondary)}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-hint{margin-left:auto;font-size:12px;color:var(--color-text-tertiary)}
.layer{border:1px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;margin-bottom:6px}
.layer.alt{background:var(--color-background-secondary)}
.lhead{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.layer.alt .lhead{background:var(--color-background-tertiary)}
.lline{flex:1;height:1px;background:var(--color-border-tertiary)}
.lnum{font-size:10px;font-weight:500;color:#D85A30;font-family:var(--font-mono);letter-spacing:.1em}
.ltitle{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--color-text-primary)}
.lbadge{font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;font-family:var(--font-mono);letter-spacing:.07em}
.badge-shared{background:#EEEDFE;color:#3C3489}
.badge-diff{background:#FAECE7;color:#993C1D}
.badge-split{background:#E6F1FB;color:#0C447C}
@media(prefers-color-scheme:dark){
  .badge-shared{background:#26215C;color:#AFA9EC}
  .badge-diff{background:#4A1B0C;color:#F0997B}
  .badge-split{background:#042C53;color:#85B7EB}
}
/* Source grid */
.src-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:18px 20px}
.src-card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-top:3px solid #534AB7;border-radius:8px;padding:14px 16px;cursor:pointer;transition:box-shadow .18s,transform .18s}
.src-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.src-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.src-name{font-size:12.5px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.src-sub{font-size:11px;color:var(--color-text-tertiary);line-height:1.5}
.src-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:10px 20px;border-top:1px solid var(--color-border-tertiary);background:rgba(83,74,183,.04)}
.src-note{font-size:11.5px;color:var(--color-text-secondary);font-style:italic}
.conn-chip{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-secondary);background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);padding:3px 10px;border-radius:20px;font-family:var(--font-mono)}
/* Flow */
.flow{display:flex;justify-content:center;padding:6px 0;position:relative}
.flow-track{width:2px;height:34px;background:linear-gradient(180deg,var(--color-border-tertiary) 0%,#D85A30 100%);border-radius:2px;position:relative;overflow:hidden}
.flow-bead{width:6px;height:6px;border-radius:50%;background:#D85A30;position:absolute;left:-2px;top:0;animation:beadFlow 1.6s ease-in-out infinite}
@keyframes beadFlow{0%{top:0;opacity:1}80%{top:28px;opacity:1}100%{top:28px;opacity:0}}
/* Diverge */
.diverge{display:flex;flex-direction:column;align-items:center;padding:4px 0 8px}
.diverge-label{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#D85A30;font-family:var(--font-mono);margin-bottom:5px}
.diverge-stem{width:2px;height:18px;background:linear-gradient(180deg,#D85A30 0%,transparent 100%)}
.diverge-arms{width:55%;height:16px;border-left:2px solid #D85A30;border-right:2px solid #185FA5;position:relative}
.diverge-arms::before{content:&#x27;&#x27;;position:absolute;top:0;left:-2px;right:-2px;height:2px;background:linear-gradient(90deg,#D85A30 0%,var(--color-border-tertiary) 50%,#185FA5 100%)}
/* Split row */
.split-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px 20px}
.band{border-radius:8px;overflow:hidden}
.band-a{border:1.5px solid rgba(24,95,165,.3)}
.band-m{border:1.5px solid rgba(216,90,48,.3)}
.band-kicker{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;padding:9px 14px;border-bottom:1px solid var(--color-border-tertiary)}
.band-a .band-kicker{background:rgba(24,95,165,.07)}
.band-m .band-kicker{background:rgba(216,90,48,.07)}
.band-label{font-size:11px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
.pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;font-family:var(--font-mono)}
.pill-a{background:rgba(24,95,165,.1);color:#0C447C;border:1px solid rgba(24,95,165,.25)}
.pill-m{background:rgba(216,90,48,.1);color:#993C1D;border:1px solid rgba(216,90,48,.25)}
@media(prefers-color-scheme:dark){
  .pill-a{background:rgba(24,95,165,.2);color:#85B7EB}
  .pill-m{background:rgba(216,90,48,.2);color:#F0997B}
}
.big-node{margin:14px;padding:14px 16px;background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:8px;cursor:pointer;transition:box-shadow .18s,transform .18s}
.big-node:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.09)}
.band-a .big-node{border-top:3px solid #185FA5}
.band-m .big-node{border-top:3px solid #D85A30}
.big-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:5px;line-height:1.4}
.big-sub{font-size:12px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:12px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sub-node{background:var(--color-background-secondary);border:1px solid var(--color-border-tertiary);border-radius:7px;padding:11px 12px;cursor:pointer;transition:box-shadow .15s,transform .15s}
.sub-node:hover{transform:translateY(-2px);box-shadow:0 3px 12px rgba(0,0,0,.08)}
.sn-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.sn-title{font-size:11.5px;font-weight:500;color:var(--color-text-primary);margin-bottom:5px}
.sn-list{margin:0 0 0 13px;padding:0;list-style:disc}
.sn-list li{font-size:11px;color:var(--color-text-secondary);line-height:1.6}
.acc-a{border-left:3px solid #185FA5}
.acc-m{border-left:3px solid #D85A30}
.acc-g{border-left:3px solid #0F6E56}
.acc-p{border-left:3px solid #534AB7}
.node-note{margin:0 14px 14px;padding:9px 12px;border-radius:7px;font-size:11.5px;line-height:1.6;font-style:italic}
.note-a{background:rgba(24,95,165,.07);color:#0C447C;border:1px solid rgba(24,95,165,.2)}
.note-m{background:rgba(216,90,48,.07);color:#993C1D;border:1px solid rgba(216,90,48,.2)}
@media(prefers-color-scheme:dark){
  .note-a{color:#85B7EB}
  .note-m{color:#F0997B}
}
/* Boundary */
.boundary{margin:0 14px 14px;padding:7px 12px;border-radius:7px;font-size:11px;font-weight:500;font-family:var(--font-mono);letter-spacing:.05em;text-transform:uppercase}
.boundary-a{background:rgba(24,95,165,.07);color:#0C447C;border:1px solid rgba(24,95,165,.2)}
.boundary-m{background:rgba(216,90,48,.07);color:#993C1D;border:1px solid rgba(216,90,48,.2)}
@media(prefers-color-scheme:dark){.boundary-a{color:#85B7EB}.boundary-m{color:#F0997B}}
/* Consumer grid */
.con-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px}
.con-card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:8px;padding:13px 15px;cursor:pointer;transition:box-shadow .18s,transform .18s}
.con-card:hover{transform:translateY(-3px);box-shadow:0 5px 16px rgba(0,0,0,.09)}
.con-shared{border-top:3px solid #534AB7}
.con-atscale{border-top:3px solid #185FA5}
.con-mosaic{border-top:3px solid #D85A30}
.con-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.con-name{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.con-sub{font-size:11px;color:var(--color-text-tertiary);line-height:1.5}
.con-tag{display:inline-block;margin-top:5px;font-size:9.5px;font-weight:500;padding:2px 7px;border-radius:10px;font-family:var(--font-mono)}
.tag-shared{background:#EEEDFE;color:#3C3489}
.tag-atscale{background:#E6F1FB;color:#0C447C}
.tag-mosaic{background:#FAECE7;color:#993C1D}
@media(prefers-color-scheme:dark){
  .tag-shared{background:#26215C;color:#AFA9EC}
  .tag-atscale{background:#042C53;color:#85B7EB}
  .tag-mosaic{background:#4A1B0C;color:#F0997B}
}
/* Traits */
.traits-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px}
.trait-card{display:flex;gap:11px;align-items:flex-start;background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:8px;padding:13px 14px;cursor:pointer;transition:box-shadow .15s,transform .15s}
.trait-card:hover{transform:translateY(-2px);box-shadow:0 3px 12px rgba(0,0,0,.08)}
.trait-icon{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.trait-title{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.trait-sub{font-size:11px;color:var(--color-text-secondary);line-height:1.55}
/* Tooltip */
.tip{position:fixed;z-index:9999;max-width:300px;background:#0a0a0a;color:rgba(255,255,255,.88);padding:12px 16px;border-radius:10px;font-size:12.5px;line-height:1.55;box-shadow:0 14px 44px rgba(0,0,0,.4);pointer-events:none;border:1px solid rgba(255,255,255,.1);display:none}
.tip-title{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,176,80,.9);margin-bottom:7px;font-family:var(--font-mono)}
.tip-body{color:rgba(255,255,255,.82);font-size:12px}
.tip-insight{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:rgba(255,255,255,.5);font-style:italic}
&lt;/style&gt;

  &lt;div class=&quot;tip-insight&quot; id=&quot;tip-i&quot;&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;!-- L01 DATA PLATFORMS --&gt;
&lt;div class=&quot;layer&quot;&gt;
  &lt;div class=&quot;lhead&quot;&gt;
    &lt;div class=&quot;lline&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;lnum&quot;&gt;01&lt;/div&gt;
    &lt;div class=&quot;ltitle&quot;&gt;Cloud &amp; Enterprise Data Platforms&lt;/div&gt;
    &lt;div class=&quot;lbadge badge-shared&quot;&gt;Shared — same warehouse landscape&lt;/div&gt;
    &lt;div class=&quot;lline&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;src-grid&quot;&gt;
    &lt;div class=&quot;src-card&quot; data-t=&quot;Warehouses &amp; Lakehouses&quot; data-b=&quot;Snowflake, Databricks, BigQuery, Azure Synapse, Redshift. Both connect natively without moving data. AtScale generates optimised SQL pushdown + aggregate acceleration. Mosaic maps tables into certified semantic objects with hybrid execution.&quot; data-i=&quot;AtScale is warehouse-first by design — its aggregate acceleration story centres on these platforms.&quot;&gt;
      &lt;div class=&quot;src-icon&quot; style=&quot;background:rgba(83,74,183,.1)&quot;&gt;&lt;svg width=&quot;18&quot; height=&quot;18&quot; fill=&quot;none&quot; stroke=&quot;#534AB7&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;ellipse cx=&quot;12&quot; cy=&quot;5&quot; rx=&quot;9&quot; ry=&quot;3&quot;/&gt;&lt;path d=&quot;M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5&quot;/&gt;&lt;path d=&quot;M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
      &lt;div class=&quot;src-name&quot;&gt;Warehouses &amp; Lakehouses&lt;/div&gt;
      &lt;div class=&quot;src-sub&quot;&gt;Snowflake · Databricks · BigQuery · Redshift&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;src-card&quot; data-t=&quot;Operational Databases&quot; data-b=&quot;Oracle, SQL Server, PostgreSQL, Teradata. AtScale translates BI queries to optimised SQL pushdown against these sources. Mosaic maps operational tables into governed semantic objects.&quot; data-i=&quot;Both tools support operational DBs. AtScale&#x27;s primary strength is cloud warehouse platforms — operational DB connectivity is supported but secondary to its aggregate story.&quot;&gt;
      &lt;div class=&quot;src-icon&quot; style=&quot;background:rgba(83,74,183,.1)&quot;&gt;&lt;svg width=&quot;18&quot; height=&quot;18&quot; fill=&quot;none&quot; stroke=&quot;#534AB7&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;rect x=&quot;2&quot; y=&quot;3&quot; width=&quot;20&quot; height=&quot;14&quot; rx=&quot;2&quot;/&gt;&lt;path d=&quot;M8 21h8M12 17v4&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
      &lt;div class=&quot;src-name&quot;&gt;Operational Databases&lt;/div&gt;
      &lt;div class=&quot;src-sub&quot;&gt;Oracle · SQL Server · PostgreSQL · Teradata&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;src-card&quot; data-t=&quot;Snowflake Native App (SPCS)&quot; data-b=&quot;AtScale is available as a Native App on Snowflake Marketplace via SPCS — no Kubernetes required for Snowflake customers. Also on Google Cloud Marketplace. Snowflake Ventures led AtScale&#x27;s largest equity round, Dec 2025.&quot; data-i=&quot;Native Snowflake app deployment is a real competitive strength — significantly lower deployment friction for Snowflake-first customers.&quot;&gt;
      &lt;div class=&quot;src-icon&quot; style=&quot;background:rgba(83,74,183,.1)&quot;&gt;&lt;svg width=&quot;18&quot; height=&quot;18&quot; fill=&quot;none&quot; stroke=&quot;#534AB7&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
      &lt;div class=&quot;src-name&quot;&gt;Cloud Marketplace Deployment&lt;/div&gt;
      &lt;div class=&quot;src-sub&quot;&gt;Snowflake SPCS · Google Cloud · Kubernetes&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;src-card&quot; data-t=&quot;Structured Data — Warehouse-First&quot; data-b=&quot;AtScale is warehouse-first by design. Streaming, files, and APIs are typically ingested into a cloud platform first before AtScale models are built on top. Mosaic connects via 200+ semantic connectors including files, APIs, and streaming sources.&quot; data-i=&quot;A real architectural difference: AtScale expects data to land in a warehouse first. Mosaic&#x27;s 200+ connectors give broader raw source flexibility at the semantic layer.&quot;&gt;
      &lt;div class=&quot;src-icon&quot; style=&quot;background:rgba(83,74,183,.1)&quot;&gt;&lt;svg width=&quot;18&quot; height=&quot;18&quot; fill=&quot;none&quot; stroke=&quot;#534AB7&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M22 12h-4l-3 9L9 3l-3 9H2&quot;/&gt;&lt;/svg&gt;&lt;/div&gt;
      &lt;div class=&quot;src-name&quot;&gt;Structured Data Sources&lt;/div&gt;
      &lt;div class=&quot;src-sub&quot;&gt;Data lands in warehouse first · then AtScale&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;src-foot&quot;&gt;
    &lt;span class=&quot;src-note&quot;&gt;Both connect without moving data. AtScale is warehouse-first — compute stays in the platform.&lt;/span&gt;
    &lt;span class=&quot;conn-chip&quot;&gt;&lt;svg width=&quot;10&quot; height=&quot;10&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2.5&quot; stroke-linecap=&quot;round&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71&quot;/&gt;&lt;path d=&quot;M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71&quot;/&gt;&lt;/svg&gt;AtScale: warehouse-push · Mosaic: 200+ semantic connectors&lt;/span&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;flow&quot;&gt;&lt;div class=&quot;flow-track&quot;&gt;&lt;div class=&quot;flow-bead&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;
&lt;div class=&quot;diverge&quot;&gt;
  &lt;div class=&quot;diverge-label&quot;&gt;Paths diverge here&lt;/div&gt;
  &lt;div class=&quot;diverge-stem&quot;&gt;&lt;/div&gt;
